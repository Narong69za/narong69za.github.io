<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN DESIGN PAYMENT CENTER</title>

<link rel="stylesheet" href="/assets/css/payment.css">
<script src="https://cdn.omise.co/omise.js"></script>
</head>

<body>

<div class="payment-root">

<h1>SN DESIGN PAYMENT CENTER</h1>
<div class="payment-grid">

  <div class="payment-card" data-method="stripe">
    <h2>💳 OMise Card</h2>
    <p>Visa / Master / JCB</p>
    <button class="premium-btn">ชำระด้วยบัตร</button>
  </div>

  <div class="payment-card" data-method="truemoney">
    <h2>🟠 TrueMoney</h2>
    <p>Wallet Direct Payment</p>
    <button class="premium-btn orange">ชำระผ่าน Wallet</button>
  </div>

  <div class="payment-card" data-method="promptpay">
    <h2>📱 SCB PromptPay</h2>
    <p>QR Code Banking</p>
    <button class="premium-btn blue">สร้าง QR ชำระเงิน</button>
  </div>

  <div class="payment-card" data-method="crypto">
    <h2>🪙 Binance Crypto</h2>
    <p>USDT / BNB / TON</p>
    <button class="premium-btn green">ชำระด้วย Crypto</button>
  </div>

</div>

<div id="paymentStatus" class="status">
  STATUS: IDLE
</div>

</div>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/payment.js"></script>

</body>
</html>
