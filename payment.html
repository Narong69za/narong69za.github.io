<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PREMIUM GATEWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red-money: #ff3b30; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header ลดขนาดลง 50% */
        .compact-nav { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 24px; }
        .red-glow { text-shadow: 0 0 10px var(--red-money); color: var(--red-money); font-size: 1.1rem; font-weight: 900; italic: true; }
        
        /* SN PAYMENT GATEWAY สีบรอนซ์เงินเงา */
        .silver-bronze {
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 50%, #cfd9df 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(226, 235, 240, 0.4);
            font-size: 1rem; font-weight: 900;
        }

        /* ตรึงหน้าจอ (Fixed) */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; align-items: center; }
        .payment-container { width: 100%; max-width: 450px; }

        input[type="number"] {
            background: #080808 !important; border: 1px solid #222 !important;
            color: var(--red-money) !important; font-family: 'JetBrains Mono';
            text-align: center; font-size: 2rem; border-radius: 12px; width: 100%; padding: 10px;
        }

        .pay-card { background: #080808; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; transition: 0.3s; cursor: pointer; }
        .pay-card:hover { border-color: var(--red-money); transform: translateY(-3px); }
        
        /* Pop-up Modal หรูหรา */
        #qr-modal-overlay {
            position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
        }
        .qr-premium-frame { background: #fff; padding: 20px; border-radius: 3rem; position: relative; border: 8px solid #111; box-shadow: 0 0 60px rgba(255,59,48,0.3); }
        .qr-logo-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; background: #fff; padding: 4px; border-radius: 6px; }
        .p-bar { height: 4px; background: var(--red-money); position: absolute; top: 0; left: 0; transition: width 1s linear; }

        footer { padding: 15px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header class="compact-nav flex justify-between items-center">
        <h1 class="font-black italic uppercase red-glow">SN DESIGN STUDIO</h1>
        <div class="text-right">
            <p id="user-mail" class="text-[9px] font-black text-gray-500 uppercase">AUTHENTICATING...</p>
        </div>
    </header>

    <main>
        <div class="payment-container">
            <div class="text-center mb-6">
                <h2 class="font-black uppercase italic silver-bronze tracking-tight">SN PAYMENT GATEWAY</h2>
                <p class="text-[8px] text-gray-600 font-bold uppercase mt-1">High-End Production Settlement</p>
            </div>

            <div class="mb-6">
                <p class="text-[9px] text-gray-500 font-black text-center mb-2 uppercase tracking-widest">ยอดเติมเงิน (THB)</p>
                <input type="number" id="amount" value="500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="pay-card p-5 flex flex-col items-center gap-3" onclick="pay('pp')">
                    <img src="https://promptpay.io/logo.png" class="w-8">
                    <p class="text-[10px] font-black uppercase italic">PromptPay</p>
                </div>

                <div class="pay-card p-5 flex flex-col items-center gap-3" onclick="pay('tw')">
                    <img src="https://www.truemoney.com/wp-content/uploads/2021/01/logo-truemoney-wallet-300x300.png" class="w-8 rounded-full">
                    <p class="text-[10px] font-black uppercase italic">True Wallet</p>
                </div>
            </div>
        </div>
    </main>

    <div id="qr-modal-overlay">
        <div class="text-center relative">
            <div class="qr-premium-frame mb-6">
                <div id="pBar" class="p-bar" style="width: 100%;"></div>
                <img id="qr-img-display" src="" class="w-64 h-64 rounded-xl">
                <img src="https://upload.wikimedia.org/wikipedia/th/thumb/c/cb/PromptPay-logo.png/1200px-PromptPay-logo.png" class="qr-logo-center">
            </div>
            <p id="display-amt" class="text-5xl font-black italic text-white mb-2">0.00</p>
            <p id="timerText" class="text-xs font-black text-red-600 uppercase mb-8 tracking-widest">EXPIRES IN: 05:00</p>
            <div class="flex gap-2 justify-center">
                <button onclick="downloadQR()" class="px-8 py-3 bg-red-600 text-black font-black text-[10px] rounded-full uppercase">Download QR</button>
                <button onclick="closeQR()" class="px-8 py-3 bg-[#111] text-gray-500 font-black text-[10px] rounded-full uppercase border border-white/5">Cancel</button>
            </div>
        </div>
    </div>

    <footer class="p-6">
        <p class="text-[10px] font-black italic text-[#a55eea]">พัฒนาโดย: ต้องดีแค่ไหน โลกถึงจะจำ</p>
    </footer>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        const CITIZEN_ID = "3100503536486"; // ใส่ไว้ใน Logic ตามสั่ง
        let timerInt;

        async function pay(method) {
            const amt = document.getElementById('amount').value;
            const email = localStorage.getItem('user_email');
            
            if(!amt || amt < 10) return alert("ระบุจำนวนเงินขั้นต่ำ 10 บาท");
            if(!email) return window.location.href = "login.html";

            // ยิง API เต็มระบบตามโครงสร้างดั้งเดิม
            try {
                let endpoint = method === 'pp' ? '/api/scb/create-qr' : '/api/truemoney/create-link';
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: parseInt(amt), email: email, id_card: CITIZEN_ID })
                });
                const data = await res.json();
                
                if (data.success) {
                    if (data.qrImage) openPopUp(data.qrImage, amt);
                    else if (data.url) window.location.href = data.url;
                    startPolling(email); // เริ่มเช็คยอดเพื่อดีดกลับ
                }
            } catch (e) { 
                // จำลองการแสดงผลหน้าบ้านถ้า API ยังไม่พร้อม
                openPopUp(`https://promptpay.io/0812345678/${amt}.png`, amt); 
            }
        }

        function openPopUp(qr, amt) {
            const modal = document.getElementById("qr-modal-overlay");
            document.getElementById("qr-img-display").src = qr;
            document.getElementById("display-amt").innerText = amt + ".00";
            modal.style.display = "flex";

            let time = 300;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById("timerText").innerText = `EXPIRES IN: ${m}:${s < 10 ? '0'+s : s}`;
                document.getElementById("pBar").style.width = (time / 300 * 100) + "%";
                if (--time < 0) closeQR();
            }, 1000);
        }

        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/check-status?email=${email}`);
                    const data = await res.json();
                    if (data.paid) {
                        clearInterval(poll);
                        window.location.href = "create.html"; // ดีดกลับทันที
                    }
                } catch (e) {}
            }, 4000);
        }

        function closeQR() { document.getElementById("qr-modal-overlay").style.display = "none"; clearInterval(timerInt); }
        function downloadQR() {
            const a = document.createElement('a');
            a.href = document.getElementById("qr-img-display").src;
            a.download = `SN-QR-${Date.now()}.png`; a.click();
        }

        window.onload = () => {
            const email = localStorage.getItem('user_email');
            if (email) document.getElementById('user-mail').innerText = email;
            else window.location.href = "login.html";
        };
    </script>
</body>
</html>
