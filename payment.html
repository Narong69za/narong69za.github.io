<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SN PAYMENT GATEWAY v14.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; }
        main { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; } 
        
        /* Premium Silver Bronze Glossy Effect */
        .silver-premium {
            background: linear-gradient(to bottom, #bdbdbd 0%, #ffffff 50%, #8d8d8d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 1px rgba(255,255,255,0.3));
            text-transform: uppercase;
        }

        .electric-input { 
            background: #080808; 
            border-radius: 24px; 
            padding: 30px; 
            border: 1px solid #222; 
            box-shadow: 0 0 40px rgba(0,0,0,1); 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
        }

        .method-btn { 
            background: #0a0a0a; 
            border: 2px solid #222; 
            border-radius: 18px; 
            padding: 20px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        /* Method Colors */
        .btn-scb.active { border-color: #4e2e7f; box-shadow: 0 0 15px rgba(78, 46, 127, 0.4); opacity: 1; }
        .btn-tw.active { border-color: #ff8c00; box-shadow: 0 0 15px rgba(255, 140, 0, 0.4); opacity: 1; }
        .method-btn:not(.active) { opacity: 0.3; }

        /* Modal System */
        #payment-modal { 
            position: fixed; inset: 0; z-[2000]; 
            display: none; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); 
            padding: 20px;
        }

        .modal-content {
            background: #050505;
            border-radius: 40px;
            padding: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-width: 2px;
            border-style: solid;
        }

        /* QR Overlay Logo */
        .qr-container {
            position: relative;
            background: white;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .qr-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: #000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <main>
        <h1 class="text-3xl font-black italic mb-8 silver-premium tracking-tighter">SN PAYMENT GATEWAY</h1>

        <div class="electric-input">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Target Amount (THB)</p>
            <input type="number" id="payAmount" value="500" class="w-full bg-transparent border-none text-white text-6xl font-black text-center outline-none mb-10 font-mono">
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn btn-scb active">
                    <span class="text-[10px] font-black">PROMPTPAY SCB</span>
                </div>
                <div id="btn-tw" onclick="selectMethod('truemoney')" class="method-btn btn-tw">
                    <span class="text-[10px] font-black">TRUEWALLET</span>
                </div>
            </div>

            <button onclick="openPaymentModal()" class="w-full py-6 bg-white text-black font-black rounded-2xl uppercase hover:bg-gray-200 transition-all shadow-2xl text-sm">Execute Payment</button>
        </div>

        <div class="mt-12 text-center">
            <p class="silver-premium text-[11px] font-black tracking-widest">ลิขสิทธิ์ พัฒนาโดย ต้องดีแค่ไหน โลกถึงจะจำ</p>
            <p class="silver-premium text-[9px] font-black mt-1 opacity-80 italic">POWERED BY SN DESIGN STUDIO</p>
        </div>
    </main>

    <div id="payment-modal">
        <div id="modal-border" class="modal-content">
            
            <div class="mb-6">
                <h3 id="modal-title-text" class="text-sm font-black uppercase italic mb-1">SN PAYMENT GATEWAY</h3>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Global Master Proxy 5002</p>
            </div>

            <div id="scb-content">
                <div class="qr-container">
                    <img id="qr-img" src="" class="w-full h-auto rounded-lg">
                    <img src="assets/images/payment.png" class="qr-logo">
                </div>
                <div class="flex justify-center gap-4 mb-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Siam_Commercial_Bank_Logo.svg" class="h-5">
                    <img src="https://x-cash.co/wp-content/uploads/2021/08/PromptPay-Logo.png" class="h-5">
                </div>
                <p class="text-[10px] font-bold text-white/50 mb-4">Scan to Pay (PromptPay/SCB)</p>
            </div>

            <div id="tw-content" class="hidden">
                <div class="bg-[#111] p-6 rounded-3xl border border-orange-500/30 mb-6">
                    <img src="https://www.truemoney.com/wp-content/uploads/2022/03/truemoneywallet-logo.png" class="h-8 mx-auto mb-4">
                    <input type="text" id="twLinkInput" placeholder="Gift Link Here..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-xs text-center outline-none focus:border-orange-500">
                </div>
                <button onclick="submitTW()" class="w-full py-4 bg-[#ff8c00] text-white font-black rounded-xl uppercase text-xs mb-4">Verify Gift Link</button>
            </div>

            <div class="bg-white/5 rounded-2xl p-4 mb-6 border border-white/5">
                <p class="text-[10px] font-black uppercase text-white/40 mb-1">Payment / Time Frame</p>
                <div class="flex items-center justify-center gap-2 text-red-500">
                    <span class="text-lg">⏳</span>
                    <span id="timer" class="text-xl font-black font-mono">05:00</span>
                    <span class="text-[10px] font-bold uppercase ml-1">Minutes</span>
                </div>
            </div>

            <button onclick="closeModal()" class="text-[10px] font-black text-gray-600 uppercase tracking-widest hover:text-white transition-colors">Cancel Payment</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        let currentMethod = 'promptpay';
        let timerInt;

        function selectMethod(m) {
            currentMethod = m;
            document.querySelectorAll('.method-btn').forEach(el => el.classList.remove('active'));
            if(m === 'promptpay') document.getElementById('btn-pp').classList.add('active');
            else document.getElementById('btn-tw').classList.add('active');
        }

        async function openPaymentModal() {
            const amount = document.getElementById("payAmount").value;
            const email = localStorage.getItem('user_email') || 'user@sn-design.dev';
            
            const modal = document.getElementById('payment-modal');
            const border = document.getElementById('modal-border');
            const scbArea = document.getElementById('scb-content');
            const twArea = document.getElementById('tw-content');

            // Set UI colors based on method
            if (currentMethod === 'promptpay') {
                border.style.borderColor = "#4e2e7f";
                scbArea.classList.remove('hidden');
                twArea.classList.add('hidden');
                
                // Fetch QR
                try {
                    const res = await fetch(`${API_BASE}/api/scb`, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify({ amount: parseInt(amount), email }) 
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('qr-img').src = data.qrImage;
                        startTimer();
                        startPolling(email);
                    }
                } catch (e) { alert("API Connection Error"); return; }

            } else {
                border.style.borderColor = "#ff8c00";
                scbArea.classList.add('hidden');
                twArea.classList.remove('hidden');
                startTimer();
            }

            modal.style.display = 'flex';
        }

        async function submitTW() {
            const link = document.getElementById('twLinkInput').value;
            const amount = document.getElementById("payAmount").value;
            const email = localStorage.getItem('user_email') || 'user@sn-design.dev';

            if(!link) return alert("Please enter gift link");

            try {
                const res = await fetch(`${API_BASE}/api/truemoney`, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ amount: parseInt(amount), email, link }) 
                });
                const data = await res.json();
                if (data.success) {
                    alert("Link submitted! Checking status...");
                    startPolling(email);
                }
            } catch (e) { alert("Error submitting link"); }
        }

        function startTimer() {
            let t = 300; 
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (--t < 0) closeModal();
            }, 1000);
        }

        function closeModal() { 
            document.getElementById('payment-modal').style.display = 'none'; 
            clearInterval(timerInt); 
        }

        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/auth/me?email=${email}`);
                    const data = await res.json();
                    if (data.paid_success) { 
                        clearInterval(poll); 
                        alert("Payment Success!");
                        window.location.href = "create.html"; 
                    }
                } catch (e) {}
            }, 5000);
        }
    </script>
</body>
</html>
