<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PAYMENT GATEWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red-money: #ff3b30; --silver: #e2e2e2; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; 
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        
        /* Header ลดขนาดลง 50% */
        .compact-nav { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 24px; }
        .red-glow { text-shadow: 0 0 10px var(--red-money); color: var(--red-money); font-size: 1.25rem; }
        
        /* SN PAYMENT GATEWAY สีบรอนซ์เงินเงา */
        .silver-bronze {
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(226, 235, 240, 0.4);
            font-size: 1.1rem;
        }

        /* กล่องเลือกชำระเงินสไตล์ Compact */
        .pay-card {
            background: #080808; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; transition: 0.3s; cursor: pointer;
        }
        .pay-card:hover { border-color: var(--red-money); transform: translateY(-2px); }
        
        input[type="number"] {
            background: #111 !important; border: 1px solid #222 !important;
            color: var(--red-money) !important; font-family: 'JetBrains Mono';
            text-align: center; font-size: 1.5rem;
        }

        /* ป้องกันการเลื่อน */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        
        .icon-box { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #111; }
    </style>
</head>
<body>

    <header class="compact-nav flex justify-between items-center">
        <h1 class="font-black italic uppercase red-glow">SN DESIGN STUDIO</h1>
        <div class="text-right">
            <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Your Account</p>
            <p id="user-mail" class="text-[10px] font-black text-white">Guest@user</p>
        </div>
    </header>

    <main class="max-w-[500px] mx-auto w-full">
        <div class="text-center mb-8">
            <h2 class="font-black uppercase italic silver-bronze tracking-tight">SN PAYMENT GATEWAY</h2>
            <p class="text-[9px] text-gray-500 font-bold mt-1 uppercase">Secure Settlement Portal</p>
        </div>

        <div class="mb-6">
            <p class="text-[9px] text-gray-500 font-black text-center mb-2 uppercase tracking-widest">ระบุจำนวนเงิน (THB)</p>
            <input type="number" id="amount" placeholder="0" class="w-full p-3 rounded-xl">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="pay-card p-4 flex flex-col items-center gap-3" onclick="pay('pp')">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00b894" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
                </div>
                <p class="text-[10px] font-black uppercase">PromptPay</p>
            </div>

            <div class="pay-card p-4 flex flex-col items-center gap-3 opacity-30 cursor-not-allowed">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e17055" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-8 8M8 8l8 8"/></svg>
                </div>
                <p class="text-[10px] font-black uppercase text-gray-500">True Wallet</p>
            </div>
        </div>

        <div id="qr-box" class="mt-6 hidden animate-pulse border-t border-white/5 pt-6 text-center">
            <div class="bg-white p-2 rounded-xl inline-block">
                <img id="qr-img" src="" class="w-40 h-40">
            </div>
            <p class="text-[9px] font-black text-red-600 mt-3 uppercase">สแกนเพื่อจ่าย ระบบเติมเครดิตทันที</p>
        </div>
    </main>

    <footer class="p-6 text-center border-t border-white/5">
        <p class="text-[9px] font-bold text-gray-700 uppercase tracking-widest mb-1">© SN STUDIO 2026</p>
        <p class="text-[10px] font-black italic text-[#a55eea] shadow-purple-500">พัฒนาโดย: ต้องดีแค่ไหน โลกถึงจะจำ</p>
    </footer>

    <script>
        // ระบบเช็ค Login จากหน้า create.html
        function checkAuth() {
            const email = localStorage.getItem('user_email');
            if (email) {
                document.getElementById('user-mail').innerText = email;
            } else {
                // ถ้าไม่มีข้อมูลอีเมล ให้เด้งกลับไปหน้าล็อคอิน
                alert("เซสชั่นหมดอายุ กรุณาล็อคอินใหม่");
                window.location.href = "login.html";
            }
        }

        async function pay(method) {
            const amt = document.getElementById('amount').value;
            if(!amt || amt < 10) return alert("ขั้นต่ำ 10 บาท");
            
            if(method === 'pp') {
                const qrBox = document.getElementById('qr-box');
                const qrImg = document.getElementById('qr-img');
                
                // จำลองการเรียก API (พอร์ต 3000)
                qrImg.src = `https://promptpay.io/0812345678/${amt}.png`; // ตัวอย่าง
                qrBox.classList.remove('hidden');
            }
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
