<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT GATEWAY - SN DESIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full glass p-8 rounded-[2.5rem]">
        <h1 class="text-2xl font-black text-center text-blue-500 mb-8 uppercase">Reload Credits</h1>
        <div class="bg-white p-4 rounded-3xl mb-6 aspect-square flex items-center justify-center overflow-hidden">
            <div id="qrCode" class="text-slate-900 font-bold italic">GENERATE QR...</div>
        </div>
        <div class="text-center">
            <p class="text-xs text-slate-500 mb-2 uppercase">Scan with any Mobile Banking App</p>
            <div id="paymentStatus" class="text-emerald-400 font-bold animate-pulse">Waiting for transaction...</div>
        </div>
    </div>
    <script src="assets/js/payment.js"></script>
</body>
</html>
