<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PRODUCTION GATEWAY v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red: #ff3b30; --neon: #00ffd5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .compact-nav { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 20px; background: rgba(0,0,0,0.8); }
        .red-cash { color: var(--red); text-shadow: 0 0 10px var(--red); font-size: 14px; font-weight: 900; italic: true; letter-spacing: 2px; }
        .silver-bronze { background: linear-gradient(135deg, #8e9eab, #eef2f3, #8e9eab); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 1.1rem; }
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .payment-card { width: 100%; max-width: 420px; }
        .electric-input { position: relative; background: #080808; border-radius: 15px; padding: 12px; border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 255, 213, 0.1); }
        .electric-input::after { content: ''; position: absolute; inset: -2px; border-radius: 17px; background: linear-gradient(90deg, transparent, var(--neon), transparent); z-index: -1; animation: move-light 3s linear infinite; }
        @keyframes move-light { 0%, 100% { filter: blur(3px); opacity: 0.3; } 50% { opacity: 1; } }
        .credit-display { background: rgba(0,255,213,0.03); border: 1px dashed rgba(0,255,213,0.2); border-radius: 12px; padding: 15px; margin: 12px 0; text-align: center; }
        .method-btn { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; items-center; gap: 6px; padding: 15px; opacity: 0.5; }
        .method-btn.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); opacity: 1; }
        #qr-modal { position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .qr-window { background: #fff; border-radius: 2.5rem; overflow: hidden; width: 340px; border: 4px solid #111; position: relative; box-shadow: 0 0 50px rgba(78, 46, 127, 0.4); }
        .qr-header { background: #4e2e7f; padding: 14px; text-align: center; color: #fff; }
        .qr-body { padding: 30px; position: relative; background: #fff; display: flex; justify-content: center; align-items: center; }
        .qr-logo-overlay { position: absolute; width: 55px; height: 55px; background: #000; padding: 4px; border-radius: 50%; border: 2px solid #ffd700; display: flex; justify-content: center; align-items: center; }
        .qr-logo-overlay img { width: 100%; height: 100%; object-fit: cover; }
        .qr-footer { background: #f8f9fa; padding: 10px; text-align: center; color: #444; font-size: 9px; font-weight: 900; border-top: 1px solid #eee; }
        footer { padding: 15px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header class="compact-nav flex justify-between items-center">
        <h1 class="red-cash uppercase">SN DESIGN STUDIO</h1>
        <div id="user-display" class="text-[9px] font-black text-gray-400 uppercase tracking-widest italic">AUTHENTICATING...</div>
    </header>

    <main>
        <div class="payment-card">
            <div class="text-center mb-6"><h2 class="silver-bronze uppercase italic tracking-[0.2em]">SN PAYMENT GATEWAY</h2></div>

            <div class="electric-input mb-4">
                <span class="text-[8px] font-black text-[#00ffd5] uppercase block mb-1 text-center tracking-widest">Amount (THB)</span>
                <input type="number" id="payAmount" value="500" oninput="calcCredit()" class="w-full bg-transparent border-none text-white text-3xl font-black text-center outline-none font-mono">
            </div>

            <div class="credit-display">
                <div class="text-xl font-black italic"><span id="total-cr">55,000</span> <span class="text-[10px] text-[#00ffd5]">CR</span></div>
                <div id="bonus-box" class="text-[9px] font-black text-[#00ffd5] mt-1 tracking-wider">+ 5,000 BONUS (10% POLICY)</div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn">
                    <img src="https://promptpay.io/logo.png" class="w-7"><span class="text-[9px] font-black uppercase text-white">PromptPay</span>
                </div>
                <div id="btn-tw" onclick="selectMethod('truemoney')" class="method-btn">
                    <img src="https://www.truemoney.com/wp-content/uploads/2021/01/logo-truemoney-wallet-300x300.png" class="w-7 rounded-full"><span class="text-[9px] font-black uppercase text-white">TrueWallet</span>
                </div>
                <div id="btn-stripe" onclick="selectMethod('stripe')" class="method-btn">
                    <svg width="24" height="24" fill="none" stroke="#6366f1" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span class="text-[9px] font-black uppercase text-white">Credit Card</span>
                </div>
                <div id="btn-crypto" onclick="selectMethod('crypto')" class="method-btn">
                    <svg width="24" height="24" fill="none" stroke="#f3ba2f" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a4.5 4.5 0 000 9h5a4.5 4.5 0 010 9H7"/></svg><span class="text-[9px] font-black uppercase text-white">Binance Crypto</span>
                </div>
            </div>

            <div id="tw-input-area" class="hidden mb-4">
                <div class="bg-[#080808] border border-orange-500 p-3 rounded-xl">
                    <span class="text-[8px] font-black text-orange-500 uppercase mb-1 block">Gift Link (ซองอั่งเปา)</span>
                    <input type="text" id="twLink" placeholder="https://gift.truemoney.com/..." class="w-full bg-transparent text-white text-xs outline-none font-mono">
                </div>
            </div>

            <div id="crypto-input-area" class="hidden mb-4">
                <div class="bg-[#080808] border border-yellow-500 p-3 rounded-xl">
                    <span class="text-[8px] font-black text-yellow-500 uppercase mb-1 block">Select Asset</span>
                    <select id="coinType" class="w-full bg-transparent text-white text-xs outline-none">
                        <option value="USDT">USDT (TRC20)</option>
                        <option value="BNB">BNB (BEP20)</option>
                        <option value="TON">TON Network</option>
                        <option value="TRX">TRON (TRX)</option>
                    </select>
                </div>
            </div>

            <button onclick="executePayment()" class="w-full py-4 bg-white text-black font-black text-xs rounded-xl uppercase hover:bg-red-600 hover:text-white transition-all">Execute Settlement</button>
        </div>
    </main>

    <div id="qr-modal">
        <div class="text-center relative">
            <div class="qr-window mb-6">
                <div class="qr-header"><p class="text-[11px] font-black tracking-[0.25em] uppercase">SN PAYMENT CORE</p></div>
                <div class="qr-body">
                    <img id="qr-img" src="" class="w-64 h-64 rounded-lg">
                    <div class="qr-logo-overlay"><img src="assets/images/payment.png" onerror="this.src='https://promptpay.io/logo.png'"></div>
                </div>
                <div class="qr-footer"><p>DEVELOPED BY: ต้องดีแค่ไหน โลกถึงจะจำ</p></div>
            </div>
            <p id="timer" class="text-2xl font-black text-red-600 mb-6 font-mono tracking-widest">05:00</p>
            <div class="flex gap-2 justify-center">
                <button onclick="downloadQR()" class="px-10 py-3 bg-[#00ffd5] text-black font-black text-[11px] rounded-full uppercase shadow-lg">Download</button>
                <button onclick="closeModal()" class="px-10 py-3 bg-[#111] text-gray-500 font-black text-[11px] rounded-full uppercase border border-white/5">Cancel</button>
            </div>
        </div>
    </div>

    <footer><p class="text-[10px] font-black italic text-[#a55eea] tracking-widest text-center">PRODUCTION FINAL v6.0 | © 2026</p></footer>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        const CITIZEN_ID = "3100503536486";
        let currentMethod = 'promptpay';
        let timerInt;

        function calcCredit() {
            const amt = parseFloat(document.getElementById('payAmount').value) || 0;
            const base = amt * 100;
            let bonusRate = (amt >= 1000) ? 0.20 : (amt >= 300) ? 0.10 : (amt >= 100) ? 0.05 : 0;
            const bonus = base * bonusRate;
            document.getElementById('total-cr').innerText = (base + bonus).toLocaleString();
            document.getElementById('bonus-box').innerText = bonus > 0 ? `+ ${bonus.toLocaleString()} BONUS (${bonusRate*100}% POLICY)` : "NO BONUS APPLIED";
        }

        function selectMethod(method) {
            currentMethod = method;
            ['btn-pp', 'btn-tw', 'btn-stripe', 'btn-crypto'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`btn-${method}`).classList.add('active');
            
            const root = document.querySelector(':root');
            document.getElementById("tw-input-area").classList.add("hidden");
            document.getElementById("crypto-input-area").classList.add("hidden");

            if(method === 'promptpay') root.style.setProperty('--neon', '#00ffd5');
            else if(method === 'truemoney') { root.style.setProperty('--neon', '#ff8c00'); document.getElementById("tw-input-area").classList.remove("hidden"); }
            else if(method === 'stripe') root.style.setProperty('--neon', '#6366f1');
            else if(method === 'crypto') { root.style.setProperty('--neon', '#f3ba2f'); document.getElementById("crypto-input-area").classList.remove("hidden"); }
        }

        async function executePayment() {
            const amt = document.getElementById('payAmount').value;
            const email = localStorage.getItem('user_email');
            if(!email) return alert("Session Error. Please Login Again.");

            let endpoint = "";
            let bodyData = { amount: parseInt(amt), email: email, id_card: CITIZEN_ID };

            if(currentMethod === 'promptpay') endpoint = "/api/scb/create-qr";
            else if(currentMethod === 'truemoney') {
                bodyData.link = document.getElementById("twLink").value;
                if(!bodyData.link || !bodyData.link.includes('gift.truemoney.com')) return alert("กรุณาวางลิ้งค์อั่งเปาที่ถูกต้อง");
                endpoint = "/api/truemoney/verify";
            }
            else if(currentMethod === 'stripe') endpoint = "/api/stripe/create-checkout";
            else if(currentMethod === 'crypto') {
                if(parseInt(amt) < 350) return alert("Crypto ขั้นต่ำ 10 USD (350 THB)");
                bodyData.coin = document.getElementById("coinType").value;
                endpoint = "/api/binance/create-order";
            }

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();
                if (data.success) {
                    if (data.qrImage) openModal(data.qrImage, amt);
                    else if (data.url) window.location.href = data.url;
                    startPolling(email);
                } else { alert("Error: " + data.message); }
            } catch (e) {
                if(currentMethod === 'promptpay') openModal(`https://promptpay.io/${CITIZEN_ID}/${amt}.png`, amt);
                else alert("API Offline: กรุณาตรวจสอบการรัน Backend บน VPS");
            }
        }

        function openModal(qr, amt) {
            document.getElementById('qr-img').src = qr;
            document.getElementById('qr-modal').style.display = 'flex';
            let t = 300; clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (--t < 0) closeModal();
            }, 1000);
        }

        async function downloadQR() {
            try {
                const response = await fetch(document.getElementById('qr-img').src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `SN-QR-${Date.now()}.png`;
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url); document.body.removeChild(a);
            } catch (e) { alert("Download failed."); }
        }

        function closeModal() { document.getElementById('qr-modal').style.display = 'none'; clearInterval(timerInt); }
        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/check-status?email=${email}`);
                    const data = await res.json();
                    if(data.paid) { clearInterval(poll); window.location.href = "create.html"; }
                } catch(e) {}
            }, 5000);
        }

        window.onload = () => { calcCredit(); selectMethod('promptpay'); };
    </script>
</body>
</html>
