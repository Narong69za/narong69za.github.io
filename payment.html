<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PREMIUM GATEWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --red: #ff3b30; --bg: #000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header รีดน้ำหนักลง 50% */
        .compact-header { border-bottom: 1px solid rgba(255,59,48,0.2); padding: 8px 20px; background: rgba(0,0,0,0.8); }
        .red-brand { color: var(--red); text-shadow: 0 0 10px var(--red); font-size: 14px; font-weight: 900; italic: true; letter-spacing: 2px; }

        /* SN PAYMENT GATEWAY บรอนซ์เงินเงา */
        .silver-bronze {
            background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 50%, #8e9eab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px; font-weight: 900; text-shadow: 0 0 15px rgba(238, 242, 243, 0.3);
            text-transform: uppercase;
        }

        .input-pay { 
            background: #080808 !important; border: 1px solid #222 !important; 
            color: var(--red) !important; font-family: 'JetBrains Mono'; 
            text-align: center; font-size: 24px; border-radius: 12px;
        }

        .method-card { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; transition: 0.2s; cursor: pointer; }
        .method-card:hover { border-color: var(--red); transform: translateY(-3px); }

        /* Fixed Center Layout */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 20px; }
        
        /* Premium Modal */
        #qr-modal { position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .qr-frame { background: #fff; padding: 20px; border-radius: 2.5rem; position: relative; border: 8px solid #111; }
        .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; background: #fff; padding: 4px; border-radius: 6px; }
        
        .timer-bar { height: 3px; background: var(--red); width: 100%; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <header class="compact-header flex justify-between items-center">
        <h1 class="red-brand uppercase">SN DESIGN STUDIO</h1>
        <div id="user-display" class="text-[9px] font-black text-gray-500 uppercase tracking-widest">GUEST</div>
    </header>

    <main class="w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="silver-bronze uppercase italic tracking-[0.2em]">SN PAYMENT GATEWAY</h2>
            <p class="text-[8px] text-gray-600 font-bold uppercase mt-1">Production High-End Settlement</p>
        </div>

        <div class="w-full mb-6">
            <p class="text-[9px] text-gray-500 font-black text-center mb-2 uppercase">ระบุจำนวนเงิน (THB)</p>
            <input type="number" id="payAmount" value="500" class="w-full p-4 input-pay">
        </div>

        <div class="grid grid-cols-2 gap-3 w-full">
            <div onclick="setMethod('promptpay')" class="method-card p-4 flex flex-col items-center gap-2">
                <img src="https://promptpay.io/logo.png" class="w-8">
                <span class="text-[9px] font-black uppercase">PromptPay</span>
            </div>
            <div onclick="setMethod('truemoney')" class="method-card p-4 flex flex-col items-center gap-2">
                <img src="https://www.truemoney.com/wp-content/uploads/2021/01/logo-truemoney-wallet-300x300.png" class="w-8 rounded-full">
                <span class="text-[9px] font-black uppercase">TrueWallet</span>
            </div>
        </div>

        <div class="w-full mt-4 bg-[#080808] p-3 rounded-xl border border-white/5">
            <p class="text-[8px] text-gray-600 font-black uppercase mb-1">TrueWallet Link / Transaction Ref</p>
            <input type="text" id="tw-ref" placeholder="Paste link here..." class="w-full bg-transparent border-none text-[10px] text-red-500 outline-none">
        </div>
    </main>

    <div id="qr-modal">
        <div class="text-center relative">
            <div class="qr-frame mb-6 shadow-[0_0_60px_rgba(255,59,48,0.2)]">
                <div id="timerBar" class="timer-bar"></div>
                <img id="qrImage" src="" class="w-64 h-64 rounded-xl">
                <img src="https://upload.wikimedia.org/wikipedia/th/thumb/c/cb/PromptPay-logo.png/1200px-PromptPay-logo.png" class="qr-logo">
            </div>
            <p class="text-4xl font-black italic text-white mb-2" id="displayAmount">500.00</p>
            <p id="timerText" class="text-[10px] font-black text-red-600 uppercase mb-6 tracking-widest">EXPIRES IN: 05:00</p>
            <div class="flex gap-2">
                <button onclick="downloadQR()" class="w-full py-3 bg-red-600 text-black font-black text-[10px] rounded-full uppercase">Download QR</button>
                <button onclick="closeQR()" class="w-full py-3 bg-[#111] text-gray-500 font-black text-[10px] rounded-full uppercase border border-white/5">Cancel</button>
            </div>
        </div>
    </div>

    <footer class="p-4 border-top border-white/5 text-center">
        <p class="text-[10px] font-black italic text-[#a55eea]">พัฒนาโดย: ต้องดีแค่ไหน โลกถึงจะจำ</p>
    </footer>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        let pollInterval;

        async function setMethod(method) {
            const amount = document.getElementById("payAmount").value;
            const email = localStorage.getItem('user_email');
            
            if (!email) return alert("กรุณาล็อคอินก่อน");

            try {
                const res = await fetch(`${API_BASE}/api/payment/create`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount, method, email })
                });
                const data = await res.json();
                
                if (data.success && data.qrImage) {
                    showQR(data.qrImage, amount);
                    startPolling(email);
                }
            } catch (e) { alert("API Connection Failed"); }
        }

        function showQR(qr, amt) {
            document.getElementById("qrImage").src = qr;
            document.getElementById("displayAmount").innerText = amt + ".00";
            document.getElementById("qr-modal").style.display = "flex";
            startTimer(300);
        }

        function startTimer(sec) {
            let t = sec;
            const text = document.getElementById("timerText");
            const bar = document.getElementById("timerBar");
            const int = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                text.innerText = `EXPIRES IN: ${m}:${s < 10 ? '0'+s : s}`;
                bar.style.width = (t / sec * 100) + "%";
                if (--t < 0 || document.getElementById("qr-modal").style.display === "none") clearInterval(int);
            }, 1000);
        }

        function startPolling(email) {
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/payment/status?email=${email}`);
                    const data = await res.json();
                    if (data.paid) {
                        clearInterval(pollInterval);
                        alert("จ่ายเงินสำเร็จ! ระบบกำลังพาคุณกลับ");
                        window.location.href = "create.html";
                    }
                } catch (e) {}
            }, 4000);
        }

        function closeQR() { document.getElementById("qr-modal").style.display = "none"; clearInterval(pollInterval); }
        function downloadQR() {
            const a = document.createElement('a');
            a.href = document.getElementById("qrImage").src;
            a.download = `SN-QR-${Date.now()}.png`; a.click();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('user_email');
            if (email) document.getElementById('user-display').innerText = email;
        });
    </script>
</body>
</html>
