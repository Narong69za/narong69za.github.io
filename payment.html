<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN DESIGN PAYMENT CENTER</title>

<link rel="stylesheet" href="/assets/css/payment.css">
<script src="https://cdn.omise.co/omise.js"></script>
</head>

<body>

<div class="payment-root">

<h1>SN DESIGN PAYMENT CENTER</h1>
<div class="payment-grid">

  <div class="engine-card omise" data-method="stripe">
    <h2>💳 OMISE CARD ENGINE</h2>
    <p>Visa / Master / JCB</p>
    <button class="engine-btn">ENTER CARD SYSTEM</button>
  </div>

  <div class="engine-card truemoney" data-method="truemoney">
    <h2>🟠 TRUEMONEY WALLET</h2>
    <p>Direct Wallet Payment</p>
    <button class="engine-btn">CONNECT WALLET</button>
  </div>

  <div class="engine-card scb" data-method="promptpay">
    <h2>🟣 SCB QR ENGINE</h2>
    <p>Dynamic QR Banking</p>
    <button class="engine-btn">GENERATE QR</button>
  </div>

  <div class="engine-card crypto" data-method="crypto">
    <h2>🟡 CRYPTO PAYMENT CORE</h2>
    <p>USDT / BNB / TON</p>
    <button class="engine-btn">OPEN CRYPTO GATE</button>
  </div>

</div>

<div id="paymentStatus" class="status">
  STATUS: IDLE
</div>

</div>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/payment.js"></script>

</body>
</html>
