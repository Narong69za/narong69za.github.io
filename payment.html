<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN PAYMENT GATEWAY | STABLE LUXURY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .silver-premium {
            background: linear-gradient(to bottom, #cfcfcf 0%, #ffffff 50%, #707070 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.3));
        }
        .method-btn { background: rgba(255,255,255,0.03); border: 1px solid #222; transition: 0.3s; }
        .method-btn.active { border-color: red; background: rgba(255,0,0,0.1); } /* ÓĖĢÓĖ▓ÓĖĪ Logic ÓĖ×ÓĖĄÓ╣ł */
        #qr-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(20px); }
        .qr-frame { background: #fff; padding: 20px; border-radius: 24px; position: relative; }
        .p-bar { height: 4px; background: red; position: absolute; top: 0; left: 0; border-radius: 2px; }
        input#payAmount { border-bottom: 2px solid #222; }
    </style>
</head>
<body>

<main class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
    
    <div class="text-center mb-10">
        <h1 class="text-3xl font-black silver-premium italic tracking-tighter uppercase mb-1">SN PAYMENT GATEWAY</h1>
        <p class="silver-premium text-[11px] font-black tracking-widest uppercase">ÓĖ£ÓĖ╣Ó╣ēÓĖ×ÓĖ▒ÓĖÆÓĖÖÓĖ▓ ÓĖĢÓ╣ēÓĖŁÓĖćÓĖöÓĖĄÓ╣üÓĖäÓ╣łÓ╣äÓĖ½ÓĖÖ Ó╣éÓĖźÓĖüÓĖ¢ÓĖČÓĖćÓĖłÓĖ░ÓĖłÓĖ│</p>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-[2.5rem] p-8 backdrop-blur-md">
        <p class="text-center text-[9px] font-black text-white/30 uppercase mb-4 tracking-widest">Amount (THB)</p>
        <input id="payAmount" type="number" value="500" class="w-full bg-transparent text-center text-5xl font-black text-white mb-8 mono outline-none">

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div id="btn-pp" class="method-btn p-3 rounded-xl text-[10px] font-black cursor-pointer text-center" onclick="selectMethod('promptpay')">SCB</div>
            <div id="btn-tw" class="method-btn p-3 rounded-xl text-[10px] font-black cursor-pointer text-center" onclick="selectMethod('truemoney')">TRUE</div>
            <div id="btn-stripe" class="method-btn p-3 rounded-xl text-[10px] font-black cursor-pointer text-center" onclick="selectMethod('stripe')">CARD</div>
        </div>

        <div id="tw-input-section" class="hidden mb-6">
            <input id="twLink" placeholder="https://gift.truemoney.com/..." class="w-full bg-black/40 border border-orange-500/30 p-3 rounded-xl text-white text-[10px] mono outline-none focus:border-orange-500">
        </div>

        <button onclick="executePayment()" class="w-full bg-red-600 hover:bg-red-500 text-white py-5 rounded-2xl font-black tracking-widest text-sm transition-all shadow-xl active:scale-95">
            EXECUTE PAYMENT
        </button>
    </div>

    <div class="mt-8 text-center">
        <p class="silver-premium text-[9px] font-black opacity-60 italic tracking-[0.4em]">POWERED BY SN DESIGN STUDIO</p>
    </div>
</main>

<div id="qr-modal-overlay">
    <div class="modal-card bg-[#050505] rounded-[40px] border border-white/5 w-full max-w-[360px] overflow-hidden">
        
        <div id="modal-header" class="p-4 px-6 flex justify-between items-center bg-red-600 transition-colors">
            <div class="flex flex-col">
                <span class="text-[10px] text-white/70 font-black uppercase">ÓĖźÓĖ┤ÓĖéÓĖ¬ÓĖ┤ÓĖŚÓĖśÓĖ┤Ó╣ī ÓĖ×ÓĖ▒ÓĖÆÓĖÖÓĖ▓Ó╣éÓĖöÓĖó</span>
                <span class="text-xs text-white font-black italic">ÓĖĢÓ╣ēÓĖŁÓĖćÓĖöÓĖĄÓ╣üÓĖäÓ╣łÓ╣äÓĖ½ÓĖÖ Ó╣éÓĖźÓĖüÓĖ¢ÓĖČÓĖćÓĖłÓĖ░ÓĖłÓĖ│</span>
            </div>
            <div class="bg-black p-2 rounded-lg shadow-lg">
                <svg class="w-4 h-4 text-white fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </div>
        </div>

        <div class="p-6 text-center">
            <div class="qr-frame">
                <div id="pBar" class="p-bar" style="width:100%"></div>
                <img id="qr-img-display" class="w-full h-auto rounded-lg">
                <img id="center-logo" src="assets/images/payment.png" class="absolute w-14 h-14 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 hidden rounded-full border-4 border-white bg-black shadow-2xl">
            </div>

            <p id="display-amt" class="text-2xl font-black mono mt-4 text-white"></p>
            <p id="timerText" class="text-red-500 font-bold text-xs mt-2 mono uppercase tracking-widest"></p>

            <div class="mt-8 flex gap-3">
                <button onclick="downloadQR()" class="flex-1 bg-white/10 hover:bg-white/20 py-4 rounded-xl text-[10px] font-black tracking-widest transition-all">DOWNLOAD</button>
                <button onclick="closeQR()" class="flex-1 bg-red-600/20 hover:bg-red-600/40 text-red-500 py-4 rounded-xl text-[10px] font-black tracking-widest transition-all uppercase">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
// ­¤Ü [LOGIC v17.0 - ORIGINAL & STABLE]
const API_BASE = "https://api.sn-designstudio.dev";
const CITIZEN_ID = "3100503536486";

let currentMethod = 'promptpay';
let timerInt, pollInt;

// CREDIT CALC (ÓĖ½Ó╣ēÓĖ▓ÓĖĪÓ╣ĆÓĖøÓĖźÓĖĄÓ╣łÓĖóÓĖÖ)
const BASE_RATE = 100;
const BONUS_TIERS = [
  { min: 1000, bonus: 0.30 },
  { min: 300,  bonus: 0.20 },
  { min: 100,  bonus: 0.10 },
];

function calculateCredit(amount){
    let base = amount * BASE_RATE;
    let bonusPercent = 0;
    for(const t of BONUS_TIERS){ if(amount >= t.min){ bonusPercent = t.bonus; break; } }
    let bonus = Math.floor(base * bonusPercent);
    return { total: base + bonus };
}

// UI LOGIC (ÓĖ½Ó╣ēÓĖ▓ÓĖĪÓ╣ĆÓĖøÓĖźÓĖĄÓ╣łÓĖóÓĖÖ ID)
function selectMethod(method){
    currentMethod = method;
    document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById("tw-input-section").classList.add("hidden");

    if(method === 'truemoney'){
        document.getElementById("btn-tw").classList.add("active");
        document.getElementById("tw-input-section").classList.remove("hidden");
    }else if(method === 'promptpay'){
        document.getElementById("btn-pp").classList.add("active");
    }else if(method === 'stripe'){
        document.getElementById("btn-stripe").classList.add("active");
    }
}

// EXECUTE (ÓĖ½Ó╣ēÓĖ▓ÓĖĪÓ╣ĆÓĖøÓĖźÓĖĄÓ╣łÓĖóÓĖÖ Logic ÓĖüÓĖ▓ÓĖŻÓ╣ĆÓĖŖÓĖĘÓ╣łÓĖŁÓĖĪÓĖĢÓ╣łÓĖŁ)
async function executePayment(){
    const amountInput = document.getElementById("payAmount").value;
    const amount = parseInt(amountInput);
    const email = localStorage.getItem("user_email") || "test@sn.com";

    if(!amount || amount < 10) return alert("ÓĖéÓĖ▒Ó╣ēÓĖÖÓĖĢÓ╣łÓĖ│ 10 ÓĖÜÓĖ▓ÓĖŚ");

    let endpoint = "";
    let payload = { amount, email, id_card: CITIZEN_ID };

    if(currentMethod === 'promptpay') endpoint = "/api/scb/create-qr";
    if(currentMethod === 'truemoney'){
        const link = document.getElementById("twLink").value;
        if(!link || !link.includes("gift.truemoney.com")) return alert("ÓĖĢÓ╣ēÓĖŁÓĖćÓ╣āÓĖ¬Ó╣łÓĖźÓĖ┤Ó╣ēÓĖćÓĖäÓ╣ī TrueMoney");
        payload.link = link;
        endpoint = "/api/truemoney/verify";
    }
    if(currentMethod === 'stripe') endpoint = "/api/stripe/create-checkout";

    try{
        const res = await fetch(API_BASE + endpoint,{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.qrImage) openPopup(data.qrImage, amount);
        else if(data.url) location.href = data.url;
        startPolling(email);
    }catch(e){
        // Fallback (ÓĖĢÓĖ▓ÓĖĪÓĖŚÓĖĄÓ╣łÓĖ×ÓĖĄÓ╣łÓ╣ĆÓĖéÓĖĄÓĖóÓĖÖÓ╣äÓĖ¦Ó╣ē)
        openPopup(`https://promptpay.io/${CITIZEN_ID}/${amount}.png`, amount);
    }
}

// POPUP UI (LOCKED IDs + DYNAMIC COLORS)
function openPopup(qr, amount){
    const modal = document.getElementById("qr-modal-overlay");
    const header = document.getElementById("modal-header");
    const pBar = document.getElementById("pBar");
    const credit = calculateCredit(amount);

    document.getElementById("qr-img-display").src = qr;

    // SCB logo & Dynamic Theme
    const logo = document.getElementById("center-logo");
    if(currentMethod === "promptpay"){
        header.style.backgroundColor = "#4e2e7f"; // SCB Purple
        pBar.style.backgroundColor = "#4e2e7f";
        logo.style.display = "block";
    } else if(currentMethod === "truemoney") {
        header.style.backgroundColor = "#ff8c00"; // TW Orange
        pBar.style.backgroundColor = "#ff8c00";
        logo.style.display = "none";
    } else {
        header.style.backgroundColor = "#0070ba"; // Stripe Blue
        pBar.style.backgroundColor = "#0070ba";
        logo.style.display = "none";
    }

    document.getElementById("display-amt").innerText = amount.toLocaleString() + " THB | +" + credit.total.toLocaleString() + " CR";
    modal.style.display = "flex";

    let t = 300;
    clearInterval(timerInt);
    timerInt = setInterval(()=>{
        let m = Math.floor(t/60); let s = t%60;
        document.getElementById("timerText").innerText = "EXPIRES IN " + m + ":" + (s<10?'0'+s:s);
        document.getElementById("pBar").style.width = (t/300*100)+"%";
        if(--t < 0) closeQR();
    },1000);
}

// POLLING (ÓĖ½Ó╣ēÓĖ▓ÓĖĪÓ╣ĆÓĖøÓĖźÓĖĄÓ╣łÓĖóÓĖÖ)
function startPolling(email){
    clearInterval(pollInt);
    pollInt = setInterval(async ()=>{
        try{
            const res = await fetch(API_BASE + "/api/check-status?email=" + email);
            const data = await res.json();
            if(data.paid){ clearInterval(pollInt); location.href = "create.html"; }
        }catch(e){}
    },3000);
}

function closeQR(){
    document.getElementById("qr-modal-overlay").style.display = "none";
    clearInterval(timerInt);
    clearInterval(pollInt);
}

function downloadQR(){
    const a = document.createElement("a");
    a.href = document.getElementById("qr-img-display").src;
    a.download = "SN-QR-PAYMENT.png";
    a.click();
}

document.addEventListener("DOMContentLoaded",()=> selectMethod("promptpay") );
</script>
</body>
</html>
