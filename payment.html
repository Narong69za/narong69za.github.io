<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SN PRODUCTION v13.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; }
        main { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 115px; } /* 15% Stretch */
        .electric-input { background: #080808; border-radius: 20px; padding: 25px; border: 1px solid #00ffd5; box-shadow: 0 0 20px rgba(0,255,213,0.1); width: 90%; max-width: 400px; }
        .method-btn { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 20px; cursor: pointer; opacity: 0.4; text-align: center; font-size: 10px; font-weight: 900; }
        .method-btn.active { border-color: #00ffd5; box-shadow: 0 0 15px #00ffd5; opacity: 1; }
        #qr-modal { position: fixed; inset: 0; z-[2000]; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <main>
        <div class="electric-input">
            <h2 class="text-center font-black italic uppercase tracking-widest mb-8 text-white/50">SN GATEWAY</h2>
            <input type="number" id="payAmount" value="500" class="w-full bg-transparent border-none text-white text-5xl font-black text-center outline-none mb-10">
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn active">PROMPTPAY</div>
                <div id="btn-stripe" onclick="selectMethod('stripe')" class="method-btn">STRIPE</div>
                <div id="btn-truemoney" onclick="selectMethod('truemoney')" class="method-btn">TRUEMONEY</div>
                <div id="btn-crypto" onclick="selectMethod('crypto')" class="method-btn">BINANCE</div>
            </div>

            <div id="tw-area" class="hidden mb-8">
                <input type="text" id="twLink" placeholder="Gift Link Here..." class="w-full bg-[#111] border border-orange-500/50 p-5 rounded-2xl text-white text-xs outline-none">
            </div>

            <button onclick="executePayment()" class="w-full py-6 bg-white text-black font-black rounded-2xl uppercase hover:bg-red-600 hover:text-white transition-all">Execute Payment</button>
        </div>
    </main>

    <div id="qr-modal">
        <div class="text-center p-10 bg-[#050505] rounded-[3.5rem] border border-red-500/20">
            <img id="qr-img" class="w-64 h-auto rounded-2xl mb-8 border-[6px] border-white">
            <div id="timer" class="text-red-600 font-black mb-8">05:00</div>
            <button onclick="closeQR()" class="text-[9px] font-black text-gray-600 uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        let currentMethod = 'promptpay';
        let timerInt;

        function selectMethod(m) {
            currentMethod = m;
            document.querySelectorAll('.method-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${m}`).classList.add('active');
            document.getElementById("tw-area").classList.toggle("hidden", m !== 'truemoney');
        }

        async function executePayment() {
            const amount = document.getElementById("payAmount").value;
            const email = localStorage.getItem('user_email') || 'user@sn-design.dev';
            const endpoint = `/api/${currentMethod === 'promptpay' ? 'scb' : currentMethod === 'crypto' ? 'admin/crypto' : currentMethod}`;
            const body = { amount: parseInt(amount), email };
            if(currentMethod === 'truemoney') body.link = document.getElementById("twLink").value;

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
                const data = await res.json();
                if (data.success) {
                    if (data.qrImage) { document.getElementById('qr-img').src = data.qrImage; document.getElementById('qr-modal').style.display = 'flex'; startTimer(); startPolling(email); }
                    else if (data.url) window.location.href = data.url;
                }
            } catch (e) { alert("CONNECTION ERROR: Check Port 5002"); }
        }

        function startTimer() {
            let t = 300; clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                document.getElementById('timer').innerText = `EXPIRES IN ${m}:${s < 10 ? '0'+s : s}`;
                if (--t < 0) closeQR();
            }, 1000);
        }

        function closeQR() { document.getElementById('qr-modal').style.display = 'none'; clearInterval(timerInt); }

        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/auth/me?email=${email}`);
                    const data = await res.json();
                    if (data.paid_success) { clearInterval(poll); window.location.href = "create.html"; }
                } catch (e) {}
            }, 5000);
        }
    </script>
</body>
</html>
