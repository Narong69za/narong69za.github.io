<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PRODUCTION GATEWAY v4.0 [STABLE]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red-glow: #ff3b30; --blue-stripe: #6366f1; --gold-crypto: #f59e0b; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        .compact-nav { border-bottom: 1px solid rgba(255,59,48,0.3); padding: 8px 20px; background: rgba(0,0,0,0.8); }
        .red-cash { color: var(--red-glow); text-shadow: 0 0 10px var(--red-glow); font-size: 14px; font-weight: 900; letter-spacing: 2px; }

        .silver-bronze-title {
            background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 50%, #8e9eab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px; font-weight: 900; text-shadow: 0 0 15px rgba(238, 242, 243, 0.3);
            text-transform: uppercase;
        }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 20px; }
        .payment-card { width: 100%; max-width: 420px; }

        .input-group { background: #080808; border: 1px solid #222; border-radius: 12px; padding: 10px; margin-bottom: 8px; }
        .input-label { font-size: 8px; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .input-field { background: transparent; border: none; color: #fff; width: 100%; font-size: 13px; outline: none; font-family: 'JetBrains Mono'; }
        .amount-focus { color: var(--red-glow) !important; font-size: 28px; text-align: center; font-weight: 900; }

        .method-btn { 
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; transition: 0.3s; cursor: pointer; 
            display: flex; flex-direction: column; items-center; gap: 8px; padding: 16px; 
        }
        .method-btn.active { border-color: var(--red-glow); box-shadow: 0 0 15px rgba(255,59,48,0.15); }
        .method-btn:hover { border-color: white; }

        #qr-modal-overlay {
            position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
        }
        .qr-frame { background: #fff; padding: 20px; border-radius: 3rem; position: relative; border: 8px solid #111; box-shadow: 0 0 60px rgba(255,59,48,0.25); }
        .qr-logo-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; background: #fff; padding: 4px; border-radius: 6px; }
        .p-bar { height: 4px; background: var(--red-glow); position: absolute; top: 0; left: 0; transition: width 1s linear; }

        footer { padding: 10px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .dev-purple { color: #a55eea; text-shadow: 0 0 8px rgba(165, 94, 234, 0.4); font-weight: 900; font-size: 11px; }
    </style>
</head>
<body>

<header class="compact-nav flex justify-between items-center">
    <h1 class="red-cash uppercase">SN DESIGN STUDIO</h1>
    <div id="user-display" class="text-[9px] font-black text-gray-500 uppercase tracking-widest">AUTHENTICATING...</div>
</header>

<main>
    <div class="payment-card">
        <div class="text-center mb-6">
            <h2 class="silver-bronze-title tracking-[0.2em]">SN PAYMENT GATEWAY</h2>
        </div>

        <div class="input-group">
            <span class="input-label text-center">Amount (THB)</span>
            <input type="number" id="payAmount" value="500" class="input-field amount-focus">
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn"><span class="text-[9px] font-black text-white">PromptPay</span></div>
            <div id="btn-tw" onclick="selectMethod('truemoney')" class="method-btn"><span class="text-[9px] font-black text-white">TrueWallet</span></div>
            <div id="btn-stripe" onclick="selectMethod('stripe')" class="method-btn"><span class="text-[9px] font-black text-white">Stripe</span></div>
            <div id="btn-crypto" class="method-btn opacity-30"><span class="text-[9px] font-black text-white">Crypto</span></div>
        </div>

        <div id="tw-input-section" class="hidden mb-4">
            <div class="input-group">
                <span class="input-label">TrueWallet Gift Link</span>
                <input type="text" id="twLink" class="input-field text-red-500 text-xs">
            </div>
        </div>

        <button id="main-submit-btn" onclick="executePayment()" class="w-full py-4 bg-white text-black font-black text-xs rounded-xl">Generate QR / Pay Now</button>
    </div>
</main>

<div id="qr-modal-overlay">
    <div class="text-center relative">
        <div class="qr-frame mb-6">
            <div id="pBar" class="p-bar"></div>
            <img id="qr-img-display" src="" class="w-64 h-64 rounded-xl">
        </div>
        <p id="display-amt" class="text-5xl font-black text-white mb-2">0.00</p>
        <p id="timerText" class="text-xs font-black text-red-600 mb-8">EXPIRES IN: 05:00</p>
        <button onclick="closeQR()">Close</button>
    </div>
</div>

<footer><p class="dev-purple">SN DESIGN STUDIO</p></footer>

<script>
const API_BASE = "https://api.sn-designstudio.dev";
let currentMethod = 'promptpay';
let timerInt = null;
let pollInt = null;

// METHOD
function selectMethod(method){
    currentMethod = method;
    document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+(method==='promptpay'?'pp':method==='truemoney'?'tw':method)).classList.add('active');
    document.getElementById('tw-input-section').classList.toggle('hidden', method!=='truemoney');
}

// EXECUTE
async function executePayment(){
    const amount = parseInt(document.getElementById("payAmount").value);
    const email = localStorage.getItem("user_email");
    if(!email) return location.href="login.html";

    let endpoint = "";
    let payload = { amount, email };

    if(currentMethod==='promptpay') endpoint="/api/scb/create-qr";
    if(currentMethod==='truemoney'){
        endpoint="/api/truemoney/verify";
        payload.link=document.getElementById("twLink").value;
    }
    if(currentMethod==='stripe') endpoint="/api/stripe/create-checkout";

    try{
        const res = await fetch(API_BASE+endpoint,{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload)
        });
        const data = await res.json();

        if(data.qrImage) openQR(data.qrImage,amount);
        if(data.url) location.href=data.url;

        startPolling(email);

    }catch(e){
        openQR(`https://promptpay.io/${amount}.png`,amount);
    }
}

// QR
function openQR(src,amt){
    document.getElementById("qr-img-display").src=src;
    document.getElementById("display-amt").innerText=amt;
    document.getElementById("qr-modal-overlay").style.display="flex";
    let t=300;
    clearInterval(timerInt);
    timerInt=setInterval(()=>{
        t--;
        if(t<=0) closeQR();
    },1000);
}

// POLL
function startPolling(email){
    clearInterval(pollInt);
    pollInt=setInterval(async()=>{
        try{
            const r=await fetch(API_BASE+"/api/check-status?email="+email);
            const d=await r.json();
            if(d.paid){
                clearInterval(pollInt);
                location.href="create.html";
            }
        }catch(e){}
    },3000);
}

function closeQR(){
    document.getElementById("qr-modal-overlay").style.display="none";
    clearInterval(timerInt);
    clearInterval(pollInt);
}

document.addEventListener("DOMContentLoaded",()=>{
    const email=localStorage.getItem("user_email");
    if(email) document.getElementById("user-display").innerText=email;
    selectMethod("promptpay");
});
</script>

</body>
</html>
