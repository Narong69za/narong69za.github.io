<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SN ULTRA - PRODUCTION GATEWAY v13.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red: #ff3b30; --neon: #00ffd5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .compact-nav { height: 60px; padding-top: env(safe-area-inset-top); border-bottom: 1px solid rgba(255,255,255,0.05); padding-left: 20px; padding-right: 20px; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .red-cash { color: var(--red); text-shadow: 0 0 10px var(--red); font-size: 14px; font-weight: 900; letter-spacing: 2px; }

        /* [FIX] ปรับ Padding ด้านล่างเพิ่ม 20% เพื่อกันการบีบอัดของ Slot */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 100px; padding-bottom: 115px; }
        .payment-card { width: 90%; max-width: 400px; }

        .silver-bronze { background: linear-gradient(135deg, #8e9eab, #eef2f3, #8e9eab); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 1.2rem; letter-spacing: 0.1em; }

        .electric-input { position: relative; background: #080808; border-radius: 15px; padding: 20px; border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 255, 213, 0.1); margin-bottom: 20px; }
        .electric-input::after { content: ''; position: absolute; inset: -2px; border-radius: 17px; background: linear-gradient(90deg, transparent, var(--neon), transparent); z-index: -1; animation: move-light 3s linear infinite; }
        @keyframes move-light { 0%, 100% { filter: blur(3px); opacity: 0.3; } 50% { opacity: 1; } }

        .method-btn { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; items-center; gap: 8px; padding: 20px; opacity: 0.4; }
        .method-btn.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); opacity: 1; }

        /* [MODAL SCB] */
        #premium-qr-modal { position: fixed; inset: 0; z-[2000]; display: none; align-items: center; justify-content: center; padding: 16px; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); }
        .modal-content { background: #050505; width: 100%; max-width: 380px; border-radius: 3.5rem; padding: 40px; text-align: center; border: 1px solid rgba(239,68,68,0.2); position: relative; overflow: hidden; }

        .hidden { display: none !important; }
        footer { padding: 40px 20px; text-align: center; font-size: 10px; font-weight: 900; color: #a55eea; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header class="compact-nav">
        <h1 class="red-cash uppercase italic">SN DESIGN STUDIO</h1>
        <div id="status-tag" class="text-[8px] font-black text-emerald-500 uppercase tracking-tighter italic">GATEWAY READY v13.0</div>
    </header>

    <main>
        <div class="payment-card">
            <div class="text-center mb-8"><h2 class="silver-bronze uppercase italic tracking-[0.2em]">SN PAYMENT GATEWAY</h2></div>

            <div class="electric-input">
                <span class="text-[9px] font-black text-[#00ffd5] uppercase block mb-1 text-center tracking-widest">Amount (THB)</span>
                <input type="number" id="payAmount" value="500" class="w-full bg-transparent border-none text-white text-5xl font-black text-center outline-none font-mono">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn active"><span class="text-[10px] font-black uppercase text-white">PromptPay</span></div>
                <div id="btn-stripe" onclick="selectMethod('stripe')" class="method-btn"><span class="text-[10px] font-black uppercase text-white">Stripe / Card</span></div>
                <div id="btn-tw" onclicawaitlectMethod('truemoney')" class="method-btn"><span class="text-[10px] font-black uppercase text-white">TrueWallet Link</span></div>
                <div id="btn-crypto" onclick="selectMethod('crypto')" class="method-btn"><span class="text-[10px] font-black uppercase text-white">Binance Crypto</span></div>
            </div>

            <div id="tw-area" class="hidden mb-8">
                <input type="text" id="twLink" placeholder="วางลิ้งค์ซองอั่งเปาที่นี่..." class="w-full bg-[#111] border border-orange-500/50 p-5 rounded-2xl text-white text-xs outline-none font-mono">
            </div>

            <button onclick="executePayment()" class="w-full py-6 bg-white text-black font-black text-sm rounded-2xl uppercase hover:bg-red-600 hover:text-white transition-all shadow-[0_10px_40px_rgba(255,255,255,0.1)]">Execute Settlement</button>
        </div>
    </main>

    <div id="premium-qr-modal">
        <div class="modal-content">
            <div id="pBar" class="absolute top-0 left-0 h-[3px] bg-red-600 w-full transition-all"></div>
            <p class="text-[9px] font-black text-red-500 tracking-[0.5em] mb-4 uppercase">SCB MASTER GATEWAY</p>
            <h2 id="modal-amt" class="text-5xl font-black italic mb-8 text-white">0.00 <span class="text-xs text-red-900">THB</span></h2>
            
            <div class="bg-white p-5 rounded-[2.5rem] mb-8 relative group border-[6px] border-[#111]">
                <img id="qr-img-display" src="" class="w-full h-auto rounded-2xl">
                <button onclick="downloadQR()" class="absolute inset-0 bg-red-600/90 text-white opacity-0 group-hover:opacity-100 transition-all rounded-[2.2rem] font-black flex items-center justify-center uppercase text-xs tracking-widest">Download QR</button>
            </div>
            
            <p id="timerText" class="text-xs font-black text-red-900 uppercase tracking-widest">EXPIRES IN: 05:00</p>
            <button onclick="closeQR()" class="mt-8 text-[9px] font-black text-gray-600 uppercase hover:text-white transition-colors tracking-widest">Cancel Payment</button>
        </div>
    </div>

    <footer><p>SN DESIGN PRODUCTION | GATEWAY 5002</p></footer>

    <script>
const API_BASE = "https://api.sn-designstudio.dev";
const CITIZEN_ID = "3100503536486";

let currentMethod = 'promptpay';
let timerInt, pollInt;

// ===============================
// CREDIT POLICY (SYNC BACKEND)
// ===============================
const BASE_RATE = 100;

const BONUS_TIERS = [
  { min: 1000, bonus: 0.30 },
  { min: 300,  bonus: 0.20 },
  { min: 100,  bonus: 0.10 },
];

function calculateCredit(amount){
    let base = amount * BASE_RATE;
    let bonusPercent = 0;

    for(const t of BONUS_TIERS){
        if(amount >= t.min){
            bonusPercent = t.bonus;
            break;
        }
    }

    let bonus = Math.floor(base * bonusPercent);

    return {
        base,
        bonus,
        total: base + bonus,
        percent: bonusPercent
    };
}

// ===============================
// METHOD
// ===============================
function selectMethod(method){
    currentMethod = method;

    document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById("tw-input-section").classList.add("hidden");

    if(method === 'truemoney'){
        document.getElementById("btn-tw").classList.add("active");
        document.getElementById("tw-input-section").classList.remove("hidden");
    }else if(method === 'promptpay'){
        document.getElementById("btn-pp").classList.add("active");
    }else if(method === 'stripe'){
        document.getElementById("btn-stripe").classList.add("active");
    }
}

// ===============================
// EXECUTE
// ===============================
async function executePayment(){

    const amount = parseInt(document.getElementById("payAmount").value);
    const email = localStorage.getItem("user_email");

    if(!email) return location.href="login.html";
    if(!amount || amount < 10) return alert("ขั้นต่ำ 10 บาท");

    let endpoint = "";
    let payload = { amount, email, id_card: CITIZEN_ID };

    if(currentMethod === 'promptpay'){
        endpoint = "/api/scb/create-qr";
    }

    if(currentMethod === 'truemoney'){
        const link = document.getElementById("twLink").value;

        if(!link || !link.includes("gift.truemoney.com")){
            return alert("ต้องใส่ลิ้งค์ TrueMoney ก่อน");
        }

        payload.link = link;
        endpoint = "/api/truemoney/verify";
    }

    if(currentMethod === 'stripe'){
        endpoint = "/api/stripe/create-checkout";
    }

    try{
        const res = await fetch(API_BASE + endpoint,{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if(data.qrImage){
            openPopup(data.qrImage, amount);
        }
        else if(data.url){
            location.href = data.url;
        }

        startPolling(email);

    }catch(e){
        // fallback QR (แก้ปัญหา SCB ขาว)
        openPopup(`https://promptpay.io/${CITIZEN_ID}/${amount}.png`, amount);
    }
}

// ===============================
// POPUP (STANDARD ทุกระบบ)
// ===============================
function openPopup(qr, amount){

    const modal = document.getElementById("qr-modal-overlay");

    const credit = calculateCredit(amount);

    // inject QR
    document.getElementById("qr-img-display").src = qr;

    // เพิ่ม LOGO เฉพาะ SCB
    if(currentMethod === "promptpay"){
        document.getElementById("qr-img-display").style.position = "relative";

        if(!document.getElementById("center-logo")){
            const logo = document.createElement("img");
            logo.src = "assets/images/payment.png";
            logo.id = "center-logo";
            logo.style.position = "absolute";
            logo.style.width = "60px";
            logo.style.top = "50%";
            logo.style.left = "50%";
            logo.style.transform = "translate(-50%, -50%)";
            document.querySelector(".qr-frame").appendChild(logo);
        }
    }

    // แสดงข้อมูลเงินจริง
    document.getElementById("display-amt").innerText =
        `${amount} บาท | +${credit.total.toLocaleString()} CREDIT`;

    modal.style.display = "flex";

    // TIMER
    let t = 300;
    clearInterval(timerInt);

    timerInt = setInterval(()=>{
        let m = Math.floor(t/60);
        let s = t%60;

        document.getElementById("timerText").innerText =
            `EXPIRES IN: ${m}:${s<10?'0'+s:s}`;

        document.getElementById("pBar").style.width =
            (t/300*100)+"%";

        if(--t < 0) closeQR();
    },1000);
}

// ===============================
// POLLING
// ===============================
function startPolling(email){

    clearInterval(pollInt);

    pollInt = setInterval(async ()=>{
        try{
            const res = await fetch(API_BASE + "/api/check-status?email=" + email);
            const data = await res.json();

            if(data.paid){
                clearInterval(pollInt);
                location.href = "create.html";
            }

        }catch(e){}
    },3000);
}

// ===============================
function closeQR(){
    document.getElementById("qr-modal-overlay").style.display = "none";
    clearInterval(timerInt);
    clearInterval(pollInt);
}

// ===============================
// DOWNLOAD QR (เปลี่ยนปุ่มแดง)
// ===============================
function downloadQR(){
    const a = document.createElement("a");
    a.href = document.getElementById("qr-img-display").src;
    a.download = "SN-PAYMENT-QR.png";
    a.click();
}

// ===============================
document.addEventListener("DOMContentLoaded",()=>{
    const email = localStorage.getItem("user_email");
    if(email) document.getElementById("user-display").innerText = email;

    selectMethod("promptpay");
});
</script>
</body>
</html>
