<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PRODUCTION GATEWAY v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red-glow: #ff3b30; --neon: #00ffd5; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        
        .compact-nav { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 20px; background: rgba(0,0,0,0.8); }
        .red-cash { color: var(--red-glow); text-shadow: 0 0 10px var(--red-glow); font-size: 14px; font-weight: 900; italic: true; letter-spacing: 2px; }

        .silver-bronze-title {
            background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 50%, #8e9eab 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 16px; font-weight: 900; text-shadow: 0 0 15px rgba(238, 242, 243, 0.3);
            text-transform: uppercase;
        }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 20px; }
        .payment-card { width: 100%; max-width: 420px; }

        /* Electric Frame CSS - Dynamic Color */
        .electric-input {
            position: relative; background: #080808; border-radius: 15px; padding: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 213, 0.1); border: 1px solid var(--neon);
            transition: border-color 0.5s ease;
        }
        .electric-input::after {
            content: ''; position: absolute; inset: -2px; border-radius: 17px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            z-index: -1; animation: move-light 3s linear infinite;
        }
        @keyframes move-light { 0%, 100% { filter: blur(3px); opacity: 0.3; } 50% { opacity: 1; } }

        /* Credit Policy Display */
        .credit-display { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin: 12px 0; text-align: center; }
        .total-cr { font-family: 'JetBrains Mono'; font-weight: 900; color: #fff; font-size: 22px; }
        .bonus-tag { font-size: 9px; color: var(--neon); font-weight: 900; text-transform: uppercase; margin-top: 4px; }

        .method-btn { 
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; transition: 0.3s; cursor: pointer; 
            display: flex; flex-direction: column; items-center; gap: 8px; padding: 16px; 
        }
        .method-btn.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); opacity: 1 !important; }
        .method-btn:hover { border-color: white; transform: translateY(-3px); }

        /* Modal & QR Styling */
        #qr-modal-overlay {
            position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
        }
        .qr-window { background: #fff; border-radius: 2.5rem; overflow: hidden; width: 340px; border: 4px solid #111; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .qr-header { background: #4e2e7f; padding: 14px; text-align: center; color: #fff; }
        .qr-body { padding: 30px; position: relative; background: #fff; display: flex; justify-content: center; align-items: center; }
        .qr-logo-overlay { 
            position: absolute; width: 55px; height: 55px; background: #000; padding: 4px; 
            border-radius: 50%; border: 2px solid #ffd700; box-shadow: 0 0 10px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .qr-logo-overlay img { width: 100%; height: 100%; object-fit: cover; }
        .qr-footer { background: #f8f9fa; padding: 10px; text-align: center; color: #444; font-size: 9px; font-weight: 900; border-top: 1px solid #eee; }

        footer { padding: 15px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header class="compact-nav flex justify-between items-center">
        <h1 class="red-cash uppercase">SN DESIGN STUDIO</h1>
        <div id="user-display" class="text-[9px] font-black text-gray-500 uppercase tracking-widest italic">AUTHENTICATING...</div>
    </header>

    <main>
        <div class="payment-card">
            <div class="text-center mb-6">
                <h2 class="silver-bronze-title italic tracking-[0.2em]">SN PAYMENT GATEWAY</h2>
            </div>

            <div class="electric-input mb-4">
                <span class="text-[8px] font-black text-gray-500 uppercase block mb-1 text-center tracking-widest">Amount (THB)</span>
                <input type="number" id="payAmount" value="500" oninput="calculateCredit()" class="w-full bg-transparent border-none text-white text-3xl font-black text-center outline-none font-mono">
            </div>

            <div class="credit-display">
                <div class="total-cr"><span id="total-cr-val">55,000</span> <span class="text-[10px] text-gray-600">CR</span></div>
                <div id="bonus-tag" class="bonus-tag">+ 5,000 BONUS (10% POLICY)</div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" class="text-emerald-500"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm-1-7h2v6h-2z"/></svg>
                    <span class="text-[9px] font-black uppercase text-white">PromptPay</span>
                </div>
                <div id="btn-tw" onclick="selectMethod('truemoney')" class="method-btn">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" class="text-orange-500"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.5 8.5L8.5 15.5M8.5 8.5l7 7"/></svg>
                    <span class="text-[9px] font-black uppercase text-white">TrueWallet</span>
                </div>
                <div id="btn-stripe" onclick="selectMethod('stripe')" class="method-btn">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" class="text-[#6366f1]"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 10h20"/></svg>
                    <span class="text-[9px] font-black uppercase text-white">Stripe / Card</span>
                </div>
                <div id="btn-crypto" onclick="selectMethod('crypto')" class="method-btn">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" class="text-yellow-500"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v20M17 5H9.5a4.5 4.5 0 000 9h5a4.5 4.5 0 010 9H7M3 3l18 18M3 21l18-18"/></svg>
                    <span class="text-[9px] font-black uppercase text-white">Binance Crypto</span>
                </div>
            </div>

            <div id="tw-section" class="hidden mb-4">
                <div class="input-group">
                    <input type="text" id="twLink" placeholder="Gift Link: https://gift.truemoney.com/..." class="input-field text-red-500 text-[10px]">
                </div>
            </div>

            <button id="main-btn" onclick="executePayment()" class="w-full py-4 bg-white text-black font-black text-xs rounded-xl uppercase hover:bg-red-600 hover:text-white transition-all">Execute Settlement</button>
        </div>
    </main>

    <div id="qr-modal-overlay">
        <div class="text-center">
            <div class="qr-window mb-6">
                <div class="qr-header">
                    <p class="text-[11px] font-black tracking-[0.25em] uppercase">SN PAYMENT CORE</p>
                    <p class="text-[7px] font-bold opacity-60 uppercase">Licensed by SN DESIGN STUDIO</p>
                </div>
                <div class="qr-body">
                    <img id="qr-img-display" src="" class="w-64 h-64 rounded-xl">
                    <div class="qr-logo-overlay"><img src="assets/images/payment.png"></div>
                </div>
                <div class="qr-footer"><p>DEVELOPED BY: ต้องดีแค่ไหน โลกถึงจะจำ</p></div>
            </div>
            <p id="timer" class="text-3xl font-black text-red-600 mb-6 font-mono tracking-widest">05:00</p>
            <div class="flex gap-2 justify-center">
                <button onclick="downloadQR()" class="px-10 py-3 bg-white text-black font-black text-[10px] rounded-full uppercase">Download</button>
                <button onclick="closeModal()" class="px-10 py-3 bg-[#111] text-gray-500 font-black text-[10px] rounded-full uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <footer><p class="dev-purple text-[10px] italic font-black uppercase tracking-widest">Production Final v4.8 | © 2026</p></footer>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        const CITIZEN_ID = "3100503536486";
        let currentMethod = 'promptpay';
        let timerInt;

        function calculateCredit() {
            const amt = parseFloat(document.getElementById('payAmount').value) || 0;
            const base = amt * 100;
            let bonusRate = 0;
            if (amt >= 1000) bonusRate = 0.20;
            else if (amt >= 300) bonusRate = 0.10;
            else if (amt >= 100) bonusRate = 0.05;

            const bonus = base * bonusRate;
            document.getElementById('total-cr-val').innerText = (base + bonus).toLocaleString();
            document.getElementById('bonus-tag').innerText = bonus > 0 ? `+ ${bonus.toLocaleString()} BONUS (${bonusRate*100}% POLICY)` : "NO BONUS APPLIED";
        }

        function selectMethod(method) {
            currentMethod = method;
            const btns = ['btn-pp', 'btn-tw', 'btn-stripe', 'btn-crypto'];
            btns.forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`btn-${method}`).classList.add('active');
            
            const root = document.querySelector(':root');
            const twSec = document.getElementById("tw-section");
            twSec.classList.add("hidden");

            if(method === 'promptpay') root.style.setProperty('--neon', '#00ffd5');
            else if(method === 'truemoney') { root.style.setProperty('--neon', '#ff8c00'); twSec.classList.remove("hidden"); }
            else if(method === 'stripe') root.style.setProperty('--neon', '#6366f1');
            else if(method === 'crypto') root.style.setProperty('--neon', '#f3ba2f');
        }

        async function executePayment() {
            const amt = document.getElementById('payAmount').value;
            const email = localStorage.getItem('user_email');
            if(!email) return window.location.href = "login.html";

            let endpoint = "";
            let bodyData = { amount: parseInt(amt), email: email, id_card: CITIZEN_ID };

            if(currentMethod === 'promptpay') endpoint = "/api/scb/create-qr";
            else if(currentMethod === 'truemoney') {
                endpoint = "/api/truemoney/verify";
                bodyData.link = document.getElementById("twLink").value;
                if(!bodyData.link.includes('gift.truemoney.com')) return alert("ลิ้งค์ซองไม่ถูกต้อง");
            }
            else if(currentMethod === 'stripe') endpoint = "/api/stripe/create-checkout";
            else if(currentMethod === 'crypto') {
                if(parseInt(amt) < 350) return alert("Crypto ขั้นต่ำ 10 USD (350 THB)");
                endpoint = "/api/binance/create-order";
            }

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();
                if (data.success) {
                    if (data.qrImage) openModal(data.qrImage, amt);
                    else if (data.url) window.location.href = data.url;
                    startPolling(email);
                }
            } catch (e) {
                if(currentMethod === 'promptpay') openModal(`https://promptpay.io/${CITIZEN_ID}/${amt}.png`, amt);
            }
        }

        function openModal(qr, amt) {
            document.getElementById('qr-img-display').src = qr;
            document.getElementById('qr-modal-overlay').style.display = 'flex';
            let t = 300;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (--t < 0) closeModal();
            }, 1000);
        }

        function closeModal() { document.getElementById('qr-modal-overlay').style.display = 'none'; clearInterval(timerInt); }

        function downloadQR() {
            const link = document.createElement('a');
            link.href = document.getElementById('qr-img-display').src;
            link.download = `SN-QR-${Date.now()}.png`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/check-status?email=${email}`);
                    const data = await res.json();
                    if (data.paid) { clearInterval(poll); window.location.href = "create.html"; }
                } catch (e) {}
            }, 5000);
        }

        window.onload = () => {
            const email = localStorage.getItem('user_email');
            if (email) document.getElementById('user-display').innerText = email;
            calculateCredit(); selectMethod('promptpay');
        };
    </script>
</body>
</html>
