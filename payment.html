<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DESIGN STUDIO - PAYMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #020406; color: white; margin: 0; padding: 20px; }
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .btn-pay { transition: all 0.2s; }
        .btn-pay:active { transform: scale(0.95); }
        #qrDisplay { display: none; margin-top: 20px; text-align: center; background: white; color: black; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-blue-400">SN DESIGN STUDIO</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <button data-method="promptpay" class="glass p-4 text-xs font-bold btn-pay">PROMPTPAY</button>
            <button data-method="truemoney" class="glass p-4 text-xs font-bold btn-pay">TRUE WALLET</button>
            <button data-method="stripe" class="glass p-4 text-xs font-bold btn-pay">STRIPE</button>
            <button data-method="crypto" class="glass p-4 text-xs font-bold btn-pay">CRYPTO</button>
        </div>

        <div id="paymentBox" class="glass p-6 min-h-[200px] flex flex-col items-center justify-center">
            <p class="text-slate-500 text-sm">กรุณาเลือกช่องทางชำระเงินด้านบน</p>
        </div>

        <div id="qrDisplay" class="max-w-xs mx-auto">
            <h3 class="font-bold">สแกนจ่ายเงิน</h3>
            <p id="amtText" class="text-purple-700 font-bold text-xl"></p>
            <div id="qrFrame" class="my-4"></div>
            <p id="timerText" class="text-xs text-slate-400 font-mono"></p>
            <button onclick="location.reload()" class="mt-4 text-xs underline">ยกเลิกรายการ</button>
        </div>

        <p id="paymentStatus" class="text-center mt-8 text-[10px] text-slate-600 tracking-widest uppercase">Status: Idle</p>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/payment.js"></script>
</body>
</html>
