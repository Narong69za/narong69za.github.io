<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN PAYMENT GATEWAY</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif}
.method-btn{border:1px solid #222;padding:15px;border-radius:12px;cursor:pointer;text-align:center}
.method-btn.active{border-color:red}
#qr-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:999}
.qr-frame{background:#fff;padding:20px;border-radius:20px;position:relative}
.p-bar{height:4px;background:red;position:absolute;top:0;left:0}
</style>
</head>

<body>

<div class="p-4 max-w-md mx-auto">

<h1 class="text-center text-red-500 font-black text-xl">SN PAYMENT GATEWAY</h1>
<p class="text-center text-sm mb-4">ต้องดีแค่ไหน โลกถึงจะจำ</p>

<input id="payAmount" type="number" value="500" class="w-full p-3 text-center text-black mb-4">

<div class="grid grid-cols-3 gap-2 mb-4">
<div id="btn-pp" class="method-btn" onclick="selectMethod('promptpay')">SCB</div>
<div id="btn-tw" class="method-btn" onclick="selectMethod('truemoney')">TRUE</div>
<div id="btn-stripe" class="method-btn" onclick="selectMethod('stripe')">CARD</div>
</div>

<div id="tw-input-section" class="hidden mb-4">
<input id="twLink" placeholder="https://gift.truemoney.com/..." class="w-full p-2 text-black">
</div>

<button onclick="executePayment()" class="w-full bg-red-500 p-3 font-bold">EXECUTE PAYMENT</button>

</div>

<!-- POPUP -->
<div id="qr-modal-overlay">
<div class="text-center">

<div class="qr-frame">
<div id="pBar" class="p-bar" style="width:100%"></div>

<img id="qr-img-display" class="w-64 h-64">

<img id="center-logo" src="assets/images/payment.png"
style="position:absolute;width:60px;top:50%;left:50%;transform:translate(-50%,-50%);display:none">

</div>

<p id="display-amt" class="text-2xl mt-4"></p>
<p id="timerText" class="text-red-500"></p>

<div class="mt-4 flex gap-2 justify-center">
<button onclick="downloadQR()" class="bg-red-500 px-4 py-2">Download QR</button>
<button onclick="closeQR()" class="bg-gray-700 px-4 py-2">Cancel</button>
</div>

</div>
</div>

<script>
const API_BASE = "https://api.sn-designstudio.dev";
const CITIZEN_ID = "3100503536486";

let currentMethod = 'promptpay';
let timerInt, pollInt;

// CREDIT
const BASE_RATE = 100;
const BONUS_TIERS = [
  { min: 1000, bonus: 0.30 },
  { min: 300,  bonus: 0.20 },
  { min: 100,  bonus: 0.10 },
];

function calculateCredit(amount){
    let base = amount * BASE_RATE;
    let bonusPercent = 0;

    for(const t of BONUS_TIERS){
        if(amount >= t.min){
            bonusPercent = t.bonus;
            break;
        }
    }

    let bonus = Math.floor(base * bonusPercent);

    return {
        total: base + bonus
    };
}

// METHOD
function selectMethod(method){
    currentMethod = method;

    document.querySelectorAll('.method-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById("tw-input-section").classList.add("hidden");

    if(method === 'truemoney'){
        document.getElementById("btn-tw").classList.add("active");
        document.getElementById("tw-input-section").classList.remove("hidden");
    }else if(method === 'promptpay'){
        document.getElementById("btn-pp").classList.add("active");
    }else if(method === 'stripe'){
        document.getElementById("btn-stripe").classList.add("active");
    }
}

// EXECUTE
async function executePayment(){

    const amount = parseInt(document.getElementById("payAmount").value);
    const email = localStorage.getItem("user_email") || "test@sn.com";

    if(!amount || amount < 10) return alert("ขั้นต่ำ 10 บาท");

    let endpoint = "";
    let payload = { amount, email, id_card: CITIZEN_ID };

    if(currentMethod === 'promptpay') endpoint = "/api/scb/create-qr";

    if(currentMethod === 'truemoney'){
        const link = document.getElementById("twLink").value;
        if(!link || !link.includes("gift.truemoney.com")) return alert("ต้องใส่ลิ้งค์ TrueMoney");
        payload.link = link;
        endpoint = "/api/truemoney/verify";
    }

    if(currentMethod === 'stripe') endpoint = "/api/stripe/create-checkout";

    try{
        const res = await fetch(API_BASE + endpoint,{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if(data.qrImage){
            openPopup(data.qrImage, amount);
        }else if(data.url){
            location.href = data.url;
        }

        startPolling(email);

    }catch(e){
        openPopup(`https://promptpay.io/${CITIZEN_ID}/${amount}.png`, amount);
    }
}

// POPUP
function openPopup(qr, amount){

    const modal = document.getElementById("qr-modal-overlay");
    const credit = calculateCredit(amount);

    document.getElementById("qr-img-display").src = qr;

    // SCB logo
    const logo = document.getElementById("center-logo");
    logo.style.display = (currentMethod === "promptpay") ? "block" : "none";

    document.getElementById("display-amt").innerText =
        amount + " บาท | +" + credit.total + " CREDIT";

    modal.style.display = "flex";

    let t = 300;
    clearInterval(timerInt);

    timerInt = setInterval(()=>{
        let m = Math.floor(t/60);
        let s = t%60;

        document.getElementById("timerText").innerText =
            "EXPIRES: " + m + ":" + (s<10?'0'+s:s);

        document.getElementById("pBar").style.width = (t/300*100)+"%";

        if(--t < 0) closeQR();
    },1000);
}

// POLLING
function startPolling(email){
    clearInterval(pollInt);

    pollInt = setInterval(async ()=>{
        try{
            const res = await fetch(API_BASE + "/api/check-status?email=" + email);
            const data = await res.json();

            if(data.paid){
                clearInterval(pollInt);
                location.href = "create.html";
            }

        }catch(e){}
    },3000);
}

function closeQR(){
    document.getElementById("qr-modal-overlay").style.display = "none";
    clearInterval(timerInt);
    clearInterval(pollInt);
}

function downloadQR(){
    const a = document.createElement("a");
    a.href = document.getElementById("qr-img-display").src;
    a.download = "SN-QR.png";
    a.click();
}

document.addEventListener("DOMContentLoaded",()=>{
    selectMethod("promptpay");
});
</script>

</body>
</html>
