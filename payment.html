<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE PAYMENT - SN DESIGN STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05070a; color: white; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .qr-gradient { background: linear-gradient(135deg, #00ffae 0%, #00c8ff 100%); }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-blue-500">RELOAD CREDITS</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest mt-2">Secure Gateway v2026</p>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-slate-800 py-3 rounded-2xl text-xs font-bold hover:bg-emerald-500/20 transition-all border border-transparent hover:border-emerald-500">100 Credits - ฿100</button>
                <button class="bg-slate-800 py-3 rounded-2xl text-xs font-bold hover:bg-emerald-500/20 transition-all border border-transparent hover:border-emerald-500">500 Credits - ฿450</button>
            </div>

            <div class="bg-white p-6 rounded-3xl aspect-square flex flex-col items-center justify-center relative overflow-hidden">
                <div id="qrCode" class="w-full h-full flex items-center justify-center text-slate-900 font-bold italic">
                    <p class="text-xs">GENERATING QR...</p>
                </div>
                <div class="absolute bottom-0 w-full h-2 qr-gradient"></div>
            </div>

            <div class="text-center space-y-2">
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter">สแกนเพื่อชำระเงินผ่านแอปธนาคารทุกประเภท</p>
                <div class="flex items-center justify-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span id="paymentStatus" class="text-xs font-bold text-emerald-400">รอรับยอดเงิน...</span>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/payment.js"></script>
</body>
</html>
