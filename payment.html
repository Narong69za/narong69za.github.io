<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN DESIGN PAYMENT ENGINE</title>

<link rel="stylesheet" href="/assets/css/payment.css">

<style>
/* ================================
   GLOBAL THEME (а№‚аё„аёЈаё‡аёЄаёЈа№‰аёІаё‡а№Ђаё”аёґаёЎ)
================================ */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000000 60%);
  color:white;
}
.payment-header{ text-align:center; padding:50px 20px 20px; }
.payment-header h1{ font-size:28px; letter-spacing:3px; margin-bottom:10px; }
.payment-header p{ opacity:0.6; }
.payment-grid{ max-width:1100px; margin:40px auto; display:grid; grid-template-columns:repeat(2,1fr); gap:35px; padding:0 20px 60px; }
.engine-card{ background:linear-gradient(145deg,#0b0b0b,#111); border-radius:20px; padding:40px; text-align:center; border:1px solid rgba(255,255,255,0.08); transition:all .3s ease; cursor:pointer; position:relative; }
.engine-card:hover{ transform:translateY(-8px); box-shadow:0 0 40px rgba(255,0,0,.35); }
.engine-card h2{ margin-bottom:10px; font-size:22px; letter-spacing:1px; }
.engine-card p{ opacity:0.7; margin-bottom:25px; }
.engine-btn{ padding:16px 34px; border-radius:50px; border:none; font-weight:bold; font-size:14px; cursor:pointer; transition:all .25s ease; }

/* а№Ђаё‰аё”аёЄаёµа№Ђаё”аёґаёЎаё‚аё­аё‡аёЎаё¶аё‡ (а№Ђаё›аёҐаёµа№€аёўаё™а№Ѓаё„а№€аёЉаё·а№€аё­ Class аё€аёІаёЃ omise а№Ђаё›а№‡аё™ stripe) */
.stripe .engine-btn{ background:gold; color:black; }
.truemoney .engine-btn{ background:#ff7a00; color:white; }
.scb .engine-btn{ background:#6a1b9a; color:white; }
.crypto .engine-btn{ background:#ffd600; color:black; }

.engine-btn:hover{ transform:scale(1.05); }
.payment-box{ max-width:800px; margin:40px auto; padding:30px; background:#0b0b0b; border-radius:20px; border:1px solid rgba(255,255,255,0.1); }
.status{ text-align:center; margin:30px 0 60px; color:#00ffd5; font-weight:bold; letter-spacing:2px; }

@media(max-width:768px){ .payment-grid{ grid-template-columns:1fr; } }
</style>

</head>
<body>

<div class="payment-header">
  <h1>SN DESIGN PAYMENT ENGINE</h1>
  <p>Enterprise AI Payment Console</p>
</div>

<div class="payment-grid">

  <div class="engine-card stripe" data-method="stripe">
    <h2>рџ’ STRIPE CARD ENGINE</h2>
    <p>Visa / Master / JCB Secure Gateway</p>
    <button class="engine-btn">ENTER CARD SYSTEM</button>
  </div>

  <div class="engine-card truemoney" data-method="truemoney">
    <h2>рџџ TRUEMONEY WALLET</h2>
    <p>Direct Wallet Integration</p>
    <button class="engine-btn">CONNECT WALLET</button>
  </div>

  <div class="engine-card scb" data-method="promptpay">
    <h2>рџџ SCB QR ENGINE</h2>
    <p>Dynamic PromptPay QR</p>
    <button class="engine-btn">GENERATE QR</button>
  </div>

  <div class="engine-card crypto" data-method="crypto">
    <h2>рџџ CRYPTO PAYMENT CORE</h2>
    <p>USDT / BNB / TON Gateway</p>
    <button class="engine-btn">OPEN CRYPTO GATE</button>
  </div>

</div>

<div id="paymentBox" class="payment-box">
  </div>

<div id="paymentStatus" class="status">
  STATUS: IDLE
</div>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/payment.js"></script>

</body>
</html>
