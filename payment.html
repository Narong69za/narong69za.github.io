<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PRODUCTION GATEWAY v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red-money: #ff3b30; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        
        /* Header รีดลง 50% แดงรับทรัพย์ */
        .compact-nav { border-bottom: 1px solid rgba(255,59,48,0.3); padding: 8px 20px; background: rgba(0,0,0,0.8); }
        .red-cash { color: var(--red-money); text-shadow: 0 0 10px var(--red-money); font-size: 14px; font-weight: 900; italic: true; letter-spacing: 2px; }

        /* SN PAYMENT GATEWAY บรอนซ์เงินเงา */
        .silver-bronze-title {
            background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 50%, #8e9eab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px; font-weight: 900; text-shadow: 0 0 15px rgba(238, 242, 243, 0.3);
            text-transform: uppercase;
        }

        /* ตรึงหน้า Layout (No Scroll) */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 20px; }
        .payment-card { width: 100%; max-width: 400px; }

        /* Input Styles */
        .input-group { background: #080808; border: 1px solid #222; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
        .input-label { font-size: 8px; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .input-field { background: transparent; border: none; color: #fff; width: 100%; font-size: 13px; outline: none; font-family: 'JetBrains Mono'; }
        .amount-focus { color: var(--red-money) !important; font-size: 28px; text-align: center; font-weight: 900; }

        /* Payment Methods */
        .method-btn { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; transition: 0.3s; cursor: pointer; }
        .method-btn.active { border-color: var(--red-money); box-shadow: 0 0 15px rgba(255,59,48,0.1); }

        /* Pop-up Modal หรูหรา */
        #qr-modal-overlay {
            position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
        }
        .qr-frame { background: #fff; padding: 20px; border-radius: 3rem; position: relative; border: 8px solid #111; box-shadow: 0 0 60px rgba(255,59,48,0.25); }
        .qr-logo-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; background: #fff; padding: 4px; border-radius: 6px; }
        .p-bar { height: 4px; background: var(--red-money); position: absolute; top: 0; left: 0; transition: width 1s linear; }

        footer { padding: 10px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .dev-purple { color: #a55eea; text-shadow: 0 0 8px rgba(165, 94, 234, 0.4); font-weight: 900; font-size: 11px; }
    </style>
</head>
<body>

    <header class="compact-nav flex justify-between items-center">
        <h1 class="red-cash uppercase">SN DESIGN STUDIO</h1>
        <div id="user-display" class="text-[9px] font-black text-gray-500 uppercase tracking-widest italic">AUTHENTICATING...</div>
    </header>

    <main>
        <div class="payment-card">
            <div class="text-center mb-6">
                <h2 class="silver-bronze-title italic tracking-[0.2em]">SN PAYMENT GATEWAY</h2>
            </div>

            <div class="input-group">
                <span class="input-label text-center">Amount (THB)</span>
                <input type="number" id="payAmount" value="100" class="input-field amount-focus">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn p-4 flex flex-col items-center gap-2">
                    <img src="https://promptpay.io/logo.png" class="w-8">
                    <span class="text-[9px] font-black uppercase">PromptPay</span>
                </div>
                <div id="btn-tw" onclick="selectMethod('truemoney')" class="method-btn p-4 flex flex-col items-center gap-2">
                    <img src="https://www.truemoney.com/wp-content/uploads/2021/01/logo-truemoney-wallet-300x300.png" class="w-8 rounded-full">
                    <span class="text-[9px] font-black uppercase">TrueWallet</span>
                </div>
            </div>

            <div id="tw-input-section" class="hidden">
                <div class="input-group">
                    <span class="input-label">TrueWallet Gift Link (อั่งเปา)</span>
                    <input type="text" id="twLink" placeholder="https://gift.truemoney.com/..." class="input-field text-red-500">
                </div>
                <button onclick="submitTrueMoney()" class="w-full py-4 bg-red-600 text-black font-black text-xs rounded-xl uppercase hover:bg-white transition-all">Confirm Payment</button>
            </div>

            <button id="pp-submit-btn" onclick="submitPromptPay()" class="w-full py-4 bg-white text-black font-black text-xs rounded-xl uppercase hover:bg-red-600 hover:text-white transition-all">Generate QR Code</button>

        </div>
    </main>

    <div id="qr-modal-overlay">
        <div class="text-center relative">
            <div class="qr-frame mb-6">
                <div id="pBar" class="p-bar" style="width: 100%;"></div>
                <img id="qr-img-display" src="" class="w-64 h-64 rounded-xl">
                <img src="https://upload.wikimedia.org/wikipedia/th/thumb/c/cb/PromptPay-logo.png/1200px-PromptPay-logo.png" class="qr-logo-center">
            </div>
            <p id="display-amt" class="text-5xl font-black italic text-white mb-2">0.00</p>
            <p id="timerText" class="text-xs font-black text-red-600 uppercase mb-8">EXPIRES IN: 05:00</p>
            <div class="flex gap-2 justify-center">
                <button onclick="downloadQR()" class="px-8 py-3 bg-red-600 text-black font-black text-[10px] rounded-full uppercase">Download QR</button>
                <button onclick="closeQR()" class="px-8 py-3 bg-[#111] text-gray-500 font-black text-[10px] rounded-full uppercase border border-white/5">Cancel</button>
            </div>
        </div>
    </div>

    <footer>
        <p class="dev-purple italic">พัฒนาโดย: ต้องดีแค่ไหน โลกถึงจะจำ</p>
    </footer>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        const CITIZEN_ID = "3100503536486";
        let timerInt;

        // ฟังก์ชันสลับ UI
        function selectMethod(method) {
            const twSection = document.getElementById("tw-input-section");
            const ppBtn = document.getElementById("pp-submit-btn");
            const btnPP = document.getElementById("btn-pp");
            const btnTW = document.getElementById("btn-tw");

            // ลบสถานะ Active ทั้งหมด
            btnPP.classList.remove("active");
            btnTW.classList.remove("active");

            if(method === 'truemoney') {
                twSection.classList.remove("hidden");
                ppBtn.classList.add("hidden");
                btnTW.classList.add("active");
            } else {
                twSection.classList.add("hidden");
                ppBtn.classList.remove("hidden");
                btnPP.classList.add("active");
            }
        }

        // จ่ายผ่าน PromptPay (เด้ง Pop-up)
        async function submitPromptPay() {
            const amt = document.getElementById("payAmount").value;
            const email = localStorage.getItem('user_email');
            
            try {
                const res = await fetch(`${API_BASE}/api/scb/create-qr`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: parseInt(amt), email: email, id_card: CITIZEN_ID })
                });
                const data = await res.json();
                if (data.success) {
                    openPopUp(data.qrImage, amt);
                    startPolling(email);
                }
            } catch (e) {
                // Mockup สำหรับเทสหน้าบ้าน
                openPopUp(`https://promptpay.io/0812345678/${amt}.png`, amt);
            }
        }

        // จ่ายผ่าน TrueMoney (ส่งลิงก์อั่งเปา)
        async function submitTrueMoney() {
            const amt = document.getElementById("payAmount").value;
            const link = document.getElementById("twLink").value;
            const email = localStorage.getItem('user_email');

            if(!link.includes('gift.truemoney.com')) return alert("กรุณาวางลิ้งค์ซองอั่งเปาที่ถูกต้อง");

            try {
                const res = await fetch(`${API_BASE}/api/truemoney/verify`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: parseInt(amt), email: email, link: link, id_card: CITIZEN_ID })
                });
                const data = await res.json();
                if (data.success) {
                    alert("ตรวจสอบสำเร็จ! เครดิตจะเข้าในไม่ช้า");
                    window.location.href = "create.html";
                } else {
                    alert("ล้มเหลว: " + data.message);
                }
            } catch (e) { alert("API Connection Failed"); }
        }

        function openPopUp(qr, amt) {
            const modal = document.getElementById("qr-modal-overlay");
            document.getElementById("qr-img-display").src = qr;
            document.getElementById("display-amt").innerText = amt + ".00";
            modal.style.display = "flex";

            let time = 300;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById("timerText").innerText = `EXPIRES IN: ${m}:${s < 10 ? '0'+s : s}`;
                document.getElementById("pBar").style.width = (time / 300 * 100) + "%";
                if (--time < 0) closeQR();
            }, 1000);
        }

        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/check-status?email=${email}`);
                    const data = await res.json();
                    if (data.paid) {
                        clearInterval(poll);
                        window.location.href = "create.html";
                    }
                } catch (e) {}
            }, 4000);
        }

        function closeQR() { document.getElementById("qr-modal-overlay").style.display = "none"; clearInterval(timerInt); }
        function downloadQR() {
            const a = document.createElement('a');
            a.href = document.getElementById("qr-img-display").src;
            a.download = `SN-QR-${Date.now()}.png`; a.click();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('user_email');
            if (email) document.getElementById('user-display').innerText = email;
            else window.location.href = "login.html";
            selectMethod('promptpay'); // Default
        });
    </script>
</body>
</html>
