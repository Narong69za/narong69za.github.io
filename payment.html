<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - PRODUCTION GATEWAY v3.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --red-money: #ff3b30; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .compact-nav { border-bottom: 1px solid rgba(255,59,48,0.3); padding: 8px 20px; background: rgba(0,0,0,0.8); }
        .red-cash { color: var(--red-money); text-shadow: 0 0 10px var(--red-money); font-size: 14px; font-weight: 900; italic: true; letter-spacing: 2px; }
        .silver-bronze-title { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 50%, #8e9eab 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 16px; font-weight: 900; text-shadow: 0 0 15px rgba(238, 242, 243, 0.3); text-transform: uppercase; }
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 20px; }
        .payment-card { width: 100%; max-width: 420px; }
        .input-group { background: #080808; border: 1px solid #222; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
        .input-label { font-size: 8px; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
        .input-field { background: transparent; border: none; color: #fff; width: 100%; font-size: 13px; outline: none; font-family: 'JetBrains Mono'; }
        .amount-focus { color: var(--red-money) !important; font-size: 28px; text-align: center; font-weight: 900; }
        
        /* กล่องแสดงเครดิตที่จะได้รับ */
        .credit-display { background: rgba(255,59,48,0.05); border: 1px dashed rgba(255,59,48,0.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .credit-value { font-family: 'JetBrains Mono'; font-weight: 900; color: #fff; font-size: 20px; }
        .bonus-tag { font-size: 10px; color: var(--red-money); font-weight: 900; text-transform: uppercase; margin-left: 5px; }

        .method-btn { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; transition: 0.3s; cursor: pointer; }
        .method-btn.active { border-color: var(--red-money); box-shadow: 0 0 15px rgba(255,59,48,0.1); }
        #qr-modal-overlay { position: fixed; inset: 0; z-index: 999; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .qr-frame { background: #fff; padding: 20px; border-radius: 3rem; position: relative; border: 8px solid #111; box-shadow: 0 0 60px rgba(255,59,48,0.25); }
        .qr-logo-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; background: #fff; padding: 4px; border-radius: 6px; }
        .p-bar { height: 4px; background: var(--red-money); position: absolute; top: 0; left: 0; transition: width 1s linear; }
        footer { padding: 10px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .dev-purple { color: #a55eea; font-weight: 900; font-size: 11px; italic: true; }
    </style>
</head>
<body>

    <header class="compact-nav flex justify-between items-center">
        <h1 class="red-cash uppercase">SN DESIGN STUDIO</h1>
        <div id="user-display" class="text-[9px] font-black text-gray-500 uppercase tracking-widest italic">AUTHENTICATING...</div>
    </header>

    <main>
        <div class="payment-card">
            <div class="text-center mb-4">
                <h2 class="silver-bronze-title italic tracking-[0.2em]">SN PAYMENT GATEWAY</h2>
            </div>

            <div class="input-group">
                <span class="input-label text-center">Amount (THB)</span>
                <input type="number" id="payAmount" value="500" oninput="calculateCredit()" class="input-field amount-focus">
            </div>

            <div class="credit-display">
                <p class="text-[9px] text-gray-500 font-black uppercase mb-1">You will receive</p>
                <div class="credit-value"><span id="totalCredit">50,000</span> <span class="text-[10px] text-gray-600">Credits</span></div>
                <div id="bonusSection" class="mt-1"><span class="bonus-tag" id="bonusText">+ 5,000 BONUS INCLUDED</span></div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div id="btn-pp" onclick="selectMethod('promptpay')" class="method-btn p-4 flex flex-col items-center gap-2">
                    <img src="https://promptpay.io/logo.png" class="w-7">
                    <span class="text-[9px] font-black uppercase tracking-tighter">PromptPay</span>
                </div>
                <div id="btn-tw" onclick="selectMethod('truemoney')" class="method-btn p-4 flex flex-col items-center gap-2">
                    <img src="https://www.truemoney.com/wp-content/uploads/2021/01/logo-truemoney-wallet-300x300.png" class="w-7 rounded-full">
                    <span class="text-[9px] font-black uppercase tracking-tighter">TrueWallet</span>
                </div>
                <div id="btn-stripe" onclick="selectMethod('stripe')" class="method-btn p-4 flex flex-col items-center gap-2">
                    <svg width="20" height="20" fill="none" stroke="#6366f1" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    <span class="text-[9px] font-black uppercase tracking-tighter">Stripe (Card)</span>
                </div>
                <div id="btn-crypto" onclick="selectMethod('crypto')" class="method-btn p-4 flex flex-col items-center gap-2 border-dashed">
                    <svg width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a4.5 4.5 0 000 9h5a4.5 4.5 0 010 9H7"/></svg>
                    <span class="text-[9px] font-black uppercase tracking-tighter">Crypto (Hamster)</span>
                </div>
            </div>

            <div id="tw-input-section" class="hidden mb-4">
                <div class="input-group">
                    <span class="input-label">Gift Link (อั่งเปา)</span>
                    <input type="text" id="twLink" placeholder="https://gift.truemoney.com/..." class="input-field text-red-500 text-xs">
                </div>
            </div>

            <button id="main-submit-btn" onclick="executePayment()" class="w-full py-4 bg-white text-black font-black text-xs rounded-xl uppercase hover:bg-red-600 hover:text-white transition-all">Generate QR / Pay Now</button>
        </div>
    </main>

    <div id="qr-modal-overlay">
        <div class="text-center relative">
            <div class="qr-frame mb-6">
                <div id="pBar" class="p-bar" style="width: 100%;"></div>
                <img id="qr-img-display" src="" class="w-64 h-64 rounded-xl">
                <img src="https://upload.wikimedia.org/wikipedia/th/thumb/c/cb/PromptPay-logo.png/1200px-PromptPay-logo.png" class="qr-logo-center">
            </div>
            <p id="display-amt" class="text-5xl font-black italic text-white mb-2">0.00</p>
            <p id="timerText" class="text-xs font-black text-red-600 uppercase mb-8">EXPIRES IN: 05:00</p>
            <div class="flex gap-2 justify-center">
                <button onclick="downloadQR()" class="px-8 py-3 bg-red-600 text-black font-black text-[10px] rounded-full uppercase">Download</button>
                <button onclick="closeQR()" class="px-8 py-3 bg-[#111] text-gray-500 font-black text-[10px] rounded-full uppercase border border-white/5">Cancel</button>
            </div>
        </div>
    </div>

    <footer><p class="dev-purple">พัฒนาโดย: ต้องดีแค่ไหน โลกถึงจะจำ</p></footer>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        const CITIZEN_ID = "3100503536486";
        let currentMethod = 'promptpay';
        let timerInt;

        // --- [1] CREDIT POLICY CALCULATION ---
        function calculateCredit() {
            const amount = parseFloat(document.getElementById("payAmount").value) || 0;
            const baseRate = 100; // 1 THB = 100 Credit
            let baseCredit = amount * baseRate;
            let bonusPercent = 0;

            if (amount >= 1000) bonusPercent = 0.20;
            else if (amount >= 500) bonusPercent = 0.10;
            else if (amount >= 100) bonusPercent = 0.05;

            let bonusCredit = baseCredit * bonusPercent;
            let total = baseCredit + bonusCredit;

            document.getElementById("totalCredit").innerText = total.toLocaleString();
            const bonusDisplay = document.getElementById("bonusSection");
            if(bonusCredit > 0) {
                bonusDisplay.classList.remove('hidden');
                document.getElementById("bonusText").innerText = `+ ${bonusCredit.toLocaleString()} BONUS INCLUDED (${bonusPercent*100}%)`;
            } else {
                bonusDisplay.classList.add('hidden');
            }
        }

        // --- [2] METHOD SELECTION ---
        function selectMethod(method) {
            currentMethod = method;
            const twSection = document.getElementById("tw-input-section");
            const btnPP = document.getElementById("btn-pp"), btnTW = document.getElementById("btn-tw"), 
                  btnStripe = document.getElementById("btn-stripe"), btnCrypto = document.getElementById("btn-crypto");

            [btnPP, btnTW, btnStripe, btnCrypto].forEach(b => b.classList.remove("active"));
            twSection.classList.add("hidden");

            if(method === 'truemoney') {
                twSection.classList.remove("hidden");
                btnTW.classList.add("active");
            } else if(method === 'promptpay') btnPP.classList.add("active");
              else if(method === 'stripe') btnStripe.classList.add("active");
              else if(method === 'crypto') btnCrypto.classList.add("active");
        }

        // --- [3] EXECUTE PAYMENT ---
        async function executePayment() {
            const amt = document.getElementById("payAmount").value;
            const email = localStorage.getItem('user_email');
            if(!email) return window.location.href = "login.html";

            if(currentMethod === 'crypto') return alert("Crypto coming soon with Hamster Project Season 2");

            let endpoint = "";
            let bodyData = { amount: parseInt(amt), email: email, id_card: CITIZEN_ID };

            if(currentMethod === 'promptpay') endpoint = "/api/scb/create-qr";
            else if(currentMethod === 'truemoney') {
                endpoint = "/api/truemoney/verify";
                bodyData.link = document.getElementById("twLink").value;
                if(!bodyData.link.includes('gift.truemoney.com')) return alert("กรุณาวางลิ้งค์อั่งเปา");
            }
            else if(currentMethod === 'stripe') endpoint = "/api/stripe/create-checkout"; // Stripe Webhook จะคอยดักหลังจ่ายจบ

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();
                
                if (data.success) {
                    if (data.qrImage) openPopUp(data.qrImage, amt);
                    else if (data.url) window.location.href = data.url; // สำหรับ Stripe Checkout
                    startPolling(email);
                }
            } catch (e) {
                if(currentMethod === 'promptpay') openPopUp(`https://promptpay.io/0812345678/${amt}.png`, amt);
            }
        }

        function openPopUp(qr, amt) {
            const modal = document.getElementById("qr-modal-overlay");
            document.getElementById("qr-img-display").src = qr;
            document.getElementById("display-amt").innerText = amt + ".00";
            modal.style.display = "flex";
            let time = 300;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById("timerText").innerText = `EXPIRES IN: ${m}:${s < 10 ? '0'+s : s}`;
                document.getElementById("pBar").style.width = (time / 300 * 100) + "%";
                if (--time < 0) closeQR();
            }, 1000);
        }

        function startPolling(email) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/check-status?email=${email}`);
                    const data = await res.json();
                    if (data.paid) { clearInterval(poll); window.location.href = "create.html"; }
                } catch (e) {}
            }, 4000);
        }

        function closeQR() { document.getElementById("qr-modal-overlay").style.display = "none"; clearInterval(timerInt); }
        function downloadQR() {
            const a = document.createElement('a');
            a.href = document.getElementById("qr-img-display").src;
            a.download = `SN-QR-${Date.now()}.png`; a.click();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('user_email');
            if (email) document.getElementById('user-display').innerText = email;
            calculateCredit(); selectMethod('promptpay');
        });
    </script>
</body>
</html>
