<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN ULTRA - PRODUCTION GATEWAY v4.0</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .method-btn { background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;cursor:pointer;text-align:center; }
        .method-btn.active { border-color:#ff3b30; box-shadow:0 0 10px rgba(255,59,48,0.4); }
        .input { width:100%;padding:10px;background:#111;border:none;color:#fff;border-radius:8px; }
        #qr-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; }
    </style>
</head>

<body>

<div class="max-w-md mx-auto mt-10 p-4">

    <h1 class="text-center font-black text-red-500 mb-6">SN PAYMENT GATEWAY</h1>

    <input id="amount" type="number" value="500" class="input mb-4 text-center text-xl">

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="method-btn active" onclick="selectMethod('promptpay')" id="m-pp">PromptPay</div>
        <div class="method-btn" onclick="selectMethod('truemoney')" id="m-tw">TrueMoney</div>
        <div class="method-btn" onclick="selectMethod('stripe')" id="m-st">Stripe</div>
        <div class="method-btn" onclick="selectMethod('crypto')" id="m-cr">Crypto</div>
    </div>

    <input id="twlink" placeholder="TrueMoney Gift Link" class="input mb-3 hidden">

    <button onclick="pay()" class="w-full bg-white text-black font-black py-3 rounded-lg">PAY NOW</button>

</div>

<!-- QR MODAL -->
<div id="qr-modal" class="flex">
    <div class="text-center">
        <img id="qr-img" class="w-64 h-64 mb-4 bg-white p-2 rounded">
        <div id="qr-amt" class="text-3xl font-black"></div>
        <div id="timer" class="text-red-500 mt-2"></div>
        <button onclick="closeQR()" class="mt-4 bg-red-600 px-6 py-2 rounded">CLOSE</button>
    </div>
</div>

<script>

function selectMethod(m){
    method = m;
    document.querySelectorAll('.method-btn').forEach(e=>e.classList.remove('active'));
    document.getElementById("m-"+m.slice(0,2)).classList.add('active');

    document.getElementById("twlink").classList.toggle("hidden", m !== "truemoney");
}
