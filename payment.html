<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN ULTRA - PREMIUM GATEWAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --red: #ff3b30; --silver: #e2ebf0; --gold: #ffd700; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        .header-bar { border-bottom: 1px solid rgba(255,59,48,0.2); padding: 15px; }
        .red-cash { color: var(--red); text-shadow: 0 0 10px var(--red); font-weight: 900; font-style: italic; }
        .silver-title { background: linear-gradient(135deg, #bdc3c7, #2c3e50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Payment Pop-up (Modal) */
        #payment-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .qr-frame { 
            background: #fff; padding: 25px; border-radius: 30px; border: 8px solid #111;
            box-shadow: 0 0 40px rgba(255,59,48,0.3); position: relative;
        }
        .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; background: #fff; padding: 5px; border-radius: 8px; }

        .btn-action { background: #111; color: #fff; border: 1px solid #333; transition: 0.3s; }
        .btn-action:hover { border-color: var(--red); color: var(--red); }

        .input-gold { background: #080808 !important; border: 1px solid #222 !important; color: var(--gold) !important; font-family: 'JetBrains Mono'; text-align: center; }
    </style>
</head>
<body>

    <header class="header-bar flex justify-between items-center bg-black/50 backdrop-blur-lg">
        <h1 class="text-lg red-cash">SN DESIGN STUDIO</h1>
        <div id="user-info" class="text-[10px] font-black text-gray-500 uppercase">AUTHENTICATING...</div>
    </header>

    <main class="max-w-[600px] mx-auto p-6 flex flex-col justify-center h-full">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-black silver-title uppercase italic">SN PAYMENT GATEWAY</h2>
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Global Secure Settlement v3.0</p>
        </div>

        <div class="space-y-4 mb-8">
            <div class="bg-[#080808] p-5 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 font-black text-center mb-3 uppercase tracking-widest">Amount (THB)</p>
                <input type="number" id="amount" placeholder="0.00" class="w-full p-4 rounded-xl text-2xl font-black input-gold">
            </div>
            
            <div class="bg-[#080808] p-5 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 font-black text-center mb-3 uppercase tracking-widest">TrueWallet Transfer Link / Ref</p>
                <input type="text" id="tw-link" placeholder="Paste link or transaction ref..." class="w-full p-3 rounded-xl bg-[#111] border border-white/10 text-xs text-blue-400">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openPayment('pp')" class="p-5 border border-white/5 rounded-2xl bg-[#0a0a0a] hover:border-red-600 transition-all flex flex-col items-center gap-3">
                <img src="https://promptpay.io/logo.png" class="w-10 opacity-80">
                <span class="text-[10px] font-black uppercase">PromptPay</span>
            </button>
            <button onclick="openPayment('tw')" class="p-5 border border-white/5 rounded-2xl bg-[#0a0a0a] hover:border-orange-500 transition-all flex flex-col items-center gap-3">
                <img src="https://www.truemoney.com/wp-content/uploads/2021/01/logo-truemoney-wallet-300x300.png" class="w-10 rounded-full">
                <span class="text-[10px] font-black uppercase">TrueWallet</span>
            </button>
        </div>
    </main>

    <div id="payment-modal">
        <div class="text-center">
            <div class="qr-frame mb-6 inline-block">
                <img id="qr-display" src="" class="w-64 h-64 rounded-lg">
                <div class="qr-logo"><img src="https://upload.wikimedia.org/wikipedia/th/thumb/c/cb/PromptPay-logo.png/1200px-PromptPay-logo.png" class="w-full"></div>
            </div>
            
            <div class="space-y-4">
                <p id="countdown" class="text-xl font-black text-red-600 mono">10:00</p>
                <div class="flex gap-2 justify-center">
                    <a id="download-qr" download="SN-PAYMENT-QR.png" class="btn-action px-6 py-2 rounded-full text-[10px] font-black uppercase cursor-pointer">Download QR</a>
                    <button onclick="closeModal()" class="btn-action px-6 py-2 rounded-full text-[10px] font-black uppercase">Cancel</button>
                </div>
                <p class="text-[9px] text-gray-500 font-bold mt-4 uppercase">ระบบจะปรับเครดิตและพาไปหน้าสร้างภาพอัตโนมัติหลังชำระเงิน</p>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full p-6 text-center border-t border-white/5 bg-black">
        <p class="text-[10px] font-black italic text-[#a55eea]">พัฒนาโดย: ต้องดีแค่ไหน โลกถึงจะจำ</p>
    </footer>

    <script>
        let timer;
        const API_CHECK = "http://147.93.159.30:5003/api/check-payment"; // พอร์ตตรวจสอบเครดิต

        function openPayment(method) {
            const amt = document.getElementById('amount').value;
            if(!amt || amt < 10) return alert("ระบุจำนวนเงินขั้นต่ำ 10 บาท");

            document.getElementById('payment-modal').style.display = 'flex';
            
            // เจน QR หรูหรา (ตัวอย่างผ่าน API)
            const qrUrl = `https://promptpay.io/3100503536486/${amt}.png`;
            document.getElementById('qr-display').src = qrUrl;
            document.getElementById('download-qr').href = qrUrl;

            startTimer(600); // 10 นาที
            pollPaymentStatus(); // เริ่มตรวจสอบการชำระเงิน
        }

        function startTimer(duration) {
            let timerLeft = duration;
            const display = document.getElementById('countdown');
            clearInterval(timer);
            timer = setInterval(() => {
                let mins = Math.floor(timerLeft / 60);
                let secs = timerLeft % 60;
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (--timerLeft < 0) {
                    clearInterval(timer);
                    alert("QR หมดอายุ");
                    closeModal();
                }
            }, 1000);
        }

        function closeModal() {
            document.getElementById('payment-modal').style.display = 'none';
            clearInterval(timer);
        }

        // ระบบตรวจสอบเงินและ Redirect
        async function pollPaymentStatus() {
            const email = localStorage.getItem('user_email');
            const checkInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_CHECK}?email=${email}`);
                    const data = await res.json();
                    if(data.paid) {
                        clearInterval(checkInterval);
                        alert("ชำระเงินสำเร็จ! เครดิตถูกเพิ่มแล้ว");
                        window.location.href = "create.html"; // ดีดไปหน้าสร้างภาพทันที
                    }
                } catch(e) {}
            }, 5000); // เช็คทุก 5 วินาที
        }

        // เช็คสิทธิ์ตั้งแต่หน้าแรก
        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('user_email');
            if(!email) window.location.href = "login.html";
            document.getElementById('user-info').innerText = email;
        });
    </script>
</body>
</html>
