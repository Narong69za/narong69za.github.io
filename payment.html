<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN DESIGN PAYMENT CENTER</title>

<link rel="stylesheet" href="/assets/css/payment.css">
</head>

<body>

<div class="payment-root">

<h1>SN DESIGN PAYMENT CENTER</h1>

<div class="payment-methods">
<button type="button" class="pay-btn" data-method="stripe">💳 Stripe</button>
<button type="button" class="pay-btn" data-method="promptpay">📱 PromptPay QR</button>
<button type="button" class="pay-btn" data-method="truemoney">🟠 TrueMoney Wallet</button>
<button type="button" class="pay-btn" data-method="crypto">🪙 Crypto</button>
</div>

<div id="paymentBox" class="payment-box">
เลือกช่องทางชำระเงิน
</div>

<div id="paymentStatus" class="status">
STATUS: IDLE
</div>

</div>

<!-- =====================================================
🔥 CREDIT SYSTEM MAPPING (HIDDEN)
===================================================== -->

<input type="hidden" id="userId" value="">
<input type="hidden" id="packageName" value="starter-100">

<script>
// =====================================================
// AUTO INJECT USER ID FROM LOCAL STORAGE (SAFE)
// =====================================================

document.addEventListener("DOMContentLoaded", () => {

  const storedUser = localStorage.getItem("sn_user");

  if (storedUser) {
    try {
      const parsed = JSON.parse(storedUser);
      if (parsed.id) {
        document.getElementById("userId").value = parsed.id;
      }
    } catch (e) {
      console.warn("User parse error");
    }
  }

});
</script>

<!-- 🔥 FORCE RELOAD VERSION -->
<script src="/assets/js/config.js?v=7.0.0"></script>
<script src="/assets/js/payment.js?v=4.4.0"></script>

</body>
</html>
