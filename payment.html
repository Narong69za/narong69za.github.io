<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN DESIGN PAYMENT CENTER</title>

<link rel="stylesheet" href="/assets/css/payment.css">

<script src="https://cdn.omise.co/omise.js"></script>

<style>

/* ========================= */
/* 🔥 CRYPTO ULTRA BLOCK */
/* ========================= */

.crypto-wrapper{
    display:flex;
    flex-direction:column;
    gap:20px;
    animation:fadeIn .4s ease;
}

.crypto-title{
    font-size:18px;
    font-weight:600;
    letter-spacing:1px;
    color:#00ffc8;
}

.crypto-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.crypto-option{
    background:#111;
    border:1px solid #222;
    padding:12px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:all .25s ease;
}

.crypto-option:hover{
    border-color:#00ffc8;
    box-shadow:0 0 15px rgba(0,255,200,.3);
}

.crypto-option.active{
    border-color:#00ffc8;
    background:#0f1f1a;
}

.crypto-confirm{
    margin-top:10px;
    padding:14px;
    border-radius:12px;
    border:none;
    background:linear-gradient(90deg,#00ffc8,#00aaff);
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.crypto-confirm:hover{
    opacity:.9;
    transform:translateY(-2px);
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="payment-root">

<h1>SN DESIGN PAYMENT CENTER</h1>

<div class="payment-methods">
<button type="button" class="pay-btn" data-method="stripe">💳 Card (Omise)</button>
<button type="button" class="pay-btn" data-method="promptpay">📱 PromptPay QR</button>
<button type="button" class="pay-btn" data-method="truemoney">🟠 TrueMoney Wallet</button>
<button type="button" class="pay-btn" data-method="crypto">🪙 Crypto</button>
</div>

<div id="paymentBox" class="payment-box">
เลือกช่องทางชำระเงิน
</div>

<div id="paymentStatus" class="status">
STATUS: IDLE
</div>

</div>

<script src="/assets/js/config.js?v=8.0.0"></script>
<script src="/assets/js/payment.js?v=5.0.0"></script>

<script>

// ==========================
// 🔥 CRYPTO UI LOGIC
// ==========================

let selectedUSD = null;
let selectedCoin = null;

document.querySelectorAll(".pay-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
        if(btn.dataset.method === "crypto"){
            renderCryptoUI();
        }
    });
});

function renderCryptoUI(){

    document.getElementById("paymentBox").innerHTML = `
        <div class="crypto-wrapper">

            <div class="crypto-title">
                ⚡ เติมเครดิตด้วย Binance Pay
            </div>

            <div>
                <small>ขั้นต่ำ 10 USD · Fixed Rate</small>
            </div>

            <div class="crypto-grid" id="usdGrid">
                ${[10,15,20,25,30,50].map(v=>`
                    <div class="crypto-option" onclick="selectUSD(${v})">
                        <strong>${v} USD</strong><br>
                        <small>${v*6800} เครดิต</small>
                    </div>
                `).join("")}
            </div>

            <div class="crypto-grid" id="coinGrid">
                ${["USDT","BNB","TON"].map(c=>`
                    <div class="crypto-option" onclick="selectCoin('${c}')">
                        ${c}
                    </div>
                `).join("")}
            </div>

            <button class="crypto-confirm" onclick="confirmCrypto()">
                🚀 ยืนยันชำระด้วย Crypto
            </button>

        </div>
    `;

    document.getElementById("paymentStatus").innerText = "STATUS: CRYPTO READY";
}

function selectUSD(v){
    selectedUSD = v;
    highlight("usdGrid",v);
}

function selectCoin(c){
    selectedCoin = c;
    highlight("coinGrid",c);
}

function highlight(grid,value){
    document.querySelectorAll(`#${grid} .crypto-option`)
    .forEach(el=>{
        el.classList.remove("active");
        if(el.innerText.includes(value)){
            el.classList.add("active");
        }
    });
}

async function confirmCrypto(){

    if(!selectedUSD || !selectedCoin){
        alert("เลือกจำนวนเงินและเหรียญก่อน");
        return;
    }

    document.getElementById("paymentStatus").innerText = "STATUS: PROCESSING...";

    const token = localStorage.getItem("token");

    const res = await fetch(
        "https://sn-design-api.onrender.com/api/crypto/create-order",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },
            body: JSON.stringify({
                usd:selectedUSD,
                coin:selectedCoin
            })
        }
    );

    const data = await res.json();

    if(data.paymentUrl){
        window.location.href = data.paymentUrl;
    }else{
        document.getElementById("paymentStatus").innerText = "STATUS: ERROR";
        alert("สร้างคำสั่งชำระเงินไม่สำเร็จ");
    }

}

</script>

</body>
</html>
