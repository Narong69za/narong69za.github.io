<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN PAYMENT GATEWAY | STABLE LUXURY</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

<style>
body { background:#000; color:#fff; font-family:'Inter',sans-serif; }
.mono { font-family:'JetBrains Mono', monospace; }

.method-btn{
    background:rgba(255,255,255,0.03);
    border:1px solid #222;
    transition:.3s;
    cursor:pointer;
}
.method-btn.active{
    border-color:red;
    background:rgba(255,0,0,0.1);
}

#qr-modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}
</style>
</head>

<body>

<main class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center text-center">

<h1 class="text-3xl font-black">SN PAYMENT GATEWAY</h1>

<input id="payAmount" type="number" value="500"
class="w-full mt-8 text-center text-5xl bg-transparent border-b border-white/20">

<div class="grid grid-cols-3 gap-2 mt-6">
<div id="btn-pp" class="method-btn p-3" onclick="selectMethod('promptpay')">SCB</div>
<div id="btn-tw" class="method-btn p-3" onclick="selectMethod('truemoney')">TRUE</div>
<div id="btn-stripe" class="method-btn p-3" onclick="selectMethod('stripe')">CARD</div>
</div>

<button onclick="executePayment()"
class="mt-8 w-full bg-red-600 py-4 font-black">
EXECUTE PAYMENT
</button>

</main>

<!-- MODAL -->
<div id="qr-modal-overlay">
<div class="bg-white p-6 rounded-xl text-black">
<img id="qr-img-display" class="w-64 mx-auto">
<p id="display-amt" class="text-center mt-4 font-black"></p>
<button onclick="closeQR()" class="mt-4 w-full bg-black text-white py-2">CLOSE</button>
</div>
</div>

<script>
const API_BASE = "https://api.sn-designstudio.dev";
const CITIZEN_ID = "3100503536486";

let currentMethod='promptpay';
let timerInt,pollInt;

const BASE_RATE=100;
const BONUS_TIERS=[
    {min:1000,bonus:0.30},
    {min:300,bonus:0.20},
    {min:100,bonus:0.10}
];

function calculateCredit(amount){
    let base = amount * BASE_RATE;
    let percent = 0;

    for(const t of BONUS_TIERS){
        if(amount >= t.min){
            percent = t.bonus;
            break;
        }
    }

    return { total: base + Math.floor(base * percent) };
}

function selectMethod(method){
    currentMethod = method;

    document.querySelectorAll('.method-btn')
        .forEach(b => b.classList.remove('active'));

    document.getElementById("tw-input-section").classList.add("hidden");

    if(method === 'truemoney'){
        document.getElementById("btn-tw").classList.add("active");
        document.getElementById("tw-input-section").classList.remove("hidden");
    } else {
        document.getElementById(`btn-${method === 'promptpay' ? 'pp' : 'stripe'}`)
            .classList.add("active");
    }
}

/* =========================
   MAIN PAYMENT HANDLER
========================= */
async function executePayment(){

    const amount = parseInt(
        document.getElementById("payAmount").value
    );

    const email = localStorage.getItem("user_email") || "test@sn.com";

    if(!amount || amount < 10){
        alert("ขั้นต่ำ 10 บาท");
        return;
    }

    /* =========================
       STRIPE FLOW
    ========================= */
    if(currentMethod === 'stripe'){
        try{
            const res = await fetch(`${API_BASE}/api/stripe`,{
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount, email })
            });

            const data = await res.json();

            if(data.success && data.url){
                window.location.href = data.url;
            } else {
                alert("Stripe Error");
            }

        } catch(err){
            alert("Cannot Connect to API");
        }

        return;
    }

    /* =========================
       SCB / TRUE FLOW
    ========================= */
    let endpoint = currentMethod === 'promptpay'
        ? "/api/scb/create-qr"
        : "/api/truemoney/verify";

    let payload = {
        amount,
        email,
        id_card: CITIZEN_ID
    };

    if(currentMethod === 'truemoney'){
        const link = document.getElementById("twLink").value;

        if(!link || !link.includes("gift.truemoney.com")){
            return alert("ต้องใส่ลิ้งค์ TrueMoney");
        }

        payload.link = link;
    }

    try{
        const res = await fetch(API_BASE + endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if(data.qrImage){
            openPopup(data.qrImage, amount);
        }

        startPolling(email);

    } catch(err){
        openPopup(
            `https://promptpay.io/${CITIZEN_ID}/${amount}.png`,
            amount
        );
    }
}

/* =========================
   QR POPUP
========================= */
function openPopup(qr, amount){

    const modal = document.getElementById("qr-modal-overlay");
    const header = document.getElementById("modal-header");
    const pBar = document.getElementById("pBar");
    const credit = calculateCredit(amount);
    const logo = document.getElementById("center-logo");

    document.getElementById("qr-img-display").src = qr;

    if(currentMethod === "promptpay"){
        header.style.background = "#4e2e7f";
        pBar.style.background = "#4e2e7f";
        logo.style.display = "block";
    } else {
        header.style.background = "#ff8c00";
        pBar.style.background = "#ff8c00";
        logo.style.display = "none";
    }

    document.getElementById("display-amt").innerText =
        amount + " THB | +" + credit.total.toLocaleString() + " CR";

    modal.style.display = "flex";

    let t = 300;
    clearInterval(timerInt);

    timerInt = setInterval(()=>{
        let m = Math.floor(t / 60);
        let s = t % 60;

        document.getElementById("timerText").innerText =
            "EXPIRES " + m + ":" + (s < 10 ? '0' + s : s);

        document.getElementById("pBar").style.width =
            (t / 300 * 100) + "%";

        if(--t < 0) closeQR();

    }, 1000);
}

/* =========================
   POLLING PAYMENT STATUS
========================= */
function startPolling(email){

    clearInterval(pollInt);

    pollInt = setInterval(async ()=>{

        try{
            const res = await fetch(
                `${API_BASE}/api/check-status?email=${email}`
            );

            const data = await res.json();

            if(data.paid){
                clearInterval(pollInt);
                location.href = "create.html";
            }

        } catch(e){}
    }, 3000);
}

/* =========================
   CLOSE / DOWNLOAD
========================= */
function closeQR(){
    document.getElementById("qr-modal-overlay").style.display = "none";
    clearInterval(timerInt);
    clearInterval(pollInt);
}

function downloadQR(){
    const a = document.createElement("a");
    a.href = document.getElementById("qr-img-display").src;
    a.download = "SN-QR.png";
    a.click();
}

document.addEventListener("DOMContentLoaded", ()=>{
    selectMethod("promptpay");
});
</script>

</body>
</html>
