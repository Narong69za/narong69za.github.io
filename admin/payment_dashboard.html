<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SN-ULTRA | ENTERPRISE DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background:#0b0b0f; color:#fff; font-family:Montserrat,sans-serif; margin:0; }
        header { padding:20px; font-size:22px; background:linear-gradient(90deg,#8b0000,#001f3f); font-weight:bold; border-bottom:1px solid rgba(255,255,255,0.1); }
        .dashboard { padding:20px; }
        .card-container { display:flex; gap:20px; flex-wrap:wrap; margin-bottom: 20px; }
        .card { flex:1; min-width:220px; background:rgba(255,255,255,0.03); padding:20px; border-radius:12px; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #00ffcc; }
        .card h3 { margin:0 0 10px 0; font-size:14px; color:#aaa; text-transform: uppercase; }
        .card p { margin:0; font-size:28px; font-weight:bold; color: #00ffcc; }
        .partner-container { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .partner-card { flex: 1; min-width: 180px; background: rgba(0, 255, 204, 0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(0, 255, 204, 0.1); }
        .partner-card h4 { margin: 0 0 5px 0; font-size: 11px; color: #00ffcc; text-transform: uppercase; }
        .partner-card span { font-size: 16px; font-weight: bold; }
        .status-bar { margin-bottom:20px; color:#00ffcc; font-size:13px; font-family: monospace; }
        table { width:100%; border-collapse:collapse; background: rgba(255,255,255,0.02); border-radius: 10px; overflow: hidden; }
        th, td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.05); text-align:left; font-size: 14px; }
        th { background: rgba(255,255,255,0.05); color: #aaa; }
        .status-success { color: #00ffcc; }
        .status-error { color: #ff4444; }
        canvas { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>SN DESIGN STUDIO — MASTER PAYMENT CONTROL</header>
    <div class="dashboard">
        <div class="status-bar" id="systemStatus">ENGINE STATUS: SYNCING...</div>
        
        <div class="card-container">
            <div class="card"><h3>Credit Sold (THB)</h3><p id="sold">0</p></div>
            <div class="card"><h3>Credit Used</h3><p id="used">0</p></div>
            <div class="card"><h3>Net Balance</h3><p id="balance">0</p></div>
            <div class="card"><h3>Active Users</h3><p id="users">0</p></div>
        </div>

        <div class="partner-container">
            <div class="partner-card"><h4>ElevenLabs</h4><span id="p-eleven">Loading...</span></div>
            <div class="partner-card"><h4>Replicate</h4><span id="p-replicate">Loading...</span></div>
            <div class="partner-card"><h4>RunwayML</h4><span class="status-success">GEN-4.5 ACTIVE</span></div>
            <div class="partner-card"><h4>Gemini AI</h4><span class="status-success">2.5-FLASH LIVE</span></div>
        </div>

        <canvas id="revenueChart" height="100"></canvas>

        <h3 style="margin-top:30px; color: #aaa;">Recent Transactions</h3>
        <table id="paymentTable">
            <thead><tr><th>User</th><th>Method</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const API_BASE = "https://api.sn-designstudio.dev";
        const API = API_BASE + "/api/admin";

        async function loadData() {
            try {
                const data = await fetch(API + "/finance/overview", {credentials:"include"}).then(r => r.json());
                
                // Local Stats
                document.getElementById("sold").innerText = data.local.totalCreditSold.toLocaleString();
                document.getElementById("used").innerText = data.local.totalCreditUsed.toLocaleString();
                document.getElementById("balance").innerText = data.local.netCreditBalance.toLocaleString();
                document.getElementById("users").innerText = data.local.activeUsers.toLocaleString();

                // Partner Stats
                document.getElementById("p-eleven").innerHTML = data.partners.elevenlabs.status === "active" 
                    ? `<span class="status-success">${data.partners.elevenlabs.remaining.toLocaleString()} chars</span>` 
                    : `<span class="status-error">OFFLINE</span>`;
                
                document.getElementById("p-replicate").innerHTML = data.partners.replicate.status === "active" 
                    ? `<span class="status-success">${data.partners.replicate.type.toUpperCase()}</span>` 
                    : `<span class="status-error">OFFLINE</span>`;

                document.getElementById("systemStatus").innerText = "ENGINE STATUS: LIVE (PRODUCTION)";
            } catch(e) {
                document.getElementById("systemStatus").innerText = "ENGINE STATUS: SYNC ERROR";
            }
        }

        async function loadRecent() {
            const data = await fetch(API + "/finance-recent", {credentials:"include"}).then(r => r.json());
            const tbody = document.querySelector("#paymentTable tbody");
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.user_id}</td>
                    <td>${r.method?.toUpperCase()}</td>
                    <td>${r.amount} ${r.currency}</td>
                    <td class="status-${r.status}">${r.status}</td>
                    <td>${new Date(r.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function init() {
            loadData();
            loadRecent();
        }

        setInterval(init, 30000);
        init();
    </script>
</body>
</html>
