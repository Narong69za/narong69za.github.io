<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>SN FINANCE DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-blue-500">FINANCE</h1>
                <p class="text-slate-500 uppercase tracking-widest text-xs">Real-time Revenue & Stock Monitoring</p>
            </div>
            <div class="text-right glass p-4 rounded-2xl">
                <p class="text-slate-400 text-[10px] uppercase">Total Revenue</p>
                <p id="totalRev" class="text-2xl font-black text-emerald-400">฿ 0.00</p>
            </div>
        </header>

        <div id="stockGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        async function loadFinance() {
            try {
                const res = await fetch('/api/admin/finance/overview');
                const data = await res.json();
                if(!data.success) return;
                
                document.getElementById('totalRev').innerText = '฿ ' + data.local.totalCreditSold.toLocaleString();
                
                const grid = document.getElementById('stockGrid');
                grid.innerHTML = '';
                
                data.partners.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'glass p-6 rounded-3xl transition-all hover:border-blue-500/50';
                    card.innerHTML = `
                        <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">${s.service_name || 'PROVIDER'}</p>
                        <h3 class="text-xl font-black mb-4 uppercase text-white">${s.service_name || 'ENGINE'}</h3>
                        <div class="flex justify-between items-end">
                            <span class="text-2xl font-mono text-blue-400">${s.remaining_stock || 0}</span>
                            <span class="text-[10px] font-bold text-emerald-500">● ACTIVE</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) { console.error("DASHBOARD ERROR:", e); }
        }
        loadFinance();
        setInterval(loadFinance, 10000); // อัปเดตทุก 10 วินาที
    </script>
</body>
</html>
