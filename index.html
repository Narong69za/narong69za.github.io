<!-- ====================================================
ULTRA REAL STATUS ENGINE (ADD ONLY - NEW LAYER)
==================================================== -->

<script>

const API_URL = "https://narong69zagithubio-production.up.railway.app";

let heartbeatInterval = null;

async function fetchStatus(){

 try{

   const res = await fetch(API_URL + "/api/status",{cache:"no-store"});
   const data = await res.json();

   document.getElementById("server-status").innerText =
   data.server ? "ONLINE" : "OFFLINE";

   document.getElementById("ai-status").innerText =
   data.ai ? "CONNECTED" : "NOT READY";

   document.getElementById("payment-status").innerText =
   data.payment ? "ONLINE" : "OFFLINE";

   networkPulse("LIVE STREAM OK");

 }catch(e){

   document.getElementById("server-status").innerText="ERROR";
   document.getElementById("ai-status").innerText="ERROR";

   networkPulse("NETWORK LOST");

 }

}


function networkPulse(msg){

 const box = document.getElementById("network-screen");

 if(!box) return;

 box.innerText = msg + " | " + new Date().toLocaleTimeString();

}


// HEARTBEAT LOOP (ADD ONLY)

function startHeartbeat(){

 if(heartbeatInterval) return;

 fetchStatus();

 heartbeatInterval = setInterval(fetchStatus,5000);

}

startHeartbeat();

</script>
