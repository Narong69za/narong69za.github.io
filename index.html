<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Website — SN DESIGN STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/master.css">
    <style>
        body { padding-top: 100px; background-color: #000; color: #fff; }
        .system-row .val { font-weight: bold; color: #00ffd5; font-family: monospace; }
        .pm2-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(0, 255, 213, 0.1); border: 1px solid rgba(0, 255, 213, 0.3); color: #00ffd5; }
    </style>
</head>
<body class="index-page">
    <div id="nav"></div>

    <section class="marquee-wrap mt-2">
        <div class="marquee-text uppercase text-[10px] tracking-widest text-zinc-500">
            • AI ENGINES READY • CONTABO VPS v9 • DRAGON ENGINE ACTIVE • 2026 PRODUCTION BUILD •
        </div>
    </section>

    <!-- HERO -->
    <section class="hero-master relative px-6 mt-6">
        <div class="max-w-4xl mx-auto rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <img src="assets/images/hero.png" alt="Hero" class="w-full h-auto">
        </div>
        <div class="text-center mt-10">
            <h1 class="text-3xl font-black italic uppercase">Build Viral AI Content</h1>
            <p class="text-zinc-500 text-sm mt-2">Dark Creator Ecosystem for AI Video.</p>
        </div>
    </section>

    <!-- MONITOR -->
    <section class="py-12 px-6">
        <div class="max-w-md mx-auto bg-zinc-900/40 border border-white/5 rounded-3xl p-8 backdrop-blur-sm">
            <div class="text-[9px] tracking-[0.4em] text-zinc-600 mb-8 text-center uppercase">System Master Monitor</div>
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <span class="text-zinc-500 text-[10px] uppercase font-bold">Server</span>
                    <span id="server-status" class="text-white text-[10px] font-black">SYNCING...</span>
                </div>
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <span class="text-zinc-500 text-[10px] uppercase font-bold">CPU Load</span>
                    <span id="cpu-val" class="text-[#00ffd5] text-xs font-black">0%</span>
                </div>
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <span class="text-zinc-500 text-[10px] uppercase font-bold">RAM Usage</span>
                    <span id="ram-val" class="text-[#00ffd5] text-xs font-black">0%</span>
                </div>
                <div class="flex justify-between items-center pt-2">
                    <span class="text-zinc-500 text-[10px] uppercase font-bold">Dragon Engine</span>
                    <span id="pm2-status" class="pm2-tag">OFFLINE</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-20 text-[9px] text-zinc-800 uppercase tracking-[0.5em]">
        © SN Design Studio 2026
    </footer>

    <script src="assets/js/nav.js"></script>
    <script>
        const API_BASE = "http://147.93.159.30:5002";
        async function updateStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/system-status`);
                const data = await res.json();
                if (data.success) {
                    const m = data.monitor;
                    document.getElementById("server-status").innerText = "ONLINE";
                    document.getElementById("cpu-val").innerText = m.cpu + "%";
                    document.getElementById("ram-val").innerText = m.ramUsed + "%";
                    document.getElementById("pm2-status").innerText = "DRAGON ACTIVE";
                }
            } catch (e) {
                document.getElementById("server-status").innerText = "OFFLINE";
                document.getElementById("pm2-status").innerText = "LOST";
            }
        }
        setInterval(updateStatus, 5000);
        updateStatus();
    </script>
</body>
</html>
