<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN ULTRA — MONITOR SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #020408; color: #94a3b8; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 213, 0.1); }
        .status-card { transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.02); border-radius: 2rem; }
        .status-card:hover { border-color: #00ffd5; box-shadow: 0 0 30px rgba(0, 255, 213, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10 pt-24">
    <div id="nav-placeholder"></div>
    <header class="max-w-7xl mx-auto mb-10">
        <h1 class="text-4xl font-black text-white italic tracking-tighter">SN ULTRA <span class="text-[#00ffd5]">MONITOR</span></h1>
        <p class="text-[10px] uppercase tracking-[0.5em] text-slate-500 mt-2">V2.6 Production Cluster</p>
    </header>
    <main id="pm2-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="col-span-full py-20 text-center opacity-30 text-xs italic uppercase">Connecting to Master Engine...</div>
    </main>
    <script src="assets/js/nav.js"></script>
    <script>
        const API_STATUS = "http://147.93.159.30:5002/api/admin/system-status";
        async function fetchStatus() {
            try {
                const res = await fetch(API_STATUS);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('pm2-container').innerHTML = data.monitor.pm2.map(s => `
                        <div class="status-card glass p-6 flex flex-col gap-4">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-bold text-[#00ffd5] tracking-widest uppercase">${s.name}</span>
                                <div class="w-2 h-2 rounded-full bg-[#00ffd5] shadow-[0_0_10px_#00ffd5] animate-pulse"></div>
                            </div>
                            <div class="text-3xl font-black text-white">${s.cpu}%</div>
                            <div class="text-[9px] opacity-50 uppercase">MEM: ${s.mem} | ${s.status}</div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("API Offline"); }
        }
        setInterval(fetchStatus, 3000); fetchStatus();
    </script>
</body>
</html>
