<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DESIGN STUDIO — ULTRA MONITOR</title>
    <style>
        /* [ULTRA ENTERPRISE DESIGN] */
        body { background: #050a0f; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .ultra-enterprise { background: rgba(5, 10, 15, 0.98); border: 1px solid rgba(0, 255, 213, 0.15); box-shadow: 0 0 50px #000; padding: 30px; max-width: 800px; margin: 40px auto; border-radius: 15px; }
        .system-title { font-size: 12px; color: rgba(0, 255, 213, 0.5); letter-spacing: 5px; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 213, 0.1); padding-bottom: 10px; }
        
        .service-card { 
            display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; 
            gap: 15px; align-items: center; padding: 15px; 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px; border-radius: 8px; transition: 0.3s;
        }
        .service-card:hover { background: rgba(0, 255, 213, 0.05); border-color: rgba(0, 255, 213, 0.3); }
        
        .name { font-weight: bold; color: #00ffd5; text-transform: uppercase; font-size: 14px; }
        .metric { font-family: monospace; color: #888; font-size: 13px; }
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center; }
        .online { background: rgba(0, 255, 213, 0.1); color: #00ffd5; box-shadow: 0 0 10px rgba(0, 255, 213, 0.2); }
        
        .server-core-status { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px; }
        .pulse { width: 8px; height: 8px; background: #00ffd5; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="ultra-enterprise">
        <div class="system-title">ULTRA ENTERPRISE MASTER STATUS</div>
        
        <div class="server-core-status">
            <div><span class="pulse"></span>SERVER CORE: <span id="server-status" style="color: #00ffd5;">SYNCING...</span></div>
            <div id="last-update" style="opacity: 0.4; font-size: 10px;">LOADING...</div>
        </div>

        <div id="pm2-list-display">
            <div style="text-align: center; padding: 40px; opacity: 0.5;">INITIALIZING ENGINE DATA...</div>
        </div>
    </div>

    <script>
        // [CONFIGURATION] ล็อคเป้าไปที่ IP และ Port ของ API โดยตรง
        const API_URL = "http://147.93.159.30:5002/api/admin/system-status";

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.success && data.monitor.pm2) {
                    const listDisplay = document.getElementById("pm2-list-display");
                    
                    // อัปเดตตาราง Service
                    listDisplay.innerHTML = data.monitor.pm2.map(service => `
                        <div class="service-card">
                            <div class="name">${service.name}</div>
                            <div class="metric">CPU: ${service.cpu}%</div>
                            <div class="metric">RAM: ${service.mem}</div>
                            <div class="status-badge online">${service.status.toUpperCase()}</div>
                        </div>
                    `).join('');

                    document.getElementById("server-status").innerText = "ULTRA ONLINE";
                    document.getElementById("last-update").innerText = "LAST SYNC: " + new Date().toLocaleTimeString();
                }
            } catch (error) {
                console.error("Monitor Sync Error:", error);
                document.getElementById("server-status").innerText = "OFFLINE";
                document.getElementById("server-status").style.color = "#ff0033";
            }
        }

        // สั่งอัปเดตทุก 5 วินาที
        setInterval(updateMonitor, 5000);
        updateMonitor(); // รันทันทีครั้งแรก
    </script>
</body>
</html>
