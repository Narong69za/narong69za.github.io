<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN ULTRA COMMAND CENTER 2026 — 16 ENGINES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: radial-gradient(circle at top right, #0f172a, #020617); min-height: 100vh; color: #94a3b8; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .obsidian-card {
            background: linear-gradient(160deg, #111827 0%, #020617 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .obsidian-card:hover {
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 50px -10px rgba(16, 185, 129, 0.3);
            transform: translateY(-10px) scale(1.02);
        }
        .neon-glow { text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .gen-btn {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .gen-btn:hover { box-shadow: 0 0 30px rgba(16, 185, 129, 0.6); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-[1700px] mx-auto mb-12 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div class="text-center lg:text-left">
            <h1 class="text-5xl font-black text-white tracking-tighter neon-glow">SN ULTRA <span class="text-emerald-500">MASTER</span></h1>
            <p class="text-emerald-500/50 text-xs tracking-[0.5em] mt-2 font-bold uppercase">AI Control Station / v3.0 Production</p>
        </div>
        <div class="glass p-6 rounded-[2.5rem] flex gap-12 shadow-2xl border-emerald-500/20">
            <div class="text-center">
                <p class="text-[10px] font-bold text-slate-500 mb-1">TOTAL REVENUE</p>
                <p class="text-3xl font-black text-white">150.00 <span class="text-xs text-emerald-500 uppercase">thb</span></p>
            </div>
            <div class="text-center border-l border-white/5 pl-12">
                <p class="text-[10px] font-bold text-slate-500 mb-1">API CREDITS</p>
                <p class="text-3xl font-black text-white" id="user-credits">1,000 <span class="text-xs text-emerald-500 uppercase">c</span></p>
            </div>
        </div>
    </header>

    <main class="max-w-[1700px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <!-- 16 ENGINES WILL BE RENDERED HERE -->
    </main>

    <script>
        const engines = [
            { id: "1", name: "Flux.1 Pro", type: "Image High-Res", alias: "flux_pro", cost: "50c", ping: true },
            { id: "2", name: "Live Portrait", type: "Motion AI", alias: "live_portrait", cost: "300c", ping: true },
            { id: "3", name: "Gemini 2.5", type: "Vision Agent", alias: "gemini_vision", cost: "Free", ping: true },
            { id: "4", name: "Runway Gen-3", type: "Ultra Video", alias: "runway_gen3", cost: "200c", ping: false },
            { id: "5", name: "Stable Diffusion", type: "Concept Art", alias: "sd_xl", cost: "20c", ping: false },
            { id: "6", name: "Pika Art v2", type: "Animation", alias: "pika_v2", cost: "150c", ping: false },
            { id: "7", name: "Midjourney v6", type: "Masterpiece", alias: "midjourney_v6", cost: "80c", ping: false },
            { id: "8", name: "ElevenLabs", type: "Voice Clone", alias: "eleven_labs", cost: "100c", ping: false },
            { id: "9", name: "Suno AI v4", type: "Music Engine", alias: "suno_v4", cost: "200c", ping: false },
            { id: "10", name: "Claude 3.5", type: "Code Logic", alias: "claude_35", cost: "10c", ping: false },
            { id: "11", name: "HeyGen API", type: "AI Avatar", alias: "heygen_api", cost: "500c", ping: false },
            { id: "12", name: "Llama 3.1", type: "System Logic", alias: "llama_31", cost: "Free", ping: false },
            { id: "13", name: "DALL-E 3", type: "Quick Image", alias: "dalle_3", cost: "40c", ping: false },
            { id: "14", name: "DeepSeek v3", type: "Reasoning", alias: "deepseek_v3", cost: "Free", ping: false },
            { id: "15", name: "Kling AI", type: "Cinema Video", alias: "kling_ai", cost: "400c", ping: false },
            { id: "16", name: "Leonardo.ai", type: "Asset Design", alias: "leonardo_ai", cost: "60c", ping: false }
        ];

        const mainGrid = document.querySelector('main');
        mainGrid.innerHTML = engines.map(e => `
            <div class="obsidian-card p-8 flex flex-col gap-6 group relative overflow-hidden engine-box" 
                 data-engine="${e.id}" data-alias="${e.alias}">
                <div class="flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-emerald-500 tracking-widest uppercase">${e.name}</span>
                        <span class="text-[9px] text-slate-500 font-bold">${e.type} | ${e.cost}</span>
                    </div>
                    ${e.ping ? '<div class="w-2.5 h-2.5 bg-emerald-500 rounded-full shadow-[0_0_15px_#10b981] animate-ping"></div>' : '<div class="w-2.5 h-2.5 bg-slate-800 rounded-full"></div>'}
                </div>

                <div class="aspect-square bg-black/40 rounded-[2rem] border border-white/5 flex flex-col items-center justify-center relative overflow-hidden group-hover:bg-black/60 transition-all shadow-inner">
                    <p class="text-[9px] font-bold text-slate-700 tracking-widest uppercase">Awaiting Command</p>
                    <div class="absolute bottom-0 left-0 w-full h-1 bg-slate-900">
                        <div class="loading-bar h-full bg-emerald-500 w-0 transition-all duration-500"></div>
                    </div>
                </div>

                <textarea class="engine-prompt bg-slate-950/40 border border-white/5 rounded-2xl p-4 text-xs text-white h-24 outline-none focus:border-emerald-500/30 transition-all placeholder:text-slate-800" placeholder="Enter prompt or logic here..."></textarea>

                <div class="flex gap-2">
                    <button class="flex-1 bg-slate-800 hover:bg-slate-700 text-[10px] font-bold py-4 rounded-2xl transition-all uppercase">Import</button>
                    <button class="flex-[2] gen-btn generate-btn text-white text-[10px] font-black py-4 rounded-2xl tracking-[0.2em] transition-all uppercase">Generate</button>
                </div>
            </div>
        `).join('');
    </script>

    <footer class="max-w-[1700px] mx-auto mt-16 p-10 glass rounded-[3.5rem] grid grid-cols-2 md:grid-cols-4 gap-8 shadow-2xl">
        <div class="flex items-center gap-5">
            <div class="p-4 bg-emerald-500/10 rounded-2xl border border-emerald-500/20 shadow-lg"><div class="w-3 h-3 bg-emerald-500 rounded-full"></div></div>
            <div><p class="text-[9px] font-black text-slate-500 tracking-widest">CPU LOAD</p><p class="text-xl font-black text-white" id="cpu-load">0%</p></div>
        </div>
        <div class="flex items-center gap-5 border-l border-white/5 pl-8">
            <div class="p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20 shadow-lg"><div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div></div>
            <div><p class="text-[9px] font-black text-slate-500 tracking-widest">SERVER RAM</p><p class="text-xl font-black text-white" id="ram-usage">0 GB</p></div>
        </div>
        <!-- ... Other footer items ... -->
    </footer>

    <!-- CORE SCRIPTS -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/nav.js"></script>
    <script type="module" src="assets/js/create.js"></script>
</body>
</html>
