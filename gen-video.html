<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN ULTRA — 16 VIDEO ENGINES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #020408; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .engine-card { border-radius: 2.5rem; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.03); }
        .engine-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.2); }
        .gen-btn { background: linear-gradient(135deg, #1e40af, #3b82f6); transition: 0.3s; }
        .gen-btn:active { scale: 0.95; }
    </style>
</head>
<body class="p-4 md:p-10 pt-24">
    <div id="nav-placeholder"></div>
    <div class="max-w-[1700px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="video-grid"></div>
    <script src="assets/js/nav.js"></script>
    <script>
        const engines = [
            { id: 1, name: "Flux.1 Video", alias: "flux_video", type: "Pro" },
            { id: 2, name: "Runway Gen-3", alias: "runway_g3", type: "Ultra" },
            { id: 3, name: "Luma Dream", alias: "luma_dream", type: "Cinema" },
            { id: 4, name: "Kling AI", alias: "kling_pro", type: "High-End" },
            { id: 5, name: "Pika Art v2", alias: "pika_v2", type: "Anime" },
            { id: 6, name: "Stable Video", alias: "svd_xt", type: "Stable" },
            { id: 7, name: "Live Portrait", alias: "live_port", type: "Motion" },
            { id: 8, name: "LipSync Pro", alias: "sync_v2", type: "Voice" },
            { id: 9, name: "Vid-Enhance", alias: "upscale_v4", type: "4K" },
            { id: 10, name: "Morph AI", alias: "morph_v1", type: "Effect" },
            { id: 11, name: "Gemini Vision", alias: "gemini_v", type: "Agent" },
            { id: 12, name: "DeepSeek Vid", alias: "ds_video", type: "Logic" },
            { id: 13, name: "AnimateDiff", alias: "animate_diff", type: "SD" },
            { id: 14, name: "FaceSwap Pro", alias: "f_swap", type: "Elite" },
            { id: 15, name: "Ego Motion", alias: "ego_v1", type: "Action" },
            { id: 16, name: "SkyBox AI", alias: "sky_360", type: "VR" }
        ];

        document.getElementById('video-grid').innerHTML = engines.map(e => `
            <div class="engine-card glass p-8 flex flex-col gap-5 group">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black text-blue-500 tracking-widest uppercase">${e.name}</span>
                    <span class="text-[9px] text-slate-500 font-bold uppercase">${e.type}</span>
                </div>
                <div class="aspect-video bg-black/40 rounded-3xl border border-white/5 flex items-center justify-center italic text-[9px] text-slate-800">AWAITING SYSTEM COMMAND</div>
                <textarea class="engine-prompt bg-slate-950/50 border border-white/5 rounded-2xl p-4 text-xs text-white h-24 outline-none focus:border-blue-500/50 transition-all" placeholder="Enter Generation Prompt..."></textarea>
                <button onclick="sendGenerate('${e.alias}', ${e.id})" class="gen-btn py-4 rounded-2xl font-black text-[10px] tracking-[0.2em] uppercase text-white">Generate ${e.name}</button>
            </div>
        `).join('');

        async function sendGenerate(alias, id) {
            const prompt = document.querySelector(`[data-engine="${id}"] .engine-prompt`)?.value || "Test Prompt";
            console.log(`Sending to Backend Port 5002: ${alias}`);
            // Logic calling http://147.93.159.30:5002/api/render
        }
    </script>
</body>
</html>
