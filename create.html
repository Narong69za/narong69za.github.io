<!DOCTYPE html>
<html lang="en">

<head>

<title>AI Creator Platform — SN Design Studio</title>

<link rel="stylesheet" href="assets/css/master.css">

<body class="create-page">

<div id="nav"></div>

<!-- HERO -->
<section class="hero-master">

<img src="assets/images/create-hero.png">

<h1>SN DESIGN STUDIO — AI TOOL CORE</h1>

</div>

</section>


<!-- ======================
AI TOOL SELECTOR
====================== -->

<section class="section">

<div class="container">

<div class="ai-tool-selector">

<button data-tool="dance" class="tool-btn active">
Dance Motion
</button>

<button data-tool="lipsy" class="tool-btn">
AI Lipsync
</button>

<button data-tool="face" class="tool-btn">
Face Swap
</button>

</div>

</div>

</section>


<!-- ======================
DANCE PANEL
====================== -->

<div class="container">

<h2>DANCE MOTION CLONE</h2>

<input type="file" id="danceVideo">

<div id="dancePreview"></div>

</div>

</section>


<!-- ======================
LIPSYNC PANEL
====================== -->

<section id="panel-lipsy" class="ai-panel" style="display:none;">

<div class="container">

<h2>AI LIPSYNC</h2>

<input type="file" id="lipVideo">
<input type="file" id="lipAudio">

<div id="lipPreview"></div>

</div>

</section>
