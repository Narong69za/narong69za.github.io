<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ULTRA ENGINE CONTROL</title>

<link rel="stylesheet" href="/assets/css/create-premium.css">

</head>

<body>

<div class="create-root create-container">

<h1 class="title">ULTRA ENGINE CONTROL</h1>

<div class="account-wrapper">

<div class="user-header">
<span id="userShort">-</span>
</div>

<div class="account-card">

<div class="account-title">
ACCOUNT STATUS
</div>

<div class="account-row">
<span>EMAIL</span>
<span id="userEmail">-</span>
</div>

<div class="account-row">
<span>ROLE</span>
<span id="userRole">-</span>
</div>

<div class="account-row">
<span>CREDITS</span>
<span id="userCredits">0</span>
</div>

</div>
</div>


<div class="engine-wrap">

<!-- ENGINE LOOP -->

<script>

for(let i=1;i<=14;i++){

const box=document.createElement("div")

box.className=`engine engine-box engine-theme-${i}`

box.setAttribute("data-engine",i)

box.innerHTML=`

<h2>⭐ AI ENGINE</h2>

<div class="mode-row">

<button class="mode-btn active-mode">
AI MODEL
</button>

</div>

<div class="engine-detail">

<textarea class="engine-prompt"
placeholder="Describe your prompt..."></textarea>

<select class="engine-resolution">

<option value="720">720p</option>

<option value="1080">1080p</option>

</select>

<div class="engine-credit">

RATE
<span class="credit-rate">
0 credits / sec
</span>

</div>

</div>


<div class="engine-asset">

<input type="file"
class="engine-fileA"
accept="image/*,video/*,audio/*">

<div class="engine-preview">
Preview
</div>

</div>

<button class="generate-btn">

GENERATE

</button>

`

document.currentScript.parentElement.appendChild(box)

}

</script>

</div>


<div class="status-bar">

<span id="status">

STATUS: IDLE

</span>

</div>

</div>

<script src="/assets/js/config.js?v=6.1.0"></script>
<script src="/assets/js/create.js?v=9.5.0"></script>
<script src="/assets/js/create-nav.js?v=6.1.0"></script>

</body>
</html>
