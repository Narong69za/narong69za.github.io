<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN DESIGN STUDIO - PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', 'Inter', sans-serif; background: #020406; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); transition: all 0.4s ease; }
        .glass-card:hover { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); transform: translateY(-8px); }
        .text-azure { color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .progress-container { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background: #00d2ff; width: 0%; transition: width 0.3s ease; }
        .preview-box { background: #000; border: 1px dashed #1e293b; position: relative; min-height: 180px; display: flex; align-items: center; justify-content: center; border-radius: 1.5rem; overflow: hidden; }
        .preview-content { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
            <div class="text-center md:text-left">
                <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter text-azure uppercase">
                    SN DESIGN STUDIO
                </h1>
                <p class="text-slate-500 font-mono text-[10px] tracking-widest uppercase mt-2">Professional AI Architecture</p>
            </div>
            
            <div class="glass-card p-6 rounded-[2rem] flex items-center gap-8 min-w-[300px]">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg">S</div>
                <div class="flex-1">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">CREDITS</p>
                    <p id="userCredits" class="text-3xl font-black text-white">1,000,099</p>
                </div>
            </div>
        </header>

        <div id="engineGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>

        <footer class="mt-20 border-t border-white/5 pt-10 pb-20 text-center">
            <p class="text-[10px] text-slate-500 tracking-[0.5em] uppercase font-light">
                © SN DESIGN STUDIO 2006.
            </p>
        </footer>
    </div>

    <script>
        const engines = [
            { id: 1, name: "สร้างวิดีโอระดับสูง", cost: 50 },
            { id: 2, name: "สร้างรูปภาพ Ultra HD", cost: 15 },
            { id: 3, name: "อนิเมชั่นจากรูปภาพ", cost: 45 },
            { id: 4, name: "โมเดลวีดีโอ Cinematic", cost: 40 },
            { id: 5, name: "สร้างรูปภาพความเร็วสูง", cost: 10 },
            { id: 6, name: "สตูดิโอเสียง AI", cost: 5 },
            { id: 7, name: "แปลงเสียงเป็นเอฟเฟกต์", cost: 12 },
            { id: 8, name: "ขยายความคมชัดวีดีโอ", cost: 30 },
            { id: 9, name: "ตัดพื้นหลังวีดีโอ AI", cost: 20 },
            { id: 10, name: "สร้างตัวละคร 3D", cost: 100 },
            { id: 11, name: "ปรับแต่งแสงสีภาพ", cost: 8 },
            { id: 12, name: "แปลภาษาและพากย์เสียง", cost: 25 },
            { id: 13, name: "สร้างเพลงประกอบ", cost: 35 },
            { id: 14, name: "วิเคราะห์และแต่งบท", cost: 0 }
        ];

        const grid = document.getElementById('engineGrid');
        
        engines.forEach(eng => {
            const card = document.createElement('div');
            card.className = "engine-box glass-card p-8 rounded-[3rem] relative overflow-hidden flex flex-col justify-between";
            card.setAttribute('data-id', eng.id);
            card.setAttribute('data-engine', eng.id);

            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-azure font-black italic tracking-tighter text-sm uppercase">Model-${String(eng.id).padStart(2, '0')}</span>
                        <span class="text-[8px] font-bold text-slate-600 uppercase">SYSTEM SECURE</span>
                    </div>
                    <h3 class="text-xl font-bold mb-4">${eng.name}</h3>
                    <textarea class="engine-prompt w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-xs h-28 mb-4 outline-none focus:border-blue-500 transition-all resize-none" placeholder="พิมพ์รายละเอียดที่นี่..."></textarea>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <select class="engine-resolution bg-slate-900 border-none rounded-xl p-3 text-[10px] font-bold outline-none cursor-pointer">
                            <option value="720">720p HD</option>
                            <option value="1080">1080p ULTRA</option>
                        </select>
                        <label class="bg-emerald-500 flex items-center justify-center rounded-xl cursor-pointer py-3">
                            <input type="file" class="hidden engine-fileA">
                            <span class="text-[9px] font-black uppercase text-white">เลือกไฟล์</span>
                        </label>
                    </div>

                    <div class="preview-box mb-6 engine-preview">
                        <span class="text-[9px] text-slate-700 italic uppercase">Visual Preview</span>
                        <img class="preview-content">
                        <video class="preview-content" loop muted></video>
                        <div class="absolute bottom-4 left-4 right-4">
                            <div class="progress-container"><div class="progress-bar"></div></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button class="generate-btn flex-1 bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-blue-400 transition-all">
                        เริ่มสร้างงาน
                    </button>
                    <div class="text-right">
                        <p class="text-[8px] font-bold text-slate-500">COST</p>
                        <p class="text-sm font-black text-azure">-${eng.cost}</p>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>

    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/create.js"></script>
    <script src="assets/js/create-nav.js" defer></script>

</body>
</html>
