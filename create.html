<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN DESIGN STUDIO - PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --azure: #00d2ff; }
        body { font-family: 'Kanit', sans-serif; background: #020406; color: white; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .azure-glow { color: var(--azure); text-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .engine-preview { background: #000; border: 1px dashed #1e293b; min-height: 160px; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1400px] mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black italic azure-glow uppercase">SN DESIGN STUDIO</h1>
            <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                <p id="userCredits" class="text-xl font-black">0.00</p>
            </div>
        </header>
        <div id="engineGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        <footer class="mt-20 py-10 border-t border-white/5 text-center text-[10px] text-slate-600">© SN DESIGN STUDIO 2006.</footer>
    </div>
    <script>
        const engines = [
            { id: 1, name: "สร้างวิดีโอระดับสูง", cost: 50 }, { id: 2, name: "สร้างรูปภาพ Ultra HD", cost: 15 },
            { id: 3, name: "อนิเมชั่นจากรูปภาพ", cost: 45 }, { id: 4, name: "โมเดลวีดีโอ Cinematic", cost: 40 },
            { id: 5, name: "สร้างรูปภาพความเร็วสูง", cost: 10 }, { id: 6, name: "สตูดิโอเสียง AI", cost: 5 },
            { id: 7, name: "แปลงเสียงเป็นเอฟเฟกต์", cost: 12 }, { id: 8, name: "ขยายความคมชัดวีดีโอ", cost: 30 },
            { id: 9, name: "ตัดพื้นหลังวีดีโอ AI", cost: 20 }, { id: 10, name: "สร้างตัวละคร 3D", cost: 100 },
            { id: 11, name: "ปรับแต่งแสงสีภาพ", cost: 8 }, { id: 12, name: "แปลภาษาและพากย์เสียง", cost: 25 },
            { id: 13, name: "สร้างเพลงประกอบ", cost: 35 }, { id: 14, name: "วิเคราะห์และแต่งบท", cost: 0 }
        ];
        const grid = document.getElementById('engineGrid');
        engines.forEach(eng => {
            const card = document.createElement('div');
            card.className = "engine-box glass-card p-6 rounded-[2.5rem] flex flex-col justify-between";
            card.setAttribute('data-id', eng.id);
            card.setAttribute('data-engine', eng.id);
            card.innerHTML = `
                <div>
                    <h3 class="text-lg font-bold mb-4">${eng.name}</h3>
                    <textarea class="engine-prompt w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-[11px] h-24 mb-4 outline-none focus:border-blue-500 transition-all resize-none" placeholder="ป้อนคำสั่ง..."></textarea>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <select class="engine-resolution bg-slate-900 border-none rounded-xl p-3 text-[9px] font-bold outline-none"><option value="720">720p</option><option value="1080">1080p</option></select>
                        <label class="bg-emerald-500 flex items-center justify-center rounded-xl cursor-pointer py-3"><input type="file" class="hidden engine-fileA"><span class="text-[9px] font-black uppercase text-white">Import</span></label>
                    </div>
                    <div class="engine-preview mb-6"><span class="text-[9px] text-slate-700 italic">Preview Area</span></div>
                </div>
                <div class="flex items-center gap-4">
                    <button class="generate-btn flex-1 bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-blue-400 transition-all">สร้างงาน</button>
                    <p class="text-sm font-black text-blue-400">-${eng.cost}</p>
                </div>`;
            grid.appendChild(card);
        });
    </script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/create.js"></script>
    <script src="assets/js/create-nav.js" defer></script>
</body>
</html>
