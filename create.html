<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Official Website — SN DESIGN STUDIO</title>

<link rel="stylesheet" href="assets/css/master.css">

</head>

<body class="create-page">

<div id="nav"></div>

<section class="hero-master">

<img id="heroImage" src="assets/images/create-hero.png">

<div class="hero-content-bottom fade-up">

<h1 id="templateTitle">AI CREATE SYSTEM</h1>
<p id="templateSub">Ultra Modular AI Operating System</p>

</div>

</section>

<section class="ultra-ai-strip">

<div class="ai-strip-wrap">

<span class="ai-status active">SYSTEM ONLINE</span>
<span class="ai-status">Module Engine Ready</span>
<span class="ai-status">GPU Enabled</span>

</div>

</section>

<section class="section">

<div class="container">

<h2>Reference Video</h2>
<input type="file" id="videoInput" accept="video/*">

<h2>Character Image</h2>
<input type="file" id="imageInput" accept="image/*">

</div>

</section>

<section class="section">

<div class="container">

<div id="videoPreview"></div>
<div id="imagePreview"></div>

</div>

</section>

<footer>
© SN Design Studio, 2026 · All rights reserved.
</footer>


<!-- EXISTING ENGINE -->
<script src="assets/js/nav.js"></script>
<script src="assets/js/template-sync.js"></script>
<script src="assets/js/ultra-module-core.js"></script>


<!-- ========================= -->
<!-- ULTRA AUTO LOAD ENGINE (ADD ONLY) -->
<!-- ========================= -->

<script>

(function(){

/* =========================
   TEMPLATE DATA ENGINE
========================= */

const TEMPLATE_DATA = {

"dance-motion": {

title:"DANCE MOTION",
sub:"Ultra Modular AI Operating System",
hero:"assets/images/templates/dance-motion.jpg"

},

"dark-viral":{

title:"DARK VIRAL",
sub:"Ultra Modular AI Operating System"

},

"ai-lipsync":{

title:"AI LIP SYNC",
sub:"Ultra Modular AI Operating System"

}

};

/* =========================
   READ URL PARAM
========================= */

const params = new URLSearchParams(window.location.search);
const templateKey = params.get("template");

if(templateKey && TEMPLATE_DATA[templateKey]){

const data = TEMPLATE_DATA[templateKey];

if(document.getElementById("templateTitle"))
document.getElementById("templateTitle").innerText = data.title;

if(document.getElementById("templateSub"))
document.getElementById("templateSub").innerText = data.sub;

if(data.hero && document.getElementById("heroImage"))
document.getElementById("heroImage").src = data.hero;

}


/* =========================
   VIDEO PREVIEW ENGINE
========================= */

const videoInput = document.getElementById("videoInput");

if(videoInput){

videoInput.addEventListener("change",function(){

const file = this.files[0];

if(!file) return;

const url = URL.createObjectURL(file);

document.getElementById("videoPreview").innerHTML =

`<video controls style="width:100%;border-radius:12px;">
<source src="${url}">
</video>`;

});

}


/* =========================
   IMAGE PREVIEW ENGINE
========================= */

const imageInput = document.getElementById("imageInput");

if(imageInput){

imageInput.addEventListener("change",function(){

const file = this.files[0];

if(!file) return;

const url = URL.createObjectURL(file);

document.getElementById("imagePreview").innerHTML =

`<img src="${url}" style="width:100%;border-radius:12px;">`;

});

}

})();
</script>

</body>
    </html>
