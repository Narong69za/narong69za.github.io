<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA - AI PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #0a0a0a; --neon: #00ff41; --border: rgba(0, 255, 65, 0.15); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .top-nav { border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 10px 24px; position: sticky; top: 0; z-index: 100; }
        .engine-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; height: 100%; transition: 0.3s; }
        .engine-card:hover { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); }

        textarea, select { 
            background: #111 !important; 
            border: 1px solid #222 !important; 
            color: var(--neon) !important; 
            font-size: 11px !important; 
            width: 100%;
        }

        .btn-generate { background: var(--neon); color: #000; font-weight: 900; width: 120px; height: 38px; font-size: 11px; transition: 0.2s; }
        .info-label { font-size: 9px; font-weight: 700; color: #555; text-transform: uppercase; }
        .neon-text { text-shadow: 0 0 10px var(--neon); }
    </style>
</head>

<body>

<header class="top-nav">
    <div class="flex items-center gap-4">
        <h2 class="text-xl font-black italic tracking-tighter neon-text uppercase">AI PRODUCTION</h2>
        <div id="nav-container" class="hidden md:block"></div>
    </div>

    <div class="flex items-center gap-4">
        <div class="text-right border-l border-white/10 pl-4">
            <p class="info-label">Wallet Balance</p>
            <p class="text-lg font-black mono text-[#00ff41]" id="top-credits">1,480,500</p>
        </div>
        <a href="payment.html" class="px-3 py-1.5 bg-[#00ff41] text-black font-black text-[9px] rounded-lg uppercase">Topup</a>
    </div>
</header>

<main class="max-w-[1400px] mx-auto p-4 mt-4">
    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-2" id="engine-grid"></div>
</main>

<script src="assets/js/nav.js"></script>

<script>
const ENGINE_BASE_COSTS = { image:50, upscale:80, video:200, deep_motion:300 };

const engines = [
{ id:"01", mode:"TEXT TO VIDEO", type:"video", maxFile:"50MB", maxLen:"10S" },
{ id:"02", mode:"IMAGE TO VIDEO", type:"video", maxFile:"100MB", maxLen:"4S" },
{ id:"03", mode:"VIDEO TO VIDEO", type:"deep_motion", maxFile:"200MB", maxLen:"15S" },
{ id:"04", mode:"TEXT TO IMAGE", type:"image", maxFile:"N/A", maxLen:"N/A" },
{ id:"05", mode:"FACE SWAP", type:"image", maxFile:"20MB", maxLen:"N/A" },
{ id:"06", mode:"UPSCALE 4K", type:"upscale", maxFile:"500MB", maxLen:"N/A" },
{ id:"07", mode:"MOTION BRUSH", type:"deep_motion", maxFile:"50MB", maxLen:"5S" },
{ id:"08", mode:"AUDIO TO VIDEO", type:"video", maxFile:"30MB", maxLen:"60S" },
{ id:"09", mode:"VIRTUAL TRY-ON", type:"image", maxFile:"40MB", maxLen:"N/A" },
{ id:"10", mode:"3D GENERATION", type:"deep_motion", maxFile:"100MB", maxLen:"N/A" },
{ id:"11", mode:"STYLE TRANSFER", type:"video", maxFile:"80MB", maxLen:"10S" },
{ id:"12", mode:"LIP SYNC AI", type:"video", maxFile:"50MB", maxLen:"30S" },
{ id:"13", mode:"REMOVE BG VIDEO", type:"upscale", maxFile:"300MB", maxLen:"20S" },
{ id:"14", mode:"FRAME INTERPOLATION", type:"deep_motion", maxFile:"150MB", maxLen:"5S" }
];

function render(){
document.getElementById('engine-grid').innerHTML = engines.map(e=>`
<div class="engine-card p-4 flex flex-col md:flex-row gap-4">
<div class="flex-1 min-w-0">

<h3 class="text-sm font-black">${e.mode}</h3>

<textarea class="mt-2 h-16 p-2 rounded-lg"></textarea>

<div class="grid grid-cols-2 gap-2 mt-2">
<select id="res-${e.id}" onchange="calc('${e.id}','${e.type}')">
<option value="1">780P</option>
<option value="2.5">1080P</option>
</select>

<select id="dur-${e.id}" onchange="calc('${e.id}','${e.type}')">
<option value="1">BASE</option>
<option value="2">LONG</option>
</select>
</div>

</div>

<div class="md:w-28 flex flex-col justify-between items-center">
<p class="mono" id="cost-${e.id}">${ENGINE_BASE_COSTS[e.type]}</p>

<button class="btn-generate" data-id="${e.id}">GENERATE</button>
</div>
</div>
`).join("");

// đź” bind AFTER render
document.querySelectorAll(".btn-generate").forEach(btn=>{
btn.addEventListener("click", ()=> runEngine(btn.dataset.id));
});

}

function calc(id,type){
const final =
Math.floor(ENGINE_BASE_COSTS[type] *
document.getElementById(`res-${id}`).value *
document.getElementById(`dur-${id}`).value);

document.getElementById(`cost-${id}`).innerText = final;
}

document.addEventListener("DOMContentLoaded", render);
</script>

<!-- ===================== ADD-ONLY ENGINE CORE (FIX LIVE SYSTEM) ===================== -->

<script>

const API_BASE = "https://api.sn-designstudio.dev";
const EMAIL = localStorage.getItem("user_email") || "test@sn.com";

async function runEngine(id){

const engine = engines.find(e=>e.id===id);
if(!engine) return alert("Engine not found");

const textarea = document.querySelectorAll("textarea")[parseInt(id)-1];
const prompt = textarea ? textarea.value : "";

const res = document.getElementById(`res-${id}`).value;
const dur = document.getElementById(`dur-${id}`).value;

const cost = Math.floor(ENGINE_BASE_COSTS[engine.type] * res * dur);

let endpoint = "";

if(engine.type==="image") endpoint="/api/generate/image";
if(engine.type==="video") endpoint="/api/generate/video";
if(engine.type==="deep_motion") endpoint="/api/generate/motion";
if(engine.type==="upscale") endpoint="/api/generate/upscale";

try{

const response = await fetch(API_BASE + endpoint,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
email:EMAIL,
engine_id:id,
prompt,
resolution:res,
duration:dur,
cost
})
});

const data = await response.json();

if(data.job_id){
pollJob(data.job_id);
return;
}

if(data.image_url) window.open(data.image_url);
if(data.video_url) window.open(data.video_url);

}catch(e){
alert("API ERROR / CONNECTION FAILED");
}

}

function pollJob(jobId){

const t = setInterval(async ()=>{

try{

const res = await fetch(`${API_BASE}/api/job-status?id=${jobId}`);
const data = await res.json();

if(data.status==="done"){
clearInterval(t);
if(data.result_url) window.open(data.result_url);
}

}catch(e){}

},3000);

}

</script>

</body>
</html>
