<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ULTRA ENGINE CONTROL</title>

<link rel="stylesheet" href="/assets/css/create-premium.css">

</head>

<body>

<div class="create-root create-container">

<h1 class="title">ULTRA ENGINE CONTROL</h1>

<!-- ACCOUNT DASHBOARD -->
<div class="account-wrapper">

<div class="user-header">
<span id="userShort">-</span>
</div>

<div class="account-card">

<div class="account-title">
ACCOUNT STATUS
</div>

<div class="account-row">
<span>EMAIL</span>
<span id="userEmail">-</span>
</div>

<div class="account-row">
<span>ROLE</span>
<span id="userRole">-</span>
</div>

<div class="account-row">
<span>CREDITS</span>
<span id="userCredits">0</span>
</div>

</div>
</div>

<div class="engine-wrap">

<!-- ENGINE TEMPLATE -->

<div class="engine engine-box engine-theme-1"
data-engine="1"
data-type="text_to_video"
data-model="gen4.5">

<h2>⭐ AI ENGINE</h2>

<div class="mode-row">
<button class="mode-btn active-mode">🎬 Text to Video</button>
</div>

<div class="engine-detail">

<textarea class="engine-prompt"
placeholder="Describe your scene..."></textarea>

<select class="engine-resolution">

<option value="720">720p</option>

<option value="1080">1080p</option>

</select>

<div class="engine-credit">

RATE:
<span class="credit-rate">
0 credits / sec
</span>

</div>

</div>

<button class="generate-btn">
GENERATE
</button>

</div>

<!-- ENGINE 2-14 -->

<script>
for(let i=2;i<=14;i++){

const engine=document.createElement("div")

engine.className=`engine engine-box engine-theme-${i}`

engine.setAttribute("data-engine",i)
engine.setAttribute("data-type","text_to_video")
engine.setAttribute("data-model","model_"+i)

engine.innerHTML=`

<h2>⭐ AI ENGINE</h2>

<div class="mode-row">
<button class="mode-btn active-mode">AI MODEL</button>
</div>

<div class="engine-detail">

<textarea class="engine-prompt"
placeholder="Prompt..."></textarea>

<select class="engine-resolution">
<option value="720">720p</option>
<option value="1080">1080p</option>
</select>

<select class="engine-length">
<option value="5">5 sec</option>
<option value="10">10 sec</option>
</select>

<div class="engine-credit">
CREDIT COST:
<span class="credit-value">0</span>
</div>

</div>

<button class="generate-btn">GENERATE</button>

`

document.querySelector(".engine-wrap").appendChild(engine)

}
</script>

</div>

<div class="status-bar">
<span id="status">STATUS: IDLE</span>
</div>

</div>

<script src="/assets/js/config.js?v=6.1.0"></script>
<script src="/assets/js/create.js?v=9.4.0"></script>
<script src="/assets/js/create-nav.js?v=6.1.0"></script>

</body>
</html>
