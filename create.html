<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN DESIGN STUDIO - UNLOCKED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020406; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-azure { color: #00d2ff; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic text-azure uppercase">SN DESIGN STUDIO</h1>
            <div class="glass-card p-4 rounded-xl"><p id="userCredits" class="text-xl font-bold">0.00</p></div>
        </header>

        <div id="engineGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        const engines = [
            { id: 1, name: "สร้างวิดีโอระดับสูง", cost: 50 }, { id: 2, name: "สร้างรูปภาพ Ultra HD", cost: 15 },
            { id: 3, name: "อนิเมชั่นจากรูปภาพ", cost: 45 }, { id: 4, name: "โมเดลวีดีโอ Cinematic", cost: 40 },
            { id: 5, name: "สร้างรูปภาพความเร็วสูง", cost: 10 }, { id: 6, name: "สตูดิโอเสียง AI", cost: 5 },
            { id: 7, name: "แปลงเสียงเป็นเอฟเฟกต์", cost: 12 }, { id: 8, name: "ขยายความคมชัดวีดีโอ", cost: 30 },
            { id: 9, name: "ตัดพื้นหลังวีดีโอ AI", cost: 20 }, { id: 10, name: "สร้างตัวละคร 3D", cost: 100 },
            { id: 11, name: "ปรับแต่งแสงสีภาพ", cost: 8 }, { id: 12, name: "แปลภาษาและพากย์เสียง", cost: 25 },
            { id: 13, name: "สร้างเพลงประกอบ", cost: 35 }, { id: 14, name: "วิเคราะห์และแต่งบท", cost: 0 }
        ];

        const grid = document.getElementById('engineGrid');
        engines.forEach(eng => {
            const div = document.createElement('div');
            div.className = "engine-box glass-card p-6 rounded-[2rem] flex flex-col justify-between";
            div.setAttribute('data-id', eng.id);
            div.setAttribute('data-engine', eng.id);
            div.innerHTML = `
                <h3 class="text-lg font-bold mb-4">${eng.name}</h3>
                <textarea class="engine-prompt w-full bg-black/40 border border-white/5 rounded-xl p-3 text-xs h-24 mb-4 outline-none focus:border-azure resize-none" placeholder="ป้อนคำสั่ง..."></textarea>
                <div class="flex items-center justify-between gap-4 mt-auto">
                    <button class="generate-btn flex-1 bg-white text-black py-3 rounded-xl font-bold text-[10px] uppercase">สร้างงาน</button>
                    <p class="text-xs font-bold text-azure">-${eng.cost}</p>
                </div>`;
            grid.appendChild(div);
        });
    </script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/create.js"></script>
</body>
</html>
