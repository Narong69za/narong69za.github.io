<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ULTRA ENGINE CONTROL</title>

<link rel="stylesheet" href="/assets/css/create-premium.css">
</head>
<body>

<div class="create-root create-container">

  <h1 class="title">ULTRA ENGINE CONTROL</h1>

  <div class="account-wrapper">

    <div class="user-header">
      <span id="userShort">-</span>
    </div>

    <div class="account-card">

      <div class="account-title">
        ACCOUNT STATUS
      </div>

      <div class="account-row">
        <span>EMAIL</span>
        <span id="userEmail">-</span>
      </div>

      <div class="account-row">
        <span>ROLE</span>
        <span id="userRole">-</span>
      </div>

      <div class="account-row">
        <span>CREDITS</span>
        <span id="userCredits">0</span>
      </div>

    </div>

  </div>

  <textarea placeholder="พิมพ์คำสั่งสร้างวิดีโอ AI..."></textarea>

  <div class="type-bar">
    <button class="type-btn active">สร้างวิดีโอ</button>
    <button class="type-btn">สร้างภาพ</button>
    <button class="type-btn">Upscale</button>
  </div>

  <div class="engine-wrap">

    <div class="engine engine-box red-engine">
      <h2>⭐ สร้างวิดีโอ AI</h2>

      <div class="mode-row">
        <button class="mode-btn" data-alias="image_to_video">🎬 สร้างคลิปไวรัล AI</button>
        <button class="mode-btn" data-alias="lip_sync">🎤 ลิปซิงค์เสียง-คำพูด</button>
        <button class="mode-btn" data-alias="motion_transfer">🕺 โคลนท่าเต้น AI</button>
        <button class="mode-btn" data-alias="face_swap">🧑 เปลี่ยนหน้า AI</button>
      </div>

      <button class="generate-btn">สร้างวิดีโอ AI (RW)</button>
    </div>

    <div class="engine engine-box blue-engine">
      <h2>⭐ สร้างวิดีโอ AI</h2>

      <div class="mode-row">
        <button class="mode-btn">🎬 สร้างคลิปไวรัล AI</button>
        <button class="mode-btn">🎤 ลิปซิงค์เสียง-คำพูด</button>
        <button class="mode-btn">🕺 โคลนท่าเต้น AI</button>
        <button class="mode-btn">🧑 เปลี่ยนหน้า AI</button>
      </div>

      <button class="generate-btn">สร้างวิดีโอ AI (RC)</button>
    </div>

  </div>

  <div class="upload-core-wrapper">
    <div class="upload-core">
      <div class="upload-box">
        <span>Upload Motion / Source</span>
        <input type="file" id="fileA" />
      </div>

      <div class="upload-box">
        <span>Upload Character / Target</span>
        <input type="file" id="fileB" />
      </div>
    </div>
  </div>

  <div class="preview-dual preview-wrapper">
    <div class="preview-box">
      <video id="preview-red-video" controls></video>
      <img id="preview-red-image"/>
    </div>

    <div class="preview-box">
      <video id="preview-blue-video" controls></video>
      <img id="preview-blue-image"/>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">STATUS: IDLE</span>
  </div>

</div>

<script src="/assets/js/config.js?v=6.1.0"></script>
<script src="/assets/js/create.js?v=6.1.0"></script>
<script src="/assets/js/create-nav.js?v=6.1.0"></script>

<!-- =====================================================
PROJECT: SN DESIGN STUDIO
MODULE: account.loader.inline
VERSION: v9.0.0
STATUS: production
RESPONSIBILITY:
- fetch authenticated user
- update account UI safely
===================================================== -->
<script>
document.addEventListener("DOMContentLoaded", async () => {

  try {

    if (typeof API_BASE === "undefined") {
      console.error("API_BASE not found");
      return;
    }

    const response = await fetch(`${API_BASE}/auth/me`, {
      method: "GET",
      credentials: "include"
    });

    if (!response.ok) {
      console.warn("User not authenticated");
      return;
    }

    const user = await response.json();

    const emailEl = document.getElementById("userEmail");
    const roleEl = document.getElementById("userRole");
    const creditEl = document.getElementById("userCredits");
    const shortEl = document.getElementById("userShort");

    if (emailEl) emailEl.textContent = user.email || "-";
    if (roleEl) roleEl.textContent = user.role || "-";
    if (creditEl) creditEl.textContent = user.credits ?? 0;
    if (shortEl && user.email) shortEl.textContent = user.email.split("@")[0];

  } catch (err) {
    console.error("ACCOUNT LOAD ERROR:", err);
  }

});
</script>

</body>
    </html>
