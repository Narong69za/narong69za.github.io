<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN DESIGN STUDIO - PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Kanit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --azure: #00d2ff; }
        body { font-family: 'Kanit', 'Inter', sans-serif; background: #020406; color: white; -webkit-font-smoothing: antialiased; }
        
        /* Fluid Typography */
        .brand-title { font-size: clamp(2rem, 8vw, 4.5rem); line-height: 1; letter-spacing: -0.05em; }
        .glass-card { background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .azure-glow { color: var(--azure); text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .btn-import { background: #10b981; }
        
        /* Engine Preview & Process */
        .progress-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; display: none; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); width: 0%; transition: width 0.4s ease; }
        .preview-box { background: #000; border: 1px dashed #1e293b; min-height: 160px; border-radius: 1.5rem; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .preview-content { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* Hover Effects */
        .engine-box { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .engine-box:hover { border-color: var(--azure); transform: translateY(-8px); box-shadow: 0 0 40px rgba(0, 210, 255, 0.15); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-left">
                <h1 class="brand-title font-black italic azure-glow uppercase">
                    SN DESIGN STUDIO
                </h1>
                <p class="text-slate-500 font-mono text-[10px] tracking-[0.4em] uppercase mt-2">Next-Gen AI Production</p>
            </div>
            
            <div class="glass-card p-5 rounded-[2rem] flex items-center gap-6 w-full md:w-auto">
                <div class="w-14 h-14 bg-gradient-to-br from-blue-400 to-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl" id="userIcon">S</div>
                <div class="flex-1">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest" id="userNameLabel">ยอดเครดิต</p>
                    <p id="userCredits" class="text-2xl font-black text-white">0.00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            
            <script>
                const engines = [
                    { id: 1, name: "สร้างวิดีโอระดับสูง", desc: "แปลงข้อจำเป็นวีดีโอสมจริง", cost: 50 },
                    { id: 2, name: "สร้างรูปภาพ Ultra HD", desc: "ภาพวาดและภาพถ่ายสมจริง", cost: 15 },
                    { id: 3, name: "อนิเมชั่นจากรูปภาพ", desc: "เปลี่ยนรูปนิ่งให้เคลื่อนไหว", cost: 45 },
                    { id: 4, name: "โมเดลวีดีโอ Cinematic", desc: "มุมกล้องระดับภาพยนตร์", cost: 40 },
                    { id: 5, name: "สร้างรูปภาพความเร็วสูง", desc: "เน้นความเร็วและคุณภาพ", cost: 10 },
                    { id: 6, name: "สตูดิโอเสียง AI", desc: "เสียงพากย์ภาษาไทยสมจริง", cost: 5 },
                    { id: 7, name: "แปลงเสียงเป็นเอฟเฟกต์", desc: "สร้าง SFX จากข้อความ", cost: 12 },
                    { id: 8, name: "ขยายความคมชัดวีดีโอ", desc: "Upscale เป็น 4K อัตโนมัติ", cost: 30 },
                    { id: 9, name: "ตัดพื้นหลังวีดีโอ AI", desc: "ลบฉากหลังแบบมืออาชีพ", cost: 20 },
                    { id: 10, name: "สร้างตัวละคร 3D", desc: "โมเดล 3D จากรูปภาพ", cost: 100 },
                    { id: 11, name: "ปรับแต่งแสงสีภาพ", desc: "Color Grading อัตโนมัติ", cost: 8 },
                    { id: 12, name: "แปลภาษาและพากย์เสียง", desc: "Global Voice Sync", cost: 25 },
                    { id: 13, name: "สร้างเพลงประกอบ", desc: "Background Music AI", cost: 35 },
                    { id: 14, name: "วิเคราะห์และแต่งบท", desc: "Storytelling Assistant", cost: 0 }
                ];

                document.write(engines.map(eng => `
                    <div class="engine-box glass-card p-6 rounded-[2.5rem] flex flex-col justify-between" data-id="${eng.id}" data-engine="${eng.id}">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-azure font-black italic text-sm">MODEL-${String(eng.id).padStart(2, '0')}</span>
                                <span class="text-[8px] font-bold text-slate-600 uppercase tracking-widest">ENCRYPTED</span>
                            </div>

                            <h3 class="text-xl font-bold mb-1">${eng.name}</h3>
                            <p class="text-slate-500 text-[10px] mb-6">${eng.desc}</p>

                            <textarea class="engine-prompt w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-[11px] h-24 mb-4 focus:border-blue-500 transition-all outline-none resize-none" placeholder="ป้อนคำสั่งของคุณที่นี่..."></textarea>
                            
                            <div class="grid grid-cols-2 gap-2 mb-4">
                                <select class="engine-resolution bg-slate-900 border-none rounded-xl p-3 text-[9px] font-bold outline-none cursor-pointer">
                                    <option value="720">720p HD</option>
                                    <option value="1080">1080p ULTRA</option>
                                </select>
                                <label class="btn-import flex items-center justify-center rounded-xl cursor-pointer py-3">
                                    <input type="file" class="hidden engine-fileA">
                                    <span class="text-[9px] font-black uppercase text-white">Import Media</span>
                                </label>
                            </div>

                            <div class="preview-box mb-6 engine-preview">
                                <span class="text-[9px] text-slate-700 italic tracking-widest uppercase">Visual Preview</span>
                                <img class="preview-content" src="">
                                <video class="preview-content" loop muted></video>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <div class="progress-container"><div class="progress-bar"></div></div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <button class="generate-btn flex-1 bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-azure hover:text-white transition-all">
                                เริ่มงานสร้าง
                            </button>
                            <div class="text-right">
                                <p class="text-[8px] font-bold text-slate-500">COST</p>
                                <p class="text-sm font-black text-azure">-${eng.cost}</p>
                            </div>
                        </div>
                    </div>
                `).join(''));
            </script>

        </div>
        
        <footer class="mt-16 py-10 border-t border-white/5 text-center">
            <p class="text-[10px] text-slate-500 tracking-[0.5em] uppercase">
                © SN DESIGN STUDIO 2006.
            </p>
        </footer>
    </div>

</body>
</html>
