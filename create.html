<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE CONTROL - 14 MODELS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #05070a; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .gen-btn { background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); transition: all 0.2s; }
        .gen-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600">ULTRA ENGINE</h1>
            <p class="text-slate-500 uppercase tracking-widest text-xs mt-2 italic">14 Models Production Suite</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <script>
                const engines = [
                    { id: 1, name: "สร้างวิดีโอจากข้อความ", model: "gen4_turbo" },
                    { id: 2, name: "สร้างภาพจากข้อความ", model: "gen4_image" },
                    { id: 3, name: "สร้างวิดีโอจากภาพ", model: "gen4_turbo" },
                    { id: 4, name: "สร้างภาพ AI", model: "gen4_image" },
                    { id: 5, name: "ภาพ AI ความเร็วสูง", model: "gen4_image_turbo" },
                    { id: 6, name: "การเคลื่อนไหวตัวละคร", model: "act_two" },
                    { id: 7, name: "ปรับปรุงคุณภาพวิดีโอ", model: "gen4_aleph" },
                    { id: 8, name: "สร้างวิดีโอ AI รุ่นใหม่", model: "veo3" },
                    { id: 9, name: "สร้างวิดีโอ AI ขั้นสูง", model: "veo3.1" },
                    { id: 10, name: "สร้างวิดีโอ AI แบบเร็ว", model: "veo3.1_fast" },
                    { id: 11, name: "สร้างภาพ AI (Gemini)", model: "gemini_2.5_flash" },
                    { id: 12, name: "สร้างเสียงพูด AI", model: "eleven_multilingual_v2" },
                    { id: 13, name: "สร้างเสียงเอฟเฟกต์", model: "eleven_text_to_sound_v2" },
                    { id: 14, name: "เปลี่ยนเสียงพูด", model: "eleven_multilingual_sts_v2" }
                ];
                
                document.write(engines.map(e => `
                    <div class="engine engine-box glass p-6 rounded-[2rem]" data-engine="${e.id}" data-model="${e.model}">
                        <p class="text-[10px] font-bold text-blue-500 mb-4 uppercase tracking-widest">Engine ${String(e.id).padStart(2, '0')}</p>
                        <h3 class="text-sm font-bold mb-4">${e.name}</h3>
                        <textarea class="engine-prompt w-full bg-slate-900 rounded-2xl p-3 text-xs mb-4 h-24 focus:outline-none focus:border-blue-500 border border-slate-800" placeholder="Enter prompt..."></textarea>
                        <div class="flex gap-2 mb-4">
                            <select class="engine-resolution bg-slate-800 rounded-lg p-2 text-[10px] flex-1">
                                <option value="720">720p</option><option value="1080">1080p</option>
                            </select>
                            <input type="file" class="engine-fileA text-[10px] flex-1">
                        </div>
                        <div class="engine-preview aspect-video bg-black rounded-xl mb-4 flex items-center justify-center text-[10px] italic text-slate-800 border border-slate-900">Preview</div>
                        <button class="gen-btn generate-btn w-full py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Run Engine ${String(e.id).padStart(2, '0')}</button>
                    </div>
                `).join(''));
            </script>
        </div>
    </div>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/create.js"></script>
</body>
</html>
