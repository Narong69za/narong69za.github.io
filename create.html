<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ULTRA ENGINE CONTROL</title>

<link rel="stylesheet" href="/assets/css/create-premium.css">

</head>

<body>

<div class="create-root create-container">

<h1 class="title">ULTRA ENGINE CONTROL</h1>

<!-- ================= ACCOUNT ================= -->

<div class="account-wrapper">

<div class="user-header">
<span id="userShort">-</span>
</div>

<div class="account-card">

<div class="account-title">
ACCOUNT STATUS
</div>

<div class="account-row">
<span>EMAIL</span>
<span id="userEmail">-</span>
</div>

<div class="account-row">
<span>ROLE</span>
<span id="userRole">-</span>
</div>

<div class="account-row">
<span>CREDITS</span>
<span id="userCredits">0</span>
</div>

</div>
</div>

<!-- ================= ENGINE WRAP ================= -->

<div class="engine-wrap">

<!-- ================================================= -->
<!-- ENGINE 1 -->
<!-- ================================================= -->

<div class="engine engine-box engine-theme-1" data-engine="1">

<h2>⭐ AI ENGINE</h2>

<div class="engine-detail">

<textarea
class="engine-prompt"
placeholder="Describe your prompt..."></textarea>

<div style="display:flex;gap:10px;justify-content:center;margin-top:10px">

<select class="engine-resolution">
<option value="720">720p</option>
<option value="1080">1080p</option>
</select>

<input
type="file"
class="engine-fileA"
accept="image/*,video/*,audio/*">

</div>

<div class="engine-credit">
RATE
<span class="credit-rate">
0 credits / sec
</span>
</div>

</div>

<div class="engine-preview">Preview</div>

<button class="generate-btn">GENERATE</button>

</div>

<!-- ================================================= -->
<!-- ENGINE 2 -->
<!-- ================================================= -->

<div class="engine engine-box engine-theme-2" data-engine="2">

<h2>⭐ AI ENGINE</h2>

<div class="engine-detail">

<textarea class="engine-prompt"
placeholder="Describe your prompt..."></textarea>

<div style="display:flex;gap:10px;justify-content:center;margin-top:10px">

<select class="engine-resolution">
<option value="720">720p</option>
<option value="1080">1080p</option>
</select>

<input
type="file"
class="engine-fileA"
accept="image/*,video/*,audio/*">

</div>

<div class="engine-credit">
RATE
<span class="credit-rate">
0 credits / sec
</span>
</div>

</div>

<div class="engine-preview">Preview</div>

<button class="generate-btn">GENERATE</button>

</div>
