<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE MASTER - 14 MODELS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020406; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); transform: translateY(-8px); }
        
        /* Azure Blue Theme */
        .text-azure { color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .bg-azure { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
        
        /* Green Import Button */
        .btn-import { background: #10b981; transition: all 0.3s ease; }
        .btn-import:hover { background: #059669; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        /* Progress Bar */
        .progress-container { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background: #00d2ff; width: 0%; transition: width 0.3s ease; }

        .preview-box { background: #000; border: 1px dashed #1e293b; position: relative; min-height: 180px; display: flex; align-items: center; justify-content: center; border-radius: 1.5rem; }
        .preview-content { width: 100%; height: 100%; object-fit: cover; border-radius: 1.5rem; display: none; }

        .cta-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: #64748b; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
            <div class="text-center md:text-left">
                <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter text-azure uppercase">
                    Ultra Engine <span class="text-white text-3xl not-italic font-light">14 Models</span>
                </h1>
                <div class="flex items-center gap-3 mt-2 justify-center md:justify-start">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p class="text-slate-500 font-mono text-[10px] tracking-widest uppercase">System Status: Ultra Stable Core</p>
                </div>
            </div>
            
            <div class="glass-card p-6 rounded-[2rem] flex items-center gap-8 min-w-[320px]">
                <div class="w-16 h-16 bg-azure rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg">S</div>
                <div class="flex-1">
                    <p class="cta-label">Current Credits</p>
                    <p id="userCredits" class="text-3xl font-black text-white">1,000,099</p>
                </div>
                <div class="px-4 py-2 bg-blue-500/10 rounded-full border border-blue-500/20">
                    <span class="text-[10px] font-bold text-blue-400">PRO PLAN</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            
            <script>
                const engines = [
                    { id: 1, name: "Runway Gen-3", brand: "RUNWAYML", type: "Video", cost: 50 },
                    { id: 2, name: "Flux Pro 1.1", brand: "BLACK FOREST", type: "Image", cost: 15 },
                    { id: 3, name: "Gen-3 Image-to-Vid", brand: "RUNWAYML", type: "Motion", cost: 45 },
                    { id: 4, name: "Luma Dream Machine", brand: "LUMA LABS", type: "Video", cost: 40 },
                    { id: 5, name: "Kling AI Turbo", brand: "KLING", type: "Pro Video", cost: 60 },
                    { id: 6, name: "Stable Diffusion 3", brand: "STABILITY", type: "Image", cost: 10 },
                    { id: 7, name: "Gemini 2.0 Visual", brand: "GOOGLE", type: "Multi-Modal", cost: 20 },
                    { id: 8, name: "Midjourney v6.1", brand: "MJ ENGINE", type: "Art", cost: 25 },
                    { id: 9, name: "ElevenLabs Voice", brand: "ELEVENLABS", type: "Audio", cost: 5 },
                    { id: 10, name: "Sora Pipeline", brand: "OPENAI", type: "Video", cost: 100 },
                    { id: 11, name: "Pika Art v2", brand: "PIKA", type: "Animation", cost: 35 },
                    { id: 12, name: "Ideogram 2.0", brand: "IDEOGRAM", type: "Typography", cost: 12 },
                    { id: 13, name: "Udio Music", brand: "UDIO", type: "Music", cost: 30 },
                    { id: 14, name: "Gemini 1.5 Pro", brand: "GOOGLE", type: "Logic", cost: 0 }
                ];

                document.write(engines.map(eng => `
                    <div class="engine-box glass-card p-8 rounded-[3rem] relative overflow-hidden" data-id="${eng.id}">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-azure font-black italic tracking-tighter">E-${String(eng.id).padStart(2, '0')}</span>
                            <span class="text-[9px] font-bold bg-white/5 px-3 py-1 rounded-full text-slate-400 uppercase tracking-widest">${eng.brand}</span>
                        </div>

                        <h3 class="text-xl font-extrabold mb-2">${eng.name}</h3>
                        <p class="text-slate-500 text-[10px] mb-6 uppercase tracking-widest">${eng.type} Production</p>

                        <textarea class="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-xs h-28 mb-4 focus:border-blue-500 transition-all outline-none" placeholder="Enter your prompt here..."></textarea>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <select class="bg-slate-900 border-none rounded-xl p-3 text-[10px] font-bold outline-none cursor-pointer">
                                <option value="720">720p HD</option>
                                <option value="1080">1080p ULTRA</option>
                            </select>
                            <label class="btn-import flex items-center justify-center rounded-xl cursor-pointer py-3 group">
                                <input type="file" class="hidden file-input">
                                <span class="text-[9px] font-black uppercase text-white group-hover:scale-110 transition-transform">Import Media</span>
                            </label>
                        </div>

                        <div class="preview-box mb-6 group overflow-hidden">
                            <span class="text-[9px] text-slate-700 italic group-hover:text-blue-500 transition-colors">READY TO ANALYZE</span>
                            <img class="preview-content" src="">
                            <video class="preview-content" loop muted></video>
                            
                            <div class="absolute bottom-4 left-4 right-4">
                                <div class="progress-container shadow-2xl">
                                    <div class="progress-bar"></div>
                                </div>
                                <p class="text-[8px] text-center mt-2 opacity-0 status-text tracking-widest">GENERATING...</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <button onclick="runEngine(${eng.id})" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:bg-azure hover:text-white transition-all duration-300 shadow-xl">
                                Generate
                            </button>
                            <div class="text-right">
                                <p class="cta-label">Cost</p>
                                <p class="text-sm font-black text-azure">-${eng.cost}</p>
                            </div>
                        </div>
                        
                        <div class="download-btn hidden absolute inset-0 bg-blue-600/90 flex flex-col items-center justify-center backdrop-blur-md transition-all">
                            <p class="font-black text-xl mb-4">COMPLETED</p>
                            <button class="bg-white text-black px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest">Download File</button>
                            <button onclick="resetEngine(${eng.id})" class="mt-4 text-[10px] underline opacity-70">Create New</button>
                        </div>
                    </div>
                `).join(''));
            </script>

        </div>
        
        <footer class="mt-20 border-t border-white/5 pt-10 pb-20 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center border border-white/5">
                    <span class="text-azure font-bold text-xs">V2</span>
                </div>
                <p class="text-[10px] text-slate-500 tracking-[0.3em] uppercase">Ultra Engine Master Control ¬© 2026</p>
            </div>
            <div class="flex gap-10">
                <div class="text-center"><p class="cta-label">Total Credits Sold</p><p class="text-xl font-black text-white">5,000.00</p></div>
                <div class="text-center"><p class="cta-label">API Status</p><p class="text-xl font-black text-emerald-400">ONLINE</p></div>
            </div>
        </footer>
    </div>

    <script>
        // üõ ENGINE LOGIC (Ô∏è‡∏û‡∏≤‡∏£‡πå‡∏ó‡πÄ‡∏ô‡∏≠‡∏£‡πå‡πÑ‡∏°‡πà‡∏ï‡πâ‡∏≠‡∏á‡πÅ‡∏Å‡πâ‡πÅ‡∏•‡πâ‡∏ß)
        function runEngine(id) {
            const box = document.querySelector(`[data-id="${id}"]`);
            const btn = box.querySelector('button');
            const progress = box.querySelector('.progress-container');
            const bar = box.querySelector('.progress-bar');
            const statusText = box.querySelector('.status-text');

            // 1. Start UI Animation
            btn.disabled = true;
            btn.innerHTML = "Processing...";
            progress.style.display = 'block';
            statusText.style.opacity = '1';

            // 2. Simulate API Request (‡∏¢‡∏¥‡∏á‡πÑ‡∏õ‡∏û‡∏≠‡∏£‡πå‡∏ï 5002)
            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 15;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    showDownload(id);
                }
                bar.style.width = p + '%';
            }, 500);
        }

        function showDownload(id) {
            const box = document.querySelector(`[data-id="${id}"]`);
            box.querySelector('.download-btn').classList.remove('hidden');
        }

        function resetEngine(id) {
            const box = document.querySelector(`[data-id="${id}"]`);
            box.querySelector('.download-btn').classList.add('hidden');
            box.querySelector('.progress-bar').style.width = '0%';
            box.querySelector('.progress-container').style.display = 'none';
            box.querySelector('button').disabled = false;
            box.querySelector('button').innerHTML = "Generate";
        }

        // üñ Preview Logic (Ô∏è‡∏£‡∏≠‡∏á‡∏£‡∏±‡∏ö‡∏ó‡∏±‡πâ‡∏á Image ‡πÅ‡∏•‡∏∞ Video)
        document.querySelectorAll('.file-input').forEach(input => {
            input.addEventListener('change', function() {
                const file = this.files[0];
                const box = this.closest('.engine-box');
                const img = box.querySelector('img.preview-content');
                const vid = box.querySelector('video.preview-content');
                const label = box.querySelector('.preview-box span');

                if (file) {
                    const url = URL.createObjectURL(file);
                    label.style.display = 'none';
                    if (file.type.startsWith('video')) {
                        vid.src = url; vid.style.display = 'block'; img.style.display = 'none'; vid.play();
                    } else {
                        img.src = url; img.style.display = 'block'; vid.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>
