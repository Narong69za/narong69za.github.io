<!DOCTYPE html>
<html lang="en">
<head>

<!-- ========================= -->
<!-- CORE META (ADD ONLY) -->
<!-- ========================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Create System — SN DESIGN STUDIO</title>

<meta name="description" content="AI Create System by SN Design Studio. Build viral CapCut templates with modular AI engine.">
<meta name="keywords" content="SN Design Studio, AI Create, CapCut Template, Dance Motion, AI Video">
<meta name="author" content="SN Design Studio">

<link rel="canonical" href="https://sn-designstudio.dev/create.html">

<!-- OpenGraph -->
<meta property="og:title" content="AI Create System — SN DESIGN STUDIO">
<meta property="og:description" content="Ultra Modular AI Operating System for Viral Videos">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sn-designstudio.dev/create.html">

<!-- ========================= -->
<!-- ADS SAFE SLOT (EMPTY) -->
<!-- ========================= -->
<!-- Google Ads / Meta Ads can inject here without touching core -->

</head>

<body>

<!-- ========================= -->
<!-- TEMPLATE HEADER -->
<!-- ========================= -->
<section class="template-hero">
    <h1 id="sn-template-title">DANCE MOTION</h1>
    <p id="sn-template-sub">Ultra Modular AI Operating System</p>
</section>

<!-- ========================= -->
<!-- SYSTEM STATUS -->
<!-- ========================= -->
<section class="system-status">
    <small id="sn-system-status">
        SYSTEM ONLINE · Module Engine Ready · GPU Enabled
    </small>
</section>

<!-- ========================= -->
<!-- INPUT MODULE -->
<!-- ========================= -->
<section class="input-module">

    <div class="input-box">
        <label>Reference Video</label>
        <input type="file" id="sn-reference-video" accept="video/*">
        <video id="sn-video-preview" controls style="max-width:100%; display:none;"></video>
    </div>

    <div class="input-box">
        <label>Character Image</label>
        <input type="file" id="sn-character-image" accept="image/*">
        <img id="sn-image-preview" style="max-width:100%; display:none;">
    </div>

</section>

<!-- ========================= -->
<!-- ACTION -->
<!-- ========================= -->
<section class="action-module">
    <button id="sn-create-btn" disabled>
        CREATE VIDEO (ENGINE READY)
    </button>
</section>

<!-- ========================= -->
<!-- FOOTER -->
<!-- ========================= -->
<footer>
    © SN Design Studio, 2026 · All rights reserved.
</footer>

<!-- ================================================= -->
<!-- ULTRA MODULE ENGINE (ADD ONLY / SAFE NAMESPACE) -->
<!-- ================================================= -->
<script>
(function(){

    // ===== NAMESPACE LOCK =====
    if(window.SN_ENGINE_LOADED) return;
    window.SN_ENGINE_LOADED = true;

    const SN = {};

    // ===== TEMPLATE DATA MAP =====
    SN.templates = {
        "dance-motion": {
            title: "DANCE MOTION",
            sub: "Ultra Modular AI Operating System"
        },
        "dark-viral": {
            title: "DARK VIRAL",
            sub: "Raw · Dark · Viral AI Engine"
        },
        "ai-lipsync": {
            title: "AI LIP SYNC",
            sub: "Voice · Face · Motion Sync"
        }
    };

    // ===== URL PARAM READ =====
    const params = new URLSearchParams(window.location.search);
    const templateKey = params.get("template");

    if(templateKey && SN.templates[templateKey]){
        document.getElementById("sn-template-title").textContent =
            SN.templates[templateKey].title;

        document.getElementById("sn-template-sub").textContent =
            SN.templates[templateKey].sub;
    }

    // ===== VIDEO PREVIEW =====
    const videoInput = document.getElementById("sn-reference-video");
    const videoPreview = document.getElementById("sn-video-preview");

    videoInput?.addEventListener("change", function(e){
        const file = e.target.files[0];
        if(file){
            videoPreview.src = URL.createObjectURL(file);
            videoPreview.style.display = "block";
            checkReady();
        }
    });

    // ===== IMAGE PREVIEW =====
    const imageInput = document.getElementById("sn-character-image");
    const imagePreview = document.getElementById("sn-image-preview");

    imageInput?.addEventListener("change", function(e){
        const file = e.target.files[0];
        if(file){
            imagePreview.src = URL.createObjectURL(file);
            imagePreview.style.display = "block";
            checkReady();
        }
    });

    // ===== READY CHECK =====
    function checkReady(){
        if(videoInput.files.length && imageInput.files.length){
            document.getElementById("sn-create-btn").disabled = false;
        }
    }

})();
</script>

</body>
</html>
