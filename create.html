<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: white; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .gen-btn { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-black text-center mb-12 text-blue-500 uppercase tracking-widest">SN ULTRA ENGINE</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            EOF

# บล็อกคำสั่งสำหรับสร้าง 14 กล่องแบบเร็วๆ
for i in {1..14}; do
cat << EOF >> /home/ubuntu/narong69za.github.io/create.html
            <div class="engine engine-box glass p-6 rounded-[2rem]" data-engine="$i">
                <p class="text-[10px] font-bold text-blue-500 uppercase mb-4">Engine $(printf "%02d" $i)</p>
                <textarea class="engine-prompt w-full bg-slate-900 rounded-xl p-3 text-xs mb-4 h-20" placeholder="Enter prompt..."></textarea>
                <div class="flex gap-2 mb-4">
                    <select class="engine-resolution bg-slate-800 rounded-lg p-2 text-[10px] flex-1">
                        <option value="720">720p</option><option value="1080">1080p</option>
                    </select>
                    <input type="file" class="engine-fileA text-[10px] flex-1">
                </div>
                <div class="engine-preview aspect-video bg-black rounded-xl mb-4 flex items-center justify-center text-[8px] italic">PREVIEW</div>
                <button class="gen-btn generate-btn w-full py-3 rounded-xl font-bold text-[10px] uppercase">RUN ENGINE $(printf "%02d" $i)</button>
            </div>
        </div>
    </div>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/create.js"></script>
</body>
</html>
