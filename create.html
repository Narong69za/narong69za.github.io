<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/assets/css/create-premium.css">
</head>
<body class="bg-slate-950 p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-black text-center mb-10 text-blue-500">ULTRA ENGINE CONTROL</h1>
        
        <div class="engine-wrap grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="engine engine-box glass-card p-6 rounded-3xl" data-engine="1">
                <h2 class="text-xs font-bold text-slate-500 mb-4 tracking-widest uppercase">⭐ AI ENGINE 01</h2>
                <textarea class="engine-prompt w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm mb-4" placeholder="พิมพ์คำสั่ง..."></textarea>
                <div class="flex gap-2 mb-4">
                    <select class="engine-resolution bg-slate-800 text-xs p-2 rounded-lg">
                        <option value="720">720p</option><option value="1080">1080p</option>
                    </select>
                    <input type="file" class="engine-fileA text-[10px]">
                </div>
                <div class="engine-preview w-full aspect-video bg-black rounded-xl mb-4 flex items-center justify-center text-[10px] italic">Preview</div>
                <button class="generate-btn w-full py-3 rounded-xl font-bold bg-blue-600">RUN ENGINE 01</button>
            </div>
            
            </div>
    </div>
    <script src="/assets/js/config.js"></script>
    <script type="module" src="/assets/js/create.js"></script>
</body>
</html>
