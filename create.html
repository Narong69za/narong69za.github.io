<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN DESIGN STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background: #020406; color: white; }</style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black italic text-[#00d2ff] uppercase">SN DESIGN STUDIO</h1>
        <div class="bg-slate-900 p-4 rounded-xl text-xl font-bold">1,000,099.00</div>
    </header>
    <div id="grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
    <script>
        const engines = [
            { id: 1, name: "สร้างวิดีโอระดับสูง", cost: 50 }, { id: 2, name: "สร้างรูปภาพ Ultra HD", cost: 15 },
            { id: 3, name: "อนิเมชั่นจากรูปภาพ", cost: 45 }, { id: 4, name: "โมเดลวีดีโอ Cinematic", cost: 40 }
        ];
        const grid = document.getElementById('grid');
        engines.forEach(e => {
            grid.innerHTML += `
                <div class="bg-slate-900 p-6 rounded-[2rem]">
                    <h3 class="font-bold mb-4">${e.name}</h3>
                    <textarea id="p-${e.id}" class="w-full bg-black rounded-xl p-3 text-xs h-20 mb-4 outline-none border border-white/5"></textarea>
                    <button onclick="send(${e.id})" class="w-full bg-white text-black py-3 rounded-xl font-bold uppercase">Generate</button>
                </div>`;
        });
        async function send(id) {
            const prompt = document.getElementById('p-'+id).value;
            alert("กำลังส่งคำสั่งไปที่ API Master (Render Engine: " + id + ")");
        }
    </script>
</body>
</html>
