<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SN ULTRA v42 REAL DATA ENGINE</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{background:#050505;color:#fff;font-family:Arial}
.card{background:#101010;border:1px solid #222;border-radius:22px;padding:22px}
.btn{width:100%;padding:12px;border-radius:14px;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:9999;padding:15px}
.box{background:#111;border:1px solid #333;border-radius:20px;padding:20px;max-width:650px;width:100%;max-height:90vh;overflow:auto}
</style>
</head>

<body class="p-4 md:p-8 pb-32">

<h1 class="text-center text-5xl font-black text-yellow-400 mb-8">
SN ULTRA v42
</h1>

<div class="grid md:grid-cols-4 gap-4 mb-8">
<div class="card text-center"><p>ONLINE</p><h2 id="online" class="text-3xl text-green-400">0</h2></div>
<div class="card text-center"><p>CPU</p><h2 id="cpu" class="text-3xl text-blue-400">0%</h2></div>
<div class="card text-center"><p>RAM</p><h2 id="ram" class="text-3xl text-pink-400">0%</h2></div>
<div class="card text-center"><p>BOT</p><h2 id="bot" class="text-3xl text-cyan-400">OFFLINE</h2></div>
</div>

<div class="grid md:grid-cols-2 gap-6 mb-8">

<div class="card">
<h2 class="text-2xl font-black text-green-400 mb-4">YULGANG DATA CENTER</h2>

<div class="grid grid-cols-2 gap-3 mb-3">
<button onclick="loadMall()" class="btn bg-green-500 text-black">ITEM MALL</button>
<button onclick="loadBoss()" class="btn bg-zinc-800">BOSS</button>
<button onclick="loadRank()" class="btn bg-zinc-800">RANKING</button>
<button onclick="loadDrop()" class="btn bg-zinc-800">DROP LIST</button>
</div>

<div class="grid grid-cols-2 gap-3">
<a href="/yulgang_launcher.exe" class="btn bg-white text-black text-center">DOWNLOAD EXE</a>
<a href="/yulgang_sn.apk" class="btn bg-green-500 text-black text-center">DOWNLOAD APK</a>
</div>
</div>

<div class="card">
<h2 class="text-2xl font-black text-red-400 mb-4">RAN DATA CENTER</h2>

<div class="grid grid-cols-2 gap-3 mb-3">
<button onclick="loadRanShop()" class="btn bg-red-500">CASH SHOP</button>
<button onclick="loadRanRank()" class="btn bg-zinc-800">RANKING</button>
<button onclick="loadRanBoss()" class="btn bg-zinc-800">BOSS</button>
<button onclick="loadRanMap()" class="btn bg-zinc-800">MAP</button>
</div>

<div class="grid grid-cols-2 gap-3">
<a href="/ran_launcher.exe" class="btn bg-white text-black text-center">DOWNLOAD EXE</a>
<a href="/ran_mobile.apk" class="btn bg-red-500 text-center">DOWNLOAD APK</a>
</div>
</div>

</div>

<div class="card mb-8">
<h2 class="text-xl font-black mb-4 text-yellow-400">ตัวละครออนไลน์ล่าสุด</h2>
<div id="chars" class="grid md:grid-cols-4 gap-3 text-sm">Loading...</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closePop()">
<div class="box" onclick="event.stopPropagation()">
<h2 id="title" class="text-2xl font-black text-yellow-400 mb-4">DATA</h2>
<div id="body" class="space-y-3 text-zinc-300"></div>
</div>
</div>

<script>
const API="https://api.sn-designstudio.dev";

function openPop(t,b){
document.getElementById("title").innerText=t;
document.getElementById("body").innerHTML=b;
document.getElementById("modal").style.display="flex";
}
function closePop(){document.getElementById("modal").style.display="none";}

async function j(url){
try{
let r=await fetch(API+url);
return await r.json();
}catch(e){return null;}
}

async function loadStats(){
let d=await j("/api/world/meta");
if(d&&d.state){
online.innerText=d.state.online||0;
cpu.innerText=(d.state.cpu||0)+"%";
ram.innerText=(d.state.ram||0)+"%";
}
let h=await j("/hamster/status");
bot.innerText=h?"ONLINE":"OFFLINE";
}

async function loadChars(){
let d=await j("/api/v1/characters");
if(!d||!d.data)return;
chars.innerHTML=d.data.map(x=>`
<div class='p-3 rounded-xl bg-black border border-zinc-800'>
${x.char_name}<br>Lv.${x.level}<br>${x.job_class}
</div>`).join("");
}

async function loadMall(){
let d=await j("/api/shop/mall");
if(!d)return openPop("ITEM MALL","ไม่พบข้อมูล");

let html=d.data.map(x=>`
<div class='p-3 bg-black rounded-xl border border-zinc-800'>
<b>${x.name}</b><br>
ราคา: ${x.sale_price||x.price_cash} บาท
</div>`).join("");

openPop("YULGANG ITEM MALL",html);
}

async function loadBoss(){
let d=await j("/api/game/boss");
if(!d)return;
let html=d.data.map(x=>`
<div class='p-3 bg-black rounded-xl'>
${x.name}<br>
Map: ${x.map}<br>
เวลา: ${x.spawn_time}
</div>`).join("");
openPop("WORLD BOSS",html);
}

async function loadRank(){
let d=await j("/api/ranking");
if(!d)return;
let html=d.data.map((x,i)=>`
<div class='p-2 border-b border-zinc-800'>
#${i+1} ${x.char_name} Lv.${x.level}
</div>`).join("");
openPop("TOP RANKING",html);
}

async function loadDrop(){
let d=await j("/api/drop/list");
if(!d)return;
let html=d.data.map(x=>`
<div class='p-2 border-b border-zinc-800'>
${x.monster} ➜ ${x.item} (${x.drop_rate}%)
</div>`).join("");
openPop("DROP LIST",html);
}

function loadRanShop(){
openPop("RAN CASH SHOP","ชุดแฟชั่น<br>สัตว์เลี้ยง<br>EXP BOOST");
}
function loadRanRank(){
openPop("RAN RANK","TOP PVP<br>TOP LEVEL");
}
function loadRanBoss(){
openPop("RAN BOSS","Dark Principal<br>Dean X");
}
function loadRanMap(){
openPop("RAN MAP","Phoenix Campus<br>Sacred Gate");
}

loadStats();
loadChars();
setInterval(loadStats,5000);
</script>

</body>
</html>
