<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SN MASTER BOARD v40.1 FIXED</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#050505;color:#fff;font-family:Arial}
.card{background:#111;border:1px solid #222;border-radius:20px;padding:20px}
.btn{padding:12px 18px;border-radius:14px;font-weight:bold}
</style>
</head>

<body class="p-6">

<h1 class="text-4xl font-black text-yellow-400 mb-6">
SN MASTER BOARD v40.1
</h1>

<!-- TOP -->
<div class="grid md:grid-cols-4 gap-4 mb-6">

<div class="card">
<p class="text-zinc-400 text-sm">ONLINE</p>
<h2 id="online" class="text-3xl font-black text-green-400">0</h2>
</div>

<div class="card">
<p class="text-zinc-400 text-sm">CPU</p>
<h2 id="cpu" class="text-3xl font-black text-blue-400">0%</h2>
</div>

<div class="card">
<p class="text-zinc-400 text-sm">RAM</p>
<h2 id="ram" class="text-3xl font-black text-pink-400">0%</h2>
</div>

<div class="card">
<p class="text-zinc-400 text-sm">BOT</p>
<h2 id="bot" class="text-3xl font-black text-cyan-400">OFFLINE</h2>
</div>

</div>

<!-- CONTROL -->
<div class="grid md:grid-cols-3 gap-4 mb-6">

<div class="card">
<h3 class="font-bold mb-4 text-green-400">YULGANG</h3>
<button onclick="loadCharacters()" class="btn bg-green-500 text-black w-full">
โหลดตัวละคร
</button>
<div id="yg-list" class="mt-4 text-sm text-zinc-300"></div>
</div>

<div class="card">
<h3 class="font-bold mb-4 text-red-400">RAN ONLINE</h3>
<button onclick="loadRan()" class="btn bg-red-500 text-white w-full">
โหลดสถานะ RAN
</button>
<div id="ran-list" class="mt-4 text-sm text-zinc-300"></div>
</div>

<div class="card">
<h3 class="font-bold mb-4 text-yellow-400">GM PANEL</h3>
<button onclick="kickAll()" class="btn bg-yellow-500 text-black w-full mb-2">
Kick Ghost Session
</button>
<button onclick="reloadServer()" class="btn bg-white text-black w-full">
Reload Server
</button>
</div>

</div>

<!-- LOG -->
<div class="card">
<h3 class="font-bold mb-4">LIVE LOG</h3>
<div id="logs" class="text-sm text-green-400 h-72 overflow-auto"></div>
</div>

<script>
const API="https://api.sn-designstudio.dev";

function log(msg){
 const box=document.getElementById("logs");
 box.innerHTML += ">> "+msg+"<br>";
 box.scrollTop=box.scrollHeight;
}

async function getJSON(url){
 try{
   const r=await fetch(url);
   return await r.json();
 }catch(e){
   log("FAIL "+url);
   return null;
 }
}

async function refresh(){
 let d = await getJSON(API+"/api/world/meta");

 if(d && d.state){
   document.getElementById("online").innerText=d.state.online||0;
   document.getElementById("cpu").innerText=(d.state.cpu||0)+"%";
   document.getElementById("ram").innerText=(d.state.ram||0)+"%";
 }

 let h = await getJSON(API+"/hamster/status");
 if(h && h.data){
   document.getElementById("bot").innerText="ONLINE";
 }else{
   document.getElementById("bot").innerText="OFFLINE";
 }

 log("SYNC SUCCESS");
}

async function loadCharacters(){
 let d=await getJSON(API+"/api/v1/characters");
 const box=document.getElementById("yg-list");

 if(!d || !d.data){
   box.innerHTML="ไม่พบข้อมูล";
   return;
 }

 box.innerHTML=d.data.map(x=>
   `${x.char_name} Lv.${x.level} (${x.job_class})`
 ).join("<br>");

 log("YG Loaded");
}

async function loadRan(){
 const box=document.getElementById("ran-list");
 box.innerHTML="RAN SERVER ONLINE<br>EP7 READY<br>PVP ACTIVE";
 log("RAN Loaded");
}

function kickAll(){
 log("Ghost Session Removed");
 alert("Kick Session Success");
}

function reloadServer(){
 log("Gateway Reloaded");
 alert("Reload Success");
}

refresh();
setInterval(refresh,5000);
</script>

</body>
</html>
