<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>SN ULTRA | v36 IMMORTAL CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');
        :root { --gold: #f59e0b; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        .sn { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; }
        .neon-gold { color: var(--gold); text-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .progress-bar { height: 6px; border-radius: 10px; background: #1a1a1a; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); transition: width 1s ease-in-out; }
        @keyframes bounce-in { 0% { transform: translateX(100%); } 100% { transform: translateX(0); } }
        .animate-bounce-in { animation: bounce-in 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    </style>
</head>
<body class="p-4 pb-12">

    <header class="text-center mb-6 pt-4" onclick="SN_CORE.ui.triggerAdmin()">
        <h1 class="sn text-4xl font-black italic tracking-tighter">SN ULTRA</h1>
        <p id="online-count" class="text-[10px] font-bold text-green-500 uppercase mt-2 tracking-widest">Players Online: 184</p>
    </header>

    <div class="glass p-4 mb-5 border-yellow-500/20 bg-gradient-to-r from-yellow-500/5 to-transparent">
        <div class="flex items-center gap-3">
            <i class="fas fa-calendar-star text-yellow-500"></i>
            <marquee class="text-xs font-bold uppercase tracking-widest">
                EXP x3 วันนี้ !! | BOSS SPAWN 20:00 น. ณ หุบเขาไร้รัก | กิจกรรมเติมเงินรับพอยท์ x2 เริ่มแล้ว
            </marquee>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-5">
        <div class="glass p-5 text-center">
            <p class="text-[9px] text-zinc-500 uppercase font-bold mb-1">CPU LOAD</p>
            <h3 id="cpu-val" class="text-2xl font-black neon-gold">12%</h3>
        </div>
        <div class="glass p-5 text-center">
            <p class="text-[9px] text-zinc-500 uppercase font-bold mb-1">RAM USAGE</p>
            <h3 id="ram-val" class="text-2xl font-black neon-gold">45%</h3>
        </div>
    </div>

    <div class="glass p-6 mb-5">
        <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-widest">AI Engine Usage Meter</h3>
        <div class="space-y-4">
            <div>
                <div class="flex justify-between text-[10px] mb-1"><span>Gemini Pro 1.5</span><span>65%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width: 65%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] mb-1"><span>Runway Gen-3</span><span>22%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width: 22%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] mb-1"><span>ElevenLabs AI</span><span class="text-red-500">90%</span></div>
                <div class="progress-bar"><div class="progress-fill bg-red-600" style="width: 90%"></div></div>
            </div>
        </div>
    </div>

    <div class="glass p-8 mb-5 border-white/5">
        <div class="text-center mb-6">
            <h3 class="sn text-xl font-bold italic neon-gold uppercase">Membership Center</h3>
        </div>
        <div class="space-y-3">
            <input id="user" class="w-full bg-zinc-900/50 border border-zinc-800 p-4 rounded-2xl text-sm" placeholder="Username">
            <input id="pass" type="password" class="w-full bg-zinc-900/50 border border-zinc-800 p-4 rounded-2xl text-sm" placeholder="Password">
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="SN_CORE.auth.login()" class="p-4 bg-white text-black font-black rounded-2xl text-xs uppercase">LOGIN</button>
                <button onclick="SN_CORE.auth.register()" class="p-4 border border-white/10 font-black rounded-2xl text-xs uppercase">REGISTER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden glass p-6 mb-5 border-red-500/30 bg-red-500/5">
        <h3 class="text-xs font-black text-red-500 mb-4 uppercase italic"><i class="fas fa-user-crown mr-2"></i>Admin Dashboard</h3>
        <div class="grid grid-cols-2 gap-2">
            <button class="bg-zinc-900 p-3 rounded-xl text-[10px] font-bold">RESTART SERVER</button>
            <button class="bg-zinc-900 p-3 rounded-xl text-[10px] font-bold">BAN USER</button>
            <button class="bg-zinc-900 p-3 rounded-xl text-[10px] font-bold">SEND ITEM</button>
            <button class="bg-zinc-900 p-3 rounded-xl text-[10px] font-bold">ADJUST EXP</button>
        </div>
    </div>

    <div class="space-y-3">
        <button class="w-full p-6 bg-gradient-to-r from-zinc-800 to-black rounded-[35px] flex justify-between items-center shadow-2xl active:scale-95 transition-all">
            <div class="text-left"><p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Client Edition</p><p class="text-xl font-black italic sn">DOWNLOAD .EXE</p></div>
            <i class="fas fa-desktop text-2xl opacity-10"></i>
        </button>
    </div>

    <script src="main.js"></script>
</body>
</html>
