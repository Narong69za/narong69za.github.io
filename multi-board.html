<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN ULTRA | ALL-IN-ONE MASTER CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=noto+sans+thai:wght@400;700&display=swap');
        body { background: #070708; color: #f4f4f5; font-family: 'Noto Sans Thai', sans-serif; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border-purple { border: 1px solid rgba(168, 85, 247, 0.4); box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); }
        .sidebar-active { background: linear-gradient(90deg, rgba(168, 85, 247, 0.2) 0%, transparent 100%); border-left: 4px solid #a855f7; color: #a855f7; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 glass flex flex-col border-r border-zinc-800">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter text-purple-500 italic">SN ULTRA <span class="text-xs text-white not-italic font-normal opacity-50">v33.4</span></h1>
            <p class="text-[10px] text-zinc-500 font-mono mt-1 uppercase tracking-widest">Master Control Unit</p>
        </div>

        <nav class="flex-1 px-4 space-y-1">
            <button onclick="showSection('dash')" id="btn-dash" class="w-full flex items-center p-3 rounded-xl transition-all sidebar-active group">
                <i class="fas fa-th-large mr-3 w-5"></i> <span class="text-sm font-bold">DASHBOARD</span>
            </button>
            <button onclick="showSection('members')" id="btn-members" class="w-full flex items-center p-3 rounded-xl transition-all hover:bg-zinc-800 text-zinc-400 group">
                <i class="fas fa-users mr-3 w-5"></i> <span class="text-sm font-bold">YULGANG MEMBERS</span>
            </button>
            <button onclick="showSection('shop')" id="btn-shop" class="w-full flex items-center p-3 rounded-xl transition-all hover:bg-zinc-800 text-zinc-400 group">
                <i class="fas fa-shopping-cart mr-3 w-5"></i> <span class="text-sm font-bold">WEB SHOP</span>
            </button>
            <button onclick="showSection('down')" id="btn-down" class="w-full flex items-center p-3 rounded-xl transition-all hover:bg-zinc-800 text-zinc-400 group">
                <i class="fas fa-cloud-download-alt mr-3 w-5"></i> <span class="text-sm font-bold">DOWNLOADS</span>
            </button>
        </nav>

        <div class="p-6 border-t border-zinc-800">
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <p class="text-[10px] text-zinc-500 mb-2 uppercase">Logged as:</p>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-purple-500 flex items-center justify-center font-bold mr-3">A</div>
                    <div>
                        <p class="text-xs font-bold" id="admin-name">ADMIN_SN</p>
                        <p class="text-[10px] text-green-500">SESSION ACTIVE</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full mt-4 p-2 bg-zinc-800 text-red-400 text-[10px] font-bold rounded-lg hover:bg-red-500 hover:text-white transition-all">LOGOUT SYSTEM</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <header class="h-20 flex items-center justify-between px-8 glass border-b border-zinc-800 z-10">
            <div class="flex items-center">
                <span class="text-xs font-mono text-zinc-500 mr-4" id="real-time-clock">--:--:--</span>
                <div class="h-4 w-px bg-zinc-800 mx-4"></div>
                <div class="flex items-center text-[10px] font-bold text-blue-400">
                    <span class="relative flex h-2 w-2 mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    CORE GATEWAY ONLINE (5002)
                </div>
            </div>
            <div id="api-status-ping" class="text-[10px] font-mono text-zinc-600">PING: --ms</div>
        </header>

        <div id="content-scroll" class="flex-1 overflow-y-auto p-8">
            
            <section id="view-dash" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="glass p-5 rounded-2xl neon-border-purple">
                        <p class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Live Players</p>
                        <h2 class="text-3xl font-black text-white" id="stat-online">0</h2>
                    </div>
                    <div class="glass p-5 rounded-2xl">
                        <p class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Daily Income</p>
                        <h2 class="text-3xl font-black text-green-500" id="stat-income">ÓĖ┐0.00</h2>
                    </div>
                    <div class="glass p-5 rounded-2xl">
                        <p class="text-[10px] text-zinc-500 uppercase font-bold mb-1">CPU Load</p>
                        <h2 class="text-3xl font-black text-purple-400" id="stat-cpu">0%</h2>
                    </div>
                    <div class="glass p-5 rounded-2xl">
                        <p class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Memory</p>
                        <h2 class="text-3xl font-black text-blue-400" id="stat-ram">0%</h2>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl h-[450px]">
                    <h3 class="text-sm font-bold mb-6 text-zinc-400"><i class="fas fa-microchip mr-2"></i> CORE ANALYTICS (24H)</h3>
                    <canvas id="sysChart"></canvas>
                </div>
            </section>

            <section id="view-members" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Yulgang Members In-Data</h2>
                    <input type="text" placeholder="Search Player..." class="bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-xs w-64 focus:outline-none focus:border-purple-500">
                </div>
                <div class="glass rounded-2xl overflow-hidden border border-zinc-800">
                    <table class="w-full text-left">
                        <thead class="bg-zinc-900/80 text-[10px] text-zinc-500 uppercase font-black">
                            <tr>
                                <th class="p-4">Character</th>
                                <th class="p-4">Job / Class</th>
                                <th class="p-4">Level</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="member-table-body" class="text-xs font-mono">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="view-shop" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="shop-container">
                    </div>
            </section>

            <section id="view-down" class="hidden space-y-4">
                <div id="download-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </section>

        </div>
    </main>

    <script>
        /**
         * ==========================================
         * ­¤ø’ĖÅ SN ULTRA PRODUCTION CORE ENGINE
         * ==========================================
         */
        
        const sid = localStorage.getItem("sn_sid");
        let sysChart;

        // ­¤ö SECURITY SYNC: ÓĖøÓ╣ēÓĖŁÓĖćÓĖüÓĖ▒ÓĖÖ Redirect Loop ÓĖ¢Ó╣ēÓĖ▓Ó╣üÓĖüÓ╣ē Backend Ó╣üÓĖźÓ╣ēÓĖ¦
        if (!sid) {
            console.warn("DEBUG: No SID found. Bypass redirect for local testing.");
            // window.location.href = "index.html"; 
        }

        // ­¤¤ VIEW CONTROLLER
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('sidebar-active', 'hover:bg-zinc-800', 'text-zinc-400'));
            
            document.getElementById(`view-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('sidebar-active');

            if(id === 'members') loadMemberData();
            if(id === 'shop') loadShopData();
            if(id === 'down') loadDownloadData();
        }

        // ŌÜö’ĖÅ REAL-TIME DATA: YULGANG DATABASE MAPPING
        async function loadMemberData() {
            const tbody = document.getElementById('member-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center opacity-50">Fetching Database...</td></tr>';
            
            try {
                const res = await fetch('/api/yulgang/members', { headers: { 'x-session-id': sid } });
                const data = await res.json();
                if(data.ok) {
                    tbody.innerHTML = data.members.map(m => `
                        <tr class="border-t border-zinc-800/50 hover:bg-white/5 transition-all">
                            <td class="p-4 font-bold text-purple-400">${m.name}</td>
                            <td class="p-4 text-zinc-400">${m.class}</td>
                            <td class="p-4">${m.level}</td>
                            <td class="p-4"><span class="px-2 py-1 rounded text-[9px] ${m.status === 'Online' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${m.status}</span></td>
                            <td class="p-4 text-right"><button class="text-zinc-500 hover:text-white"><i class="fas fa-cog"></i></button></td>
                        </tr>
                    `).join('');
                }
            } catch (e) { tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-500">Database Connection Failed</td></tr>'; }
        }

        // ­¤ø WEB SHOP SYSTEM (REAL INVENTORY)
        async function loadShopData() {
            const container = document.getElementById('shop-container');
            try {
                const res = await fetch('/api/shop/items', { headers: { 'x-session-id': sid } });
                const data = await res.json();
                if(data.ok) {
                    container.innerHTML = data.items.map(item => `
                        <div class="glass p-5 rounded-3xl text-center hover:neon-border-purple transition-all group">
                            <div class="w-16 h-16 bg-zinc-800 rounded-2xl mx-auto mb-4 flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">­¤ō</div>
                            <h4 class="text-xs font-bold mb-1">${item.name}</h4>
                            <p class="text-purple-400 text-sm font-black mb-4">${item.price} Credits</p>
                            <button class="w-full bg-purple-600/20 text-purple-400 border border-purple-500/30 p-2 rounded-xl text-[10px] font-bold hover:bg-purple-600 hover:text-white transition-all">BUY ITEM</button>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        // ­¤ō DOWNLOAD SYSTEM (VERSION CONTROL)
        async function loadDownloadData() {
            const container = document.getElementById('download-grid');
            try {
                const res = await fetch('/api/downloads', { headers: { 'x-session-id': sid } });
                const data = await res.json();
                if(data.ok) {
                    container.innerHTML = data.files.map(f => `
                        <div class="glass p-6 rounded-2xl flex justify-between items-center border border-zinc-800">
                            <div class="flex items-center">
                                <i class="fas fa-file-archive text-3xl text-blue-500 mr-4"></i>
                                <div>
                                    <h4 class="text-sm font-bold">${f.name}</h4>
                                    <p class="text-[10px] text-zinc-500">${f.size} | Version: ${f.version}</p>
                                </div>
                            </div>
                            <a href="${f.url}" class="bg-blue-600 p-3 rounded-xl text-[10px] font-black hover:bg-blue-500 transition-all">DOWNLOAD</a>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        // ­¤ō SYSTEM ANALYTICS (CHART ENGINE)
        function initChart() {
            const ctx = document.getElementById('sysChart').getContext('2d');
            sysChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [
                        { label: 'CPU', data: Array(20).fill(0), borderColor: '#a855f7', borderWidth: 2, fill: true, backgroundColor: 'rgba(168, 85, 247, 0.05)', tension: 0.4 },
                        { label: 'RAM', data: Array(20).fill(0), borderColor: '#3b82f6', borderWidth: 2, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.4 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { y: { display: false, min: 0, max: 100 }, x: { display: false } },
                    plugins: { legend: { display: false } },
                    elements: { point: { radius: 0 } }
                }
            });
        }

        // ­¤ō REAL-TIME SYNC LOOP (Every 2s)
        setInterval(async () => {
            try {
                const start = Date.now();
                const res = await fetch('/api/admin/realtime-status', { headers: { 'x-session-id': sid } });
                const data = await res.json();
                document.getElementById('api-status-ping').innerText = `PING: ${Date.now() - start}ms`;
                
                if(data.ok) {
                    document.getElementById('stat-cpu').innerText = `${data.cpu}%`;
                    document.getElementById('stat-ram').innerText = `${data.ram}%`;
                    document.getElementById('stat-online').innerText = data.online || 0;
                    
                    sysChart.data.datasets[0].data.shift();
                    sysChart.data.datasets[0].data.push(data.cpu);
                    sysChart.data.datasets[1].data.shift();
                    sysChart.data.datasets[1].data.push(data.ram);
                    sysChart.update('none');
                }
            } catch (e) {}
            document.getElementById('real-time-clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 2000);

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        document.addEventListener('DOMContentLoaded', () => { initChart(); });
    </script>
</body>
</html>
