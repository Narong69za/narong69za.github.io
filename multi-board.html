<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SN ULTRA - COMMERCIAL FINAL LAUNCH</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body class="pb-12">
    <div id="toast-container"></div>

    <div id="user-modal" style="display:none;" class="fixed inset-0 bg-black/85 backdrop-blur-sm z-[9999] justify-center items-center p-4">
        <div class="bg-[#0f0f0f] border border-white/10 rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <div class="flex justify-between mb-4"><h3 class="text-blue-400 font-black">MANAGE DB</h3><button onclick="closeUserModal()"><i class="fas fa-times"></i></button></div>
            <div class="mb-4"><input id="mng-user" placeholder="User ID" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mb-2 outline-none text-white"><input type="number" id="mng-credit" placeholder="Credits" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mb-2 outline-none text-white"><button onclick="saveUser()" id="btn-save-user" class="w-full bg-green-600/20 text-green-400 py-3 rounded-lg font-bold">SAVE</button></div>
            <div><input id="mng-ban-user" placeholder="User to Ban" class="w-full bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-2 outline-none text-white"><button onclick="deleteUser()" id="btn-delete-user" class="w-full bg-red-600/20 text-red-400 py-3 rounded-lg font-bold">BAN</button></div>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-black/95 z-[9999] flex justify-center items-center">
        <div class="bg-black/50 border border-white/10 p-8 rounded-3xl text-center w-full max-w-sm">
            <h2 class="text-2xl font-black text-white mb-6">SN ULTRA</h2>
            <input id="admin-user" placeholder="Username" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-3 text-white outline-none">
            <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-4 text-white outline-none">
            <button id="btn-login" onclick="loginAdmin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">LOGIN</button>
            <p id="login-error" class="text-red-500 text-xs mt-4 font-bold hidden"></p>
        </div>
    </div>

    <header class="max-w-[1800px] mx-auto px-4 sm:px-6 pt-8 pb-6 flex justify-between items-end">
        <div><h1 class="text-4xl font-black italic">SN ULTRA</h1></div>
        <div class="flex gap-2">
            <span id="role-badge" class="px-3 py-1 bg-purple-500/20 text-purple-400 rounded text-[9px] font-bold hidden"></span>
            <div id="socket-status" class="px-4 py-2 bg-amber-500/10 text-amber-500 rounded-xl text-[10px] font-black"><i class="fas fa-spinner fa-spin"></i> CONNECTING...</div>
            <button onclick="logoutAdmin()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-xl"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 max-w-[1800px] mx-auto px-4 pb-12">
        
        <div class="session-box xl:col-span-4 p-5"><div class="text-orange-400 font-black mb-4">GAME SERVERS</div>
            <div class="grid grid-cols-3 gap-6">
                <div class="text-center bg-black/50 p-4 rounded-xl border border-white/5"><div id="gs-win-status" class="text-gray-400 text-xs mb-2">WIN: OFFLINE</div><button onclick="controlServer('win','start')" class="text-green-400 mr-2">START</button><button onclick="controlServer('win','stop')" class="text-red-400">STOP</button></div>
                <div class="text-center bg-black/50 p-4 rounded-xl border border-white/5"><div id="gs-and-status" class="text-gray-400 text-xs mb-2">AND: OFFLINE</div><button onclick="controlServer('android','start')" class="text-green-400 mr-2">START</button><button onclick="controlServer('android','stop')" class="text-red-400">STOP</button></div>
                <div class="text-center bg-black/50 p-4 rounded-xl border border-white/5"><div id="gs-yg-status" class="text-gray-400 text-xs mb-2">YG: OFFLINE</div><button onclick="controlServer('yulgang','start')" class="text-green-400 mr-2">START</button>
        <div class="session-box p-5 flex flex-col">
            <div class="flex justify-between items-start gap-2 mb-4">
                <div class="text-cyan-400 font-black truncate">HAMSTER TERMINAL</div>
                <div id="hmState" class="text-[9px] text-gray-400 whitespace-nowrap flex-shrink-0">OFFLINE</div>
            </div>
            <div id="hmTerminal" class="termux-box flex-1 bg-black p-2 text-cyan-400 text-[10px] mono overflow-hidden h-[120px] mb-3"></div>
            <div class="flex gap-2 mt-auto">
                <button onclick="controlHamster('start')" class="flex-1 bg-green-500/20 text-green-400 py-2 rounded text-xs font-bold">START</button>
                <button onclick="controlHamster('stop')" class="flex-1 bg-red-500/20 text-red-400 py-2 rounded text-xs font-bold">STOP</button>
            </div>
        </div>

        <div class="session-box xl:col-span-2 p-5 flex flex-col sm:flex-row gap-4"><div class="text-cyan-400 font-black mb-4 absolute top-4">TERMUX KEY</div>
            <div class="flex-1 video-container mt-8"><div id="yt-player-div"></div></div>
            <div class="flex-1 flex flex-col justify-end gap-2">
                <input type="text" id="termux-key" readonly value="WATCH VIDEO TO UNLOCK" class="w-full bg-black/80 p-3 rounded text-xs text-center text-gray-500 border border-white/10 outline-none">
                <button id="btn-unlock" onclick="playUnlockVideo()" class="bg-red-600 text-white font-bold py-2 rounded text-xs">PLAY TO UNLOCK</button>
                <div class="grid grid-cols-2 gap-2 mt-2"><button onclick="window.location.href='payment.html?package=99&bank=scb'" class="bg-white/10 py-2 rounded text-xs">99/M</button><button onclick="window.location.href='payment.html?package=299&bank=scb'" class="bg-blue-600 py-2 rounded text-xs">299/M</button></div>
            </div>
        </div>

        <div class="session-box xl:col-span-4 p-6 flex flex-col h-[300px]">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-3">
                <div class="text-gray-400 font-black tracking-widest text-xs"><i class="fas fa-shield-alt mr-2"></i>SECURITY AUDIT</div>
                <div class="text-[9px] text-green-400 font-bold flex items-center bg-green-900/20 px-2 py-1 rounded border border-green-500/20"><span class="pulse-dot mr-2"></span>LIVE MONITOR</div>
            </div>
            <div id="audit-list" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                </div>
        </div>

        <div class="session-box xl:col-span-4 p-6">
            <div class="flex justify-between items-center mb-5 border-b border-purple-500/20 pb-3">
                <div class="text-purple-400 font-black tracking-widest text-xs"><i class="fas fa-server mr-2"></i>RESOURCE ANALYTICS</div>
                <div class="text-[9px] text-purple-400 font-bold border border-purple-500/30 px-3 py-1 rounded bg-purple-500/10 tracking-widest">CORE ENGINE</div>
            </div>
            
            <div class="grid grid-cols-3 gap-3 sm:gap-6 mb-5">
                <div class="bg-black/60 border border-white/5 rounded-xl p-3 sm:p-4 text-center shadow-inner">
                    <div class="text-[9px] sm:text-[10px] text-gray-500 uppercase tracking-widest mb-1 sm:mb-2"><i class="fas fa-microchip mr-1"></i>CPU LOAD</div>
                    <div class="text-xl sm:text-2xl font-black text-white mono" id="sys-cpu">0%</div>
                </div>
                <div class="bg-black/60 border border-white/5 rounded-xl p-3 sm:p-4 text-center shadow-inner">
                    <div class="text-[9px] sm:text-[10px] text-gray-500 uppercase tracking-widest mb-1 sm:mb-2"><i class="fas fa-memory mr-1"></i>MEMORY</div>
                    <div class="text-xl sm:text-2xl font-black text-white mono" id="sys-ram">0%</div>
                </div>
                <div class="bg-black/60 border border-white/5 rounded-xl p-3 sm:p-4 text-center shadow-inner">
                    <div class="text-[9px] sm:text-[10px] text-gray-500 uppercase tracking-widest mb-1 sm:mb-2"><i class="fas fa-hdd mr-1"></i>STORAGE</div>
                    <div class="text-xl sm:text-2xl font-black text-white mono" id="sys-disk">0%</div>
                </div>
            </div>

            <div class="h-[180px] w-full mb-6 chart-container">
                <canvas id="sysChart"></canvas>
            </div>

            <div class="bg-[#050505] border border-blue-500/20 rounded-xl p-4 sm:p-5 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-blue-500/50"></div>
                <div class="flex justify-between items-center mb-3 pl-2">
                    <div class="text-[10px] text-blue-400 font-black tracking-widest"><i class="fas fa-network-wired mr-2"></i>NETWORK TRAFFIC</div>
                    <div class="text-[9px] text-blue-500/50 uppercase"><i class="fas fa-sync fa-spin mr-1"></i> Syncing</div>
                </div>
                <div class="grid grid-cols-2 gap-4 pl-2">
                    <div class="bg-white/5 rounded-lg p-3 text-center border border-white/5">
                        <div class="text-[9px] text-gray-400 mb-1 tracking-widest"><i class="fas fa-arrow-down text-green-400 mr-1"></i> INBOUND</div>
                        <div class="text-sm sm:text-base font-black text-white mono" id="net-in">0.00 Mbps</div>
                    </div>
                    <div class="bg-white/5 rounded-lg p-3 text-center border border-white/5">
                        <div class="text-[9px] text-gray-400 mb-1 tracking-widest"><i class="fas fa-arrow-up text-blue-400 mr-1"></i> OUTBOUND</div>
                        <div class="text-sm sm:text-base font-black text-white mono" id="net-out">0.00 Mbps</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="assets/js/admin-auth.js"></script>
    <script src="assets/js/socket.js"></script>
    <script src="assets/js/modules/youtube.js"></script>
    <script src="assets/js/modules/faucet.js"></script>
    <script src="assets/js/modules/hamster.js"></script>
    <script src="assets/js/dashboard.js"></script> 
</body>
</html>
