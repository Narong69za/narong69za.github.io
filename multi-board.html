<!-- FULL CONTROL CENTER : PART 1 / 2 -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SN FULL CONTROL CENTER</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b1020;
color:#fff;
}
.card{
background:#111827;
border:1px solid #1f2937;
border-radius:16px;
padding:16px;
}
.btn{
padding:12px 16px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
border:none;
}
.blue{background:#2563eb;color:#fff}
.green{background:#059669;color:#fff}
.red{background:#dc2626;color:#fff}
.gray{background:#374151;color:#fff}
.input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #374151;
background:#0f172a;
color:#fff;
}
.gridx{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:16px;
}
.small{font-size:12px;color:#9ca3af}
.big{font-size:32px;font-weight:900}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-4">

<div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-6">
<div>
<div class="small">SN MULTI TENANT SYSTEM</div>
<div style="font-size:36px;font-weight:900;">FULL CONTROL CENTER</div>
</div>

<div class="flex gap-2">
<button class="btn gray" onclick="refreshAll()">REFRESH</button>
<button class="btn red" onclick="logout()">LOGOUT</button>
</div>
</div>

<div class="gridx mb-6">

<div class="card">
<div class="small">CPU</div>
<div id="cpu" class="big">0%</div>
</div>

<div class="card">
<div class="small">RAM</div>
<div id="ram" class="big">0%</div>
</div>

<div class="card">
<div class="small">USERS</div>
<div id="users" class="big">0</div>
</div>

<div class="card">
<div class="small">QUEUE</div>
<div id="queue" class="big">0</div>
</div>

</div>

<div class="gridx mb-6">

<div class="card">
<div class="small mb-2">REALTIME SYSTEM</div>
<canvas id="chart" height="120"></canvas>
</div>

<div class="card">
<div class="small mb-2">PROFILE</div>
<div class="mb-2">User : <b id="userBox">-</b></div>
<div class="mb-2">Role : <b id="roleBox">-</b></div>
<div class="mb-2">Tenant : <b id="tenantBox">-</b></div>
<div class="mb-2">Status : <b style="color:#22c55e;">ONLINE</b></div>
</div>

</div>

<div class="gridx mb-6">

<div class="card">
<div class="small mb-3">GAME SERVER</div>
<div class="flex gap-2">
<button class="btn green" onclick="serverCmd('game','start')">START</button>
<button class="btn red" onclick="serverCmd('game','stop')">STOP</button>
<button class="btn blue" onclick="serverCmd('game','restart')">RESTART</button>
</div>
</div>

<div class="card">
<div class="small mb-3">PAYMENT GATEWAY</div>
<div class="flex gap-2">
<button class="btn green" onclick="serverCmd('payment','start')">START</button>
<button class="btn red" onclick="serverCmd('payment','stop')">STOP</button>
<button class="btn blue" onclick="serverCmd('payment','restart')">RESTART</button>
</div>
</div>

<div class="card">
<div class="small mb-3">AI ENGINE (14 MODEL)</div>
<div class="flex gap-2">
<button class="btn green" onclick="serverCmd('ai','start')">START</button>
<button class="btn red" onclick="serverCmd('ai','stop')">STOP</button>
<button class="btn blue" onclick="serverCmd('ai','restart')">RESTART</button>
</div>
</div>

<div class="card">
<div class="small mb-3">SOCKET CORE</div>
<div class="flex gap-2">
<button class="btn green" onclick="serverCmd('socket','start')">START</button>
<button class="btn red" onclick="serverCmd('socket','stop')">STOP</button>
<button class="btn blue" onclick="serverCmd('socket','restart')">RESTART</button>
</div>
</div>

</div>

<div class="gridx mb-6">

<div class="card">
<div class="small mb-3">GENERATE LICENSE</div>
<input id="license" class="input mb-3" readonly placeholder="LICENSE KEY">
<button class="btn blue" onclick="genLicense()">GENERATE</button>
</div>

<div class="card">
<div class="small mb-3">SEND GLOBAL MESSAGE</div>
<input id="broadcastText" class="input mb-3" placeholder="ข้อความประกาศ">
<button class="btn blue" onclick="broadcastMsg()">SEND</button>
</div>

</div>
<!-- FULL CONTROL CENTER : PART 2 / 2 -->

<div class="card mb-6">
<div class="small mb-3">AUDIT LOG</div>
<div style="max-height:300px;overflow:auto;">
<table style="width:100%;font-size:12px;">
<thead>
<tr>
<th align="left">TIME</th>
<th align="left">USER</th>
<th align="left">ACTION</th>
</tr>
</thead>
<tbody id="logs"></tbody>
</table>
</div>
</div>

</div>

<script>
const API_BASE = "https://api.sn-designstudio.dev";
let socket=null;
let chart=null;

function qs(id){
return document.getElementById(id);
}

function token(){
return localStorage.getItem("sn_jwt");
}

function logout(){
localStorage.clear();
location.reload();
}

async function api(url,opt={}){

opt.headers=opt.headers||{};
opt.headers["Content-Type"]="application/json";

if(token()){
opt.headers["Authorization"]="Bearer "+token();
}

return await fetch(API_BASE+url,opt);
}

function parseJwt(t){
try{
return JSON.parse(atob(t.split('.')[1]));
}catch(e){
return {};
}
}

function initProfile(){

const t = token();

if(!t){
alert("NO TOKEN");
location.href="/";
return;
}

const data = parseJwt(t);

qs("userBox").innerText = data.user || "-";
qs("roleBox").innerText = data.role || "-";
qs("tenantBox").innerText = data.tenant || "-";
}

function initChart(){

const ctx = qs("chart").getContext("2d");

chart = new Chart(ctx,{
type:"line",
data:{
labels:new Array(20).fill(""),
datasets:[
{
label:"CPU",
data:new Array(20).fill(0),
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,.15)",
fill:true,
tension:.4
},
{
label:"RAM",
data:new Array(20).fill(0),
borderColor:"#10b981",
backgroundColor:"rgba(16,185,129,.15)",
fill:true,
tension:.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:false,
scales:{y:{min:0,max:100}}
}
});
}

function updateChart(cpu,ram){

chart.data.datasets[0].data.shift();
chart.data.datasets[0].data.push(cpu);

chart.data.datasets[1].data.shift();
chart.data.datasets[1].data.push(ram);

chart.update();
}

function addLog(user,action){

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${new Date().toLocaleString()}</td>
<td>${user}</td>
<td>${action}</td>
`;

qs("logs").prepend(tr);
}

function initSocket(){

socket = io(API_BASE,{
auth:{token:token()}
});

socket.on("connect",()=>{
addLog("SYSTEM","SOCKET CONNECTED");
});

socket.on("system_update",(d)=>{

const cpu = Number(d.system?.cpu || 0);
const ram = Number(d.system?.ram || 0);
const users = Number(d.users?.total || 0);
const queue = Number(d.queue?.pending || 0);

qs("cpu").innerText = cpu + "%";
qs("ram").innerText = ram + "%";
qs("users").innerText = users;
qs("queue").innerText = queue;

updateChart(cpu,ram);
});

socket.on("audit_update",(rows)=>{

if(!Array.isArray(rows)) return;

rows.forEach(r=>{
addLog(r.user || "SYSTEM",r.status || "EVENT");
});
});

socket.on("disconnect",()=>{
addLog("SYSTEM","SOCKET DISCONNECTED");
});
}

async function serverCmd(service,action){

try{

const res = await api("/api/system/control",{
method:"POST",
body:JSON.stringify({
engine:service,
action:action
})
});

const data = await res.json();

if(data.success){
addLog("OWNER",service+" "+action+" success");
}else{
addLog("OWNER",service+" "+action+" fail");
}

}catch(e){
addLog("OWNER","api error");
}
}

async function genLicense(){

try{

const res = await api("/api/license/generate",{
method:"POST"
});

const data = await res.json();

if(data.success){
qs("license").value = data.key;
addLog("OWNER","license generated");
}

}catch(e){
addLog("OWNER","license error");
}
}

async function broadcastMsg(){

const msg = qs("broadcastText").value.trim();

if(!msg) return;

try{

const res = await api("/api/system/broadcast",{
method:"POST",
body:JSON.stringify({message:msg})
});

const data = await res.json();

if(data.success){
addLog("OWNER","broadcast sent");
qs("broadcastText").value="";
}else{
addLog("OWNER","broadcast fail");
}

}catch(e){
addLog("OWNER","broadcast error");
}
}

async function refreshAll(){

try{

const res = await api("/api/billing/usage");
await res.json();

addLog("OWNER","manual refresh");

}catch(e){}
}

window.onload=()=>{

if(!token()){
alert("LOGIN FIRST");
location.href="/";
return;
}

initProfile();
initChart();
initSocket();
addLog("SYSTEM","CONTROL CENTER READY");

};
</script>

</body>
</html>
