<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SN ULTRA MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --neon-gold: #f59e0b; --bg-black: #050505; }
        body { background: var(--bg-black); color: #f4f4f5; font-family: 'Inter', sans-serif; }
        .sn-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(20, 20, 22, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(63, 63, 70, 0.3); }
        .neon-text { color: var(--neon-gold); text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; height: 70px; border-top: 1px solid #27272a; }
        .content-section { padding-bottom: 90px; } /* เผื่อที่ให้ Bottom Nav */
        .card-stack { width: 100%; margin-bottom: 1rem; border-radius: 24px; overflow: hidden; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 scroll-hide">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-bold sn-font neon-text italic">SN ULTRA</h1>
            <p class="text-[9px] uppercase tracking-widest text-zinc-500">Real-Time Mobile Node</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <span class="block text-[10px] text-zinc-500 font-mono" id="ping-val">12ms</span>
                <span class="block text-[10px] text-green-500 font-bold uppercase">Active</span>
            </div>
            <div class="w-10 h-10 rounded-full glass flex items-center justify-center border-yellow-500/30">
                <i class="fas fa-user-shield text-yellow-500"></i>
            </div>
        </div>
    </header>

    <main class="content-section">

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[10px] text-zinc-500 uppercase mb-1">CPU LOAD</p>
                <p class="text-xl font-bold neon-text" id="cpu-val">0%</p>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[10px] text-zinc-500 uppercase mb-1">MEM USAGE</p>
                <p class="text-xl font-bold neon-text" id="ram-val">0%</p>
            </div>
        </div>

        <div id="main-viewport">
            
            <div id="view-dash" class="tab-content space-y-4">
                <div class="card-stack glass p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold uppercase italic"><i class="fas fa-chart-area mr-2 text-yellow-500"></i>Pulse Monitor</h3>
                        <span class="text-[10px] text-zinc-500">2.0 TPS</span>
                    </div>
                    <canvas id="mobileChart" height="150"></canvas>
                </div>

                <div class="card-stack glass p-5">
                    <h3 class="text-sm font-bold uppercase italic mb-3">Boss & Map Status</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-zinc-800">
                            <span class="text-xs">Central Boss (Volcano)</span>
                            <span class="text-[10px] bg-green-500/10 text-green-500 px-2 py-1 rounded">ALIVE</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-zinc-800">
                            <span class="text-xs">Dungeon Floor 14</span>
                            <span class="text-[10px] text-zinc-400">45 PLAYERS</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-game" class="tab-content hidden space-y-4">
                <div class="card-stack glass p-5">
                    <h3 class="text-sm font-bold uppercase italic mb-4">สมาชิกโยวกังออนไลน์</h3>
                    <div id="member-list" class="space-y-3">
                        </div>
                </div>
            </div>

            <div id="view-shop" class="tab-content hidden grid grid-cols-1 gap-3">
                </div>

        </div>
    </main>

    <nav class="bottom-nav glass flex justify-around items-center px-4">
        <button onclick="switchTab('dash')" id="btn-dash" class="flex flex-col items-center text-yellow-500">
            <i class="fas fa-tachometer-alt text-xl mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Monitor</span>
        </button>
        <button onclick="switchTab('game')" id="btn-game" class="flex flex-col items-center text-zinc-500">
            <i class="fas fa-ghost text-xl mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Players</span>
        </button>
        <button onclick="switchTab('shop')" id="btn-shop" class="flex flex-col items-center text-zinc-500">
            <i class="fas fa-shopping-bag text-xl mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Shop</span>
        </button>
        <button onclick="logout()" class="flex flex-col items-center text-red-500">
            <i class="fas fa-power-off text-xl mb-1"></i>
            <span class="text-[9px] font-bold uppercase">Exit</span>
        </button>
    </nav>

    <script>
        const sid = localStorage.getItem("sn_sid");
        let chart;

        // 1. CHART INITIALIZE
        function initChart() {
            const ctx = document.getElementById('mobileChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: Array(15).fill(0),
                        borderColor: '#f59e0b',
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(245, 158, 11, 0.05)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { display: false, min: 0, max: 100 }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 2. TAB SWITCHER
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.replace('text-yellow-500', 'text-zinc-500'));
            document.getElementById(`btn-${tab}`).classList.replace('text-zinc-500', 'text-yellow-500');

            if(tab === 'game') loadMembers();
            if(tab === 'shop') loadShop();
        }

        // 3. REAL-TIME DATA (Sync with Backend v33+)
        async function updateStats() {
            try {
                const res = await fetch('/api/admin/realtime-status');
                const data = await res.json();
                if(data.ok) {
                    document.getElementById('cpu-val').innerText = data.cpu + '%';
                    document.getElementById('ram-val').innerText = data.ram + '%';
                    
                    chart.data.datasets[0].data.shift();
                    chart.data.datasets[0].data.push(data.cpu);
                    chart.update('none');
                }
            } catch(e) {}
        }

        // 4. LOAD MEMBERS (Stacked View)
        async function loadMembers() {
            const res = await fetch('/api/yulgang/members');
            const data = await res.json();
            const list = document.getElementById('member-list');
            list.innerHTML = data.members.map(m => `
                <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-2xl border border-zinc-800">
                    <div>
                        <p class="text-sm font-bold text-zinc-300">${m.name}</p>
                        <p class="text-[10px] text-zinc-500 uppercase">${m.class} | LV.${m.level}</p>
                    </div>
                    <span class="text-[10px] font-bold ${m.status==='Online'?'text-green-500':'text-zinc-600'}">${m.status}</span>
                </div>
            `).join('');
        }

        // 5. LOAD SHOP (Full Width Cards)
        async function loadShop() {
            const res = await fetch('/api/shop/items');
            const data = await res.json();
            const list = document.getElementById('view-shop');
            list.innerHTML = data.items.map(i => `
                <div class="glass p-4 rounded-3xl flex items-center gap-4">
                    <img src="${i.img}" class="w-16 h-16 rounded-2xl bg-black">
                    <div class="flex-1">
                        <p class="text-sm font-bold">${i.name}</p>
                        <p class="text-xs text-yellow-500">${i.price} CREDITS</p>
                    </div>
                    <button class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-bold">BUY</button>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            setInterval(updateStats, 2000);
        });

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>
