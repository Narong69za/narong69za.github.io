<!-- SN YULGANG / RAN ONLINE MULTI BOARD v43 STABLE NO MISSING -->

<!-- ========================================================= -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SN MULTI BOARD v43 STABLE</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{background:#020202;color:#fff;font-family:tahoma}
.box{background:#0a0a0a;border:1px solid #1b1b1b;border-radius:26px;padding:24px}
.btn{padding:12px 16px;border-radius:14px;font-weight:700;width:100%}
.inp{width:100%;padding:12px;background:#050505;border:1px solid #222;border-radius:14px;color:#fff}
.gold{color:#d4af37}
.scroll::-webkit-scrollbar{width:0}
</style>
</head>

<body class="p-4 md:p-8 scroll">

<!-- HEADER -->
<section class="text-center mb-8">
<h1 class="text-4xl font-black gold italic">SN MULTI BOARD</h1>
<p class="text-zinc-500 text-xs mt-1">v43 STABLE NO MISSING</p>

<div class="grid grid-cols-2 gap-3 mt-6 max-w-xl mx-auto">
<div class="box">
<p class="text-xs text-zinc-500">ยอดเติมเงิน</p>
<h2 id="revenue" class="text-2xl font-black gold">0</h2>
</div>
<div class="box">
<p class="text-xs text-zinc-500">ออนไลน์รวม</p>
<h2 id="online" class="text-2xl font-black text-green-400">0</h2>
</div>
</div>
</section>

<!-- ================= YULGANG ================= -->
<section class="box mb-8">
<h2 class="text-3xl font-black text-green-400 mb-5">SN YULGANG 2026 CLASSIC</h2>

<!-- LOGIN -->
<div class="grid md:grid-cols-2 gap-3 mb-4">
<button class="btn bg-red-500">Google Login</button>
<button class="btn bg-indigo-500">Discord Login</button>
</div>

<div class="space-y-3 mb-5">
<input id="yg_user" class="inp" placeholder="User ID">
<input id="yg_pass" type="password" class="inp" placeholder="Password">
<button onclick="loginYG()" class="btn bg-green-500 text-black">เข้าเล่นเกมส์</button>
</div>

<!-- MEMBER -->
<div class="grid md:grid-cols-3 gap-3 mb-5">
<button onclick="registerYG()" class="btn bg-zinc-800">สมัครสมาชิก</button>
<button onclick="forgotYG()" class="btn bg-zinc-800">กู้รหัสผ่าน</button>
<button onclick="loadChars()" class="btn bg-zinc-800">ตัวละคร</button>
</div>

<!-- DOWNLOAD -->
<div class="grid md:grid-cols-2 gap-3 mb-5">
<a href="/yulgang_launcher.exe" class="btn bg-white text-black text-center">ดาวน์โหลด .EXE</a>
<a href="/yulgang_sn.apk" class="btn bg-green-500 text-black text-center">ดาวน์โหลด .APK</a>
</div>

<!-- CONTENT -->
<div class="grid md:grid-cols-4 gap-3">
<button onclick="openModal('mapYG')" class="btn bg-zinc-900">แผนที่</button>
<button onclick="openModal('bossYG')" class="btn bg-zinc-900">บอส</button>
<button onclick="openModal('rankYG')" class="btn bg-zinc-900">แรงกิ้ง</button>
<button onclick="openModal('classYG')" class="btn bg-zinc-900">14 คลาส</button>
</div>
</section>

<!-- ================= RAN ================= -->
<section class="box mb-8">
<h2 class="text-3xl font-black text-red-400 mb-5">SN RAN ONLINE EP7</h2>

<div class="space-y-3 mb-5">
<input id="ran_user" class="inp" placeholder="User ID">
<input id="ran_pass" type="password" class="inp" placeholder="Password">
<button onclick="loginRAN()" class="btn bg-red-500">เข้าเล่นเกมส์</button>
</div>

<div class="grid md:grid-cols-3 gap-3 mb-5">
<button onclick="registerRAN()" class="btn bg-zinc-800">สมัครสมาชิก</button>
<button onclick="forgotRAN()" class="btn bg-zinc-800">กู้รหัสผ่าน</button>
<button onclick="openModal('rankRAN')" class="btn bg-zinc-800">แรงกิ้ง</button>
</div>

<div class="grid md:grid-cols-2 gap-3 mb-5">
<a href="/ran_launcher.exe" class="btn bg-white text-black text-center">ดาวน์โหลด .EXE</a>
<a href="/ran_sn.apk" class="btn bg-red-500 text-white text-center">ดาวน์โหลด .APK</a>
</div>

<div class="grid md:grid-cols-2 gap-3">
<button onclick="openModal('mapRAN')" class="btn bg-zinc-900">แผนที่</button>
<button onclick="openModal('bossRAN')" class="btn bg-zinc-900">บอส</button>
</div>
</section>

<!-- SHOP -->
<section class="box mb-8">
<h2 class="text-2xl font-black gold mb-4">WEB SHOP / ITEM MALL</h2>

<div class="grid md:grid-cols-2 gap-5">

<div>
<h3 class="font-bold mb-3 text-green-400">Item Shop</h3>
<div id="shopList" class="space-y-2"></div>
</div>

<div>
<h3 class="font-bold mb-3 text-yellow-400">Item Mall</h3>
<div id="mallList" class="space-y-2"></div>
</div>

</div>
</section>

<!-- ANNOUNCE -->
<section class="box mb-8">
<h2 class="text-xl font-black mb-3">ประกาศสำคัญ</h2>
<div id="announce" class="text-zinc-400">ระบบออนไลน์ปกติ</div>
</section>

<!-- MODAL -->
<div id="modal"
style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;padding:20px">
<div class="box max-w-xl mx-auto mt-20">
<div class="flex justify-between mb-4">
<h2 id="mtitle" class="font-black text-xl">DATA</h2>
<button onclick="closeModal()">X</button>
</div>
<div id="mbody" class="text-zinc-300"></div>
</div>
</div>

<script>
const API="https://api.sn-designstudio.dev";

/* ================== LOAD CORE ================== */
async function boot(){
loadStats();
loadShop();
loadMall();
setInterval(loadStats,10000);
}

/* ================== STATS ================== */
async function loadStats(){
try{
const r=await fetch(API+'/api/stats');
const d=await r.json();
document.getElementById('revenue').innerText=(d.revenue||0)+" THB";
document.getElementById('online').innerText=(d.online||0)+" คน";
}catch(e){}
}

/* ================== SHOP ================== */
async function loadShop(){
try{
const r=await fetch(API+'/api/shop/items');
const d=await r.json();
let html='';
(d.data||[]).forEach(x=>{
html+=`
<div class="p-3 bg-zinc-900 rounded-xl flex justify-between">
<span>${x.name}</span>
<button class="px-3 py-1 bg-green-500 rounded" onclick="buy(${x.id})">${x.price}</button>
</div>`;
});
document.getElementById('shopList').innerHTML=html||'ไม่มีสินค้า';
}catch(e){
document.getElementById('shopList').innerHTML='โหลดไม่ได้';
}
}

/* ================== MALL ================== */
async function loadMall(){
try{
const r=await fetch(API+'/api/mall/items');
const d=await r.json();
let html='';
(d.data||[]).forEach(x=>{
html+=`
<div class="p-3 bg-zinc-900 rounded-xl flex justify-between">
<span>${x.name}</span>
<button class="px-3 py-1 bg-yellow-500 text-black rounded">${x.sale_price}</button>
</div>`;
});
document.getElementById('mallList').innerHTML=html||'ไม่มีสินค้า';
}catch(e){
document.getElementById('mallList').innerHTML='โหลดไม่ได้';
}
}

/* ================== MEMBER ================== */
function registerYG(){ alert("สมัครสมาชิก YULGANG"); }
function forgotYG(){ alert("กู้รหัสผ่าน YULGANG"); }
function registerRAN(){ alert("สมัครสมาชิก RAN"); }
function forgotRAN(){ alert("กู้รหัสผ่าน RAN"); }

function loginYG(){ alert("Login YULGANG"); }
function loginRAN(){ alert("Login RAN"); }

function loadChars(){ openModal('char'); }

/* ================== SHOP ACTION ================== */
function buy(id){ alert("ซื้อสินค้า ID:"+id); }

/* ================== MODAL ================== */
function openModal(type){
document.getElementById('modal').style.display='block';

const data={
mapYG:"แผนที่ Yulgang โลกหลัก / เมือง / ดันเจี้ยน",
bossYG:"ตารางบอส YG 12:00 / 18:00 / 22:00",
rankYG:"TOP LV / PK / เงิน",
classYG:"14 คลาสครบ Season 3",
char:"โหลดตัวละครจาก API",
mapRAN:"แผนที่ Ran School",
bossRAN:"บอส Ran รายวัน",
rankRAN:"แรงกิ้ง Ran"
};

document.getElementById('mtitle').innerText=type;
document.getElementById('mbody').innerText=data[type]||'No Data';
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

boot();
</script>
</body>
</html>
