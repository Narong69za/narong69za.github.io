PE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SN ULTRA v39 FULL SYSTEM</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
background:#030303;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}
.card{
background:#0b0b0b;
border:1px solid #1c1c1c;
border-radius:22px;
padding:20px;
}
.btn{
width:100%;
padding:14px;
border-radius:14px;
font-weight:700;
transition:.2s;
}
.btn:active{transform:scale(.97);}
.input{
width:100%;
background:#050505;
border:1px solid #1f1f1f;
padding:14px;
border-radius:14px;
color:#fff;
}
.gold{color:#d4af37;}
.bg-gold{background:#d4af37;color:#000;}
.green{color:#10b981;}
.red{color:#ef4444;}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}
.modal-box{
width:100%;
max-width:500px;
background:#0a0a0a;
border:1px solid #333;
border-radius:25px;
padding:25px;
max-height:90vh;
overflow:auto;
}
.small{
font-size:12px;
color:#999;
}
</style>
</head>

<body class="p-4 md:p-8 pb-24">

<!-- HEADER -->
<div class="text-center mb-8">
<h1 class="text-4xl font-black italic gold cursor-pointer" onclick="ownerTap()">SN ULTRA</h1>
<p class="small">Production Multi Board v39</p>
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

<div class="card text-center">
<div class="small">Revenue</div>
<div id="revenue" class="text-2xl font-black gold">0</div>
</div>

<div class="card text-center">
<div class="small">Online</div>
<div id="online" class="text-2xl font-black green">0</div>
</div>

<div class="card text-center">
<div class="small">CPU</div>
<div id="cpu" class="text-2xl font-black">0%</div>
</div>

<div class="card text-center">
<div class="small">RAM</div>
<div id="ram" class="text-2xl font-black">0%</div>
</div>

</div>

<!-- LOGIN -->
<div class="card mb-8 max-w-xl mx-auto">
<h2 class="text-xl font-bold mb-4">LOGIN</h2>

<div class="space-y-3">
<input id="login-user" class="input" placeholder="Username">
<input id="login-pass" class="input" type="password" placeholder="Password">

<button class="btn bg-gold" onclick="login()">Authorize Access</button>
<button class="btn bg-zinc-800" onclick="openRegister()">Register</button>
</div>

<div id="login-status" class="small mt-3"></div>
</div>

<!-- YULGANG -->
<div class="card mb-8">
<div class="flex justify-between items-center mb-4">
<h2 class="text-2xl font-black green">YULGANG ONLINE</h2>
<button class="btn bg-zinc-900 !w-auto px-4" onclick="loadCharacters()">Characters</button>
</div>

<div class="grid md:grid-cols-3 gap-3">

<a href="/yulgang_launcher.exe" class="btn bg-zinc-800 text-center">DOWNLOAD EXE</a>
<a href="/yulgang_sn.apk" class="btn bg-zinc-800 text-center">DOWNLOAD APK</a>
<button class="btn bg-zinc-800" onclick="showMap()">WORLD MAP</button>

</div>

<div class="mt-4">
<button class="btn bg-zinc-900" onclick="showBoss()">WORLD BOSS</button>
</div>

</div>

<!-- ITEM MALL -->
<div class="card mb-8">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold gold">ITEM MALL</h2>
<button class="btn bg-zinc-900 !w-auto px-4" onclick="loadMall()">Refresh</button>
</div>

<div id="mall-list" class="space-y-3"></div>
</div>

<!-- TOPUP -->
<div class="card mb-8">
<h2 class="text-xl font-bold mb-4">TOPUP</h2>

<div class="grid grid-cols-2 gap-3">
<button class="btn bg-gold" onclick="topup(50)">50 THB</button>
<button class="btn bg-gold" onclick="topup(100)">100 THB</button>
<button class="btn bg-gold" onclick="topup(300)">300 THB</button>
<button class="btn bg-gold" onclick="topup(500)">500 THB</button>
</div>

<div id="pay-status" class="small mt-3"></div>
</div>

<!-- HAMSTER -->
<div class="card mb-8">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">HAMSTER BOT</h2>
<span id="bot-state" class="green font-bold">IDLE</span>
</div>

<div class="grid grid-cols-3 gap-3 text-center">
<div>
<div class="small">Diamonds</div>
<div id="diamonds">0</div>
</div>

<div>
<div class="small">Profit/Hr</div>
<div id="profit">0</div>
</div>

<div>
<div class="small">Tokens</div>
<div id="tokens">0</div>
</div>
</div>
</div>

<!-- FOOTER -->
<div class="text-center text-xs text-zinc-600 mt-10">
© SN DESIGN STUDIO 2026
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<div class="flex justify-between mb-4">
<h3 id="modal-title" class="text-xl font-bold">DATA</h3>
<button onclick="closeModal()">X</button>
</div>

<div id="modal-body"></div>
</div>
</div>

<script>
const API = "https://api.sn-designstudio.dev";
let OWNER_TAP = 0;
let TOKEN = "";

function ownerTap(){
OWNER_TAP++;
if(OWNER_TAP >= 5){
OWNER_TAP = 0;
ownerPanel();
}
}

function ownerPanel(){
openModal("OWNER PANEL", `
<div class='space-y-3'>
<button class='btn bg-red-600' onclick='loadSecurity()'>Security Logs</button>
<button class='btn bg-zinc-800' onclick='loadUsers()'>Users</button>
<button class='btn bg-zinc-800' onclick='loadWorld()'>World State</button>
</div>
`);
}

function openModal(title, html){
document.getElementById("modal-title").innerHTML = title;
document.getElementById("modal-body").innerHTML = html;
document.getElementById("modal").style.display = "flex";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

async function fetchStats(){
try{
let r = await fetch(API + "/api/stats");
let d = await r.json();

document.getElementById("revenue").innerText = d.revenue || 0;
document.getElementById("online").innerText = d.online || 0;
document.getElementById("cpu").innerText = (d.cpu || 0) + "%";
document.getElementById("ram").innerText = (d.ram || 0) + "%";
}catch(e){}
}

async function login(){
let username = document.getElementById("login-user").value;
let password = document.getElementById("login-pass").value;

try{
let r = await fetch(API + "/api/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
});

let d = await r.json();

if(d.success){
TOKEN = d.token;
document.getElementById("login-status").innerHTML = "Login Success";
}else{
document.getElementById("login-status").innerHTML = "Login Failed";
}
}catch(e){
document.getElementById("login-status").innerHTML = "Connection Error";
}
}

function openRegister(){
openModal("REGISTER", `
<div class='space-y-3'>
<input id='reg-user' class='input' placeholder='Username'>
<input id='reg-pass' class='input' type='password' placeholder='Password'>
<input id='reg-mail' class='input' placeholder='Email'>
<button class='btn bg-gold' onclick='registerUser()'>Create Account</button>
</div>
`);
}

async function registerUser(){
let username = document.getElementById("reg-user").value;
let password = document.getElementById("reg-pass").value;
let email = document.getElementById("reg-mail").value;

try{
let r = await fetch(API + "/api/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password,email})
});

let d = await r.json();

if(d.success){
alert("Register Success");
closeModal();
}
}catch(e){}
}

async function loadCharacters(){
let r = await fetch(API + "/api/v1/characters");
let d = await r.json();

let html = "";
(d.data || []).forEach(x=>{
html += `
<div class='card mb-2'>
${x.char_name} Lv.${x.level} (${x.job_class})
</div>`;
});

openModal("CHARACTERS", html || "No Data");
}

function showMap(){
openModal("WORLD MAP", `
<div class='space-y-2'>
<div class='card'>เมืองหลัก</div>
<div class='card'>ถ้ำปีศาจ</div>
<div class='card'>ลานประลอง</div>
</div>
`);
}

function showBoss(){
openModal("WORLD BOSS", `
<div class='space-y-2'>
<div class='card'>20:00 Flame Dragon</div>
<div class='card'>22:00 Dark Emperor</div>
</div>
`);
}

async function loadMall(){
try{
let r = await fetch(API + "/api/shop/items");
let d = await r.json();

let html = "";
(d.data || []).forEach(i=>{
html += `
<div class='card flex justify-between items-center'>
<div>
<div>${i.name}</div>
<div class='small'>${i.price} THB</div>
</div>
<button class='btn bg-gold !w-auto px-4' onclick='buyItem(${i.id})'>BUY</button>
</div>`;
});

document.getElementById("mall-list").innerHTML = html || "No Item";
}catch(e){}
}

async function buyItem(id){
alert("Purchase Item ID : " + id);
}

function topup(amount){
document.getElementById("pay-status").innerHTML =
"สร้าง QR Payment " + amount + " THB";
}

async function hamster(){
try{
let r = await fetch(API + "/hamster/status");
let d = await r.json();

let x = d.data || {};

document.getElementById("diamonds").innerText = x.diamonds || 0;
document.getElementById("profit").innerText = x.profit || 0;
document.getElementById("tokens").innerText = x.tokens || 0;
document.getElementById("bot-state").innerText = x.state || "IDLE";
}catch(e){}
}

async function loadSecurity(){
let r = await fetch(API + "/api/anti-cheat/logs");
let d = await r.json();

let html = "";
(d.data || []).forEach(x=>{
html += `<div class='card mb-2'>${x.action} | ${x.ip}</div>`;
});

openModal("SECURITY LOGS", html || "No Data");
}

async function loadUsers(){
let r = await fetch(API + "/api/gm/users");
let d = await r.json();

let html = "";
(d.data || []).forEach(x=>{
html += `<div class='card mb-2'>${x.username} | ${x.role}</div>`;
});

openModal("USERS", html || "No Data");
}

async function loadWorld(){
let r = await fetch(API + "/api/world/meta");
let d = await r.json();

openModal("WORLD META", `
<div class='card'>Online : ${d.state.online}</div>
<div class='card mt-2'>CPU : ${d.state.cpu}%</div>
<div class='card mt-2'>RAM : ${d.state.ram}%</div>
`);
}

function connectWS(){
try{
let ws = new WebSocket("wss://api.sn-designstudio.dev");

ws.onmessage = function(ev){
let data = JSON.parse(ev.data);

if(data.type === "STATUS_UPDATE"){
document.getElementById("cpu").innerText = data.cpu + "%";
document.getElementById("ram").innerText = data.ram + "%";
}

if(data.type === "HAMSTER_UPDATE"){
document.getElementById("diamonds").innerText = data.data.diamonds;
document.getElementById("profit").innerText = data.data.profit;
document.getElementById("tokens").innerText = data.data.tokens;
}
};
}catch(e){}
}

fetchStats();
loadMall();
hamster();
connectWS();

setInterval(fetchStats,10000);
setInterval(hamster,5000);
</script>

</body>
 </html>
