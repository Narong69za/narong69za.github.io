<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SN DESIGN STUDIO | PRO ACTIVATE</title>

<link rel="stylesheet" href="/activate.css">

</head>

<body>

<div class="activate-container">

<h1>SN DESIGN STUDIO</h1>
<h2>PRO PACKAGE ACTIVATION</h2>

<!-- 🔥 USER DISPLAY -->
<div id="user-info" style="margin-bottom:10px;color:#00ffcc;"></div>

<div class="generate-box">

<h3>Generate Key</h3>

<label>Device ID</label>

<input
type="text"
id="hwid"
readonly
placeholder="DEVICE ID"
/>

<input
type="text"
id="generated-key"
readonly
/>

<button onclick="generatePRO()">
Generate PRO Key
</button>

<button onclick="copyKey()">
Copy Key
</button>

</div>

<!-- 🔥 ADD ตรงนี้ -->
<div class="qr-box">

  <h3>Payment QR</h3>

  <div id="qr-container">
    <p>กำลังสร้าง QR...</p>
  </div>

</div>

<!-- ===================================================== -->
<!-- 🔥 PAYMENT SECTION (ADD ONLY) -->
<!-- ===================================================== -->

<div class="generate-box" style="margin-top:30px;">

<h3>💳 PRO PAYMENT (99฿)</h3>

<p>
[TH] คัดลอกลิงก์ไปเปิดใน Google Chrome แล้วชำระเงิน<br>
[EN] Copy link and open in browser to pay
</p>

<input
type="text"
id="payment-link"
readonly
style="width:100%;margin-bottom:10px;"
/>

<button onclick="generatePaymentLink()">
Generate Payment Link
</button>

<button onclick="copyPaymentLink()">
Copy Payment Link
</button>

</div>

</div>

<script src="/activate.js"></script>
<script src="/activate-client.js"></script>

<!-- ===================================================== -->
<!-- 🔥 CORE SCRIPT -->
<!-- ===================================================== -->

<script>

// =============================
// GET PARAMS
// =============================
const params = new URLSearchParams(window.location.search)

const user = params.get("user")
const hwid_param = params.get("hwid")

// set hwid
if (hwid_param) {
    document.getElementById("hwid").value = hwid_param
}

// show user
if (user) {
    document.getElementById("user-info").innerText = "User: " + user
}

// =============================
// PAYMENT CONFIG
// =============================
const AMOUNT = 99

// =============================
// GENERATE PAYMENT LINK
// =============================
function generatePaymentLink() {

    if (!user || !hwid_param) {
        alert("Missing user or hwid")
        return
    }

    // 🔥 ใช้ endpoint จริงของคุณ
    const api = "https://vagally-transequatorial-frederic.ngrok-free.dev/payment/payment"

    const payload = {
        order_id: "PRO_" + Date.now(),
        amount: AMOUNT
    }

    fetch(api, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {

        // 🔥 คุณต้องแก้ backend ให้ return payment_url
        const paymentUrl = data.payment_url || "NO_URL_RETURNED"

        document.getElementById("payment-link").value = paymentUrl

    })
    .catch(() => {
        alert("Payment API Error")
    })
}

// =============================
// COPY
// =============================
function copyPaymentLink() {

    const input = document.getElementById("payment-link")

    if (!input.value) {
        alert("No link")
        return
    }

    input.select()
    document.execCommand("copy")

    alert("Copied!")
}

</script>

</body>
</html>
