<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SN DESIGN STUDIO | PREMIUM ACTIVATE</title>

<link rel="stylesheet" href="/activate.css">
</head>

<body>

<div class="activate-container">

<h1>SN DESIGN STUDIO</h1>
<h2>PREMIUM PACKAGE ACTIVATION</h2>

<!-- USER -->
<div id="user-info" style="margin-bottom:10px;color:#00ffcc;"></div>

<!-- ========================= -->
<!-- ACTIVATION (เหลืออันเดียว) -->
<!-- ========================= -->
<div class="activate-box">

<h3>Activation</h3>

<label>Activation Key</label>

<input
  type="text"
  id="activate-key"
  placeholder="SN-PREMIUM-XXXXX"
  autocomplete="off"
/>

<button onclick="activateKey()">Activate</button>

<div id="activate-status" class="activate-info">
  ระบบพร้อมใช้งาน
</div>

</div>

<!-- ========================= -->
<!-- GENERATE KEY -->
<!-- ========================= -->
<div class="generate-box">

<h3>Generate Key</h3>

<label>Device ID</label>

<input
  type="text"
  id="hwid"
  readonly
  placeholder="DEVICE ID"
/>

<label>Generated Key</label>

<input
  type="text"
  id="generated-key"
  readonly
  placeholder="GENERATED KEY"
/>

<button onclick="generatePREMIUM()">Generate PREMIUM Key</button>
<button onclick="copyKey()">Copy Key</button>

</div>

<!-- ========================= -->
<!-- QR PAYMENT -->
<!-- ========================= -->
<div class="qr-box">

<h3>Payment QR</h3>

<div id="qr-container">
<p>กำลังสร้าง QR...</p>
</div>

</div>

<!-- ========================= -->
<!-- LINK PAYMENT -->
<!-- ========================= -->
<div class="generate-box" style="margin-top:30px;">

<h3>💎 PREMIUM PAYMENT (299฿)</h3>

<p>
[TH] คัดลอกลิงก์ไปเปิดใน Chrome<br>
[EN] Copy link and open in browser
</p>

<input
  type="text"
  id="payment-link"
  readonly
  style="width:100%;margin-bottom:10px;"
/>

<button onclick="generatePaymentLink()">Generate Payment Link</button>
<button onclick="copyPaymentLink()">Copy Payment Link</button>

</div>

</div>

<!-- ========================= -->
<!-- CORE SCRIPT -->
<!-- ========================= -->
<script>

// =============================
// CONFIG (สำคัญมาก)
// =============================
const API_QR = "https://vagally-transequatorial-frederic.ngrok-free.dev/qr/payment/create";
const API_PAYMENT = "https://vagally-transequatorial-frederic.ngrok-free.dev/payment/payment";

// =============================
// PARAMS
// =============================
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "guest";
const hwid = params.get("hwid") || "unknown";

// set UI
document.getElementById("hwid").value = hwid;
document.getElementById("user-info").innerText = "User: " + user;

// =============================
// QR GENERATE (🔥 ตัวสำคัญ)
// =============================
async function generateQR(){

  const box = document.getElementById("qr-container");

  box.innerHTML = "<p>กำลังสร้าง QR...</p>";

  try{

    const res = await fetch(API_QR,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        order_id:"PREMIUM_"+Date.now(),
        amount:299
      })
    });

    const data = await res.json();

    if(data.qr_image){

      box.innerHTML = `<img src="${data.qr_image}" width="260">`;

    }else{

      box.innerHTML = "<p>QR ERROR</p>";

    }

  }catch(err){

    console.error(err);
    box.innerHTML = "<p>API ERROR</p>";

  }
}

// =============================
// PAYMENT LINK
// =============================
function generatePaymentLink(){

  fetch(API_PAYMENT,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      order_id:"PREMIUM_"+Date.now(),
      amount:299
    })
  })
  .then(res=>res.json())
  .then(data=>{

    const link = data.payment_url || "NO_URL";
    document.getElementById("payment-link").value = link;

  })
  .catch(()=>{
    alert("Payment API Error");
  });

}

// =============================
// COPY
// =============================
function copyPaymentLink(){

  const input = document.getElementById("payment-link");

  if(!input.value){
    alert("No link");
    return;
  }

  input.select();
  document.execCommand("copy");

  alert("Copied!");
}

// =============================
// START
// =============================
window.onload = generateQR;

</script>

<!-- 🔥 ใช้เฉพาะตัวนี้ (ถ้ามี activateKey / generatePREMIUM) -->
<script src="/activate.js"></script>

</body>
</html>
