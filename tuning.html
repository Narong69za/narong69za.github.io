<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DESIGN TUNING | System</title>
    <link rel="stylesheet" href="assets/css/tuning.css">
</head>
<body>
    <div class="tuning-container">
        <nav class="top-nav">
            <div class="logo">SN DESIGN <span>TUNING</span></div>
            <div id="connection-status" class="status-tag">DISCONNECTED</div>
        </nav>

        <main class="dashboard">
            <section class="table-area">
                <div class="header-row">
                    <h2>Fuel Base Map (VE Table)</h2>
                    <div class="actions">
                        <button onclick="adjustValue(1.05)">+5%</button>
                        <button onclick="adjustValue(0.95)">-5%</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="tuning-map">
                        </table>
                </div>
            </section>

            <aside class="monitor-panel">
                <div class="gauge-box">
                    <label>AFR Target</label>
                    <div id="val-afr" class="big-value">14.7</div>
                </div>
                <div class="terminal">
                    <div id="log-content"></div>
                </div>
            </aside>
        </main>
    </div>
    <script src="Assets/js/tuning-math.js"></script>
</body>
</html>
